<style>
  :root {
    --bg-root: #f0f4f8;
    --glass-surface: rgba(255, 255, 255, 0.9);
    --glass-border: 1px solid rgba(255, 255, 255, 1);
    --glass-shadow: 0 8px 32px rgba(31, 38, 135, 0.08);
    --card-bg: rgba(255, 255, 255, 0.65);
    --text-main: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --accent-primary: #4f46e5;
    
    /* STATUS COLORS */
    --status-active: #059669; /* Green */
    --status-break: #d97706; /* Amber */
    --status-alert: #dc2626; /* Red */
    --status-role: #7c3aed; /* Purple (ICL) */
    --status-ulc: #f97316; /* Orange (ULC FIRE) - NEW */
    
    --region-on: #0ea5e9;
    --region-off: #8b5cf6;
    --radius-panel: 24px;
    --font-ui: 'Outfit', sans-serif;
  }
  body.dark {
    --bg-root: #020408;
    --glass-surface: rgba(20, 20, 28, 0.8);
    --glass-border: 1px solid rgba(255, 255, 255, 0.1);
    --glass-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    --card-bg: rgba(255, 255, 255, 0.05);
    --text-main: #ffffff;
    --text-secondary: #a5b4fc;
    --text-muted: #94a3b8;
    --accent-primary: #818cf8;
    --status-active: #34d399;
    --status-break: #fbbf24;
    --status-alert: #f87171;
    --status-role: #c084fc;
    --status-ulc: #fb923c; /* Light Orange */
    --region-on: #38bdf8;
    --region-off: #a78bfa;
  }
  
  * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font-ui); background-color: var(--bg-root); color: var(--text-main); margin: 0; padding: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background 0.5s ease; }
  
  /* LAYOUT */
  .app-shell { flex: 1; display: flex; flex-direction: column; padding: 24px 32px; max-width: 1800px; margin: 0 auto; width: 100%; gap: 24px; position: relative; z-index: 10; height: 100%; }
  .top-deck { display: flex; justify-content: space-between; align-items: center; background: var(--glass-surface); backdrop-filter: blur(25px); border: var(--glass-border); padding: 0 24px; border-radius: var(--radius-panel); box-shadow: var(--glass-shadow); height: 72px; flex-shrink: 0; }
  .viewport { flex: 1; overflow-y: auto; overflow-x: hidden; border-radius: var(--radius-panel); padding-bottom: 80px; }
  
  /* CARDS & GRIDS */
  .aether-card { background: var(--card-bg); backdrop-filter: blur(20px); border: var(--glass-border); border-radius: var(--radius-panel); padding: 32px; box-shadow: var(--glass-shadow); display: flex; flex-direction: column; }
  .grid-bento { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .grid-split { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .grid-masonry { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
  
  /* AGENT PILLS */
  .agent-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .agent-pill { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; transition: 0.2s; }
  .agent-pill:hover { background: rgba(255,255,255,0.08); border-color: var(--accent-primary); opacity: 1 !important; }
  
  /* ROLES */
  .agent-pill.role-safe { border: 1px solid var(--status-active); opacity: 0.6; }
  .agent-pill.role-icl { border: 1px solid var(--status-role); opacity: 0.6; }
  .agent-pill.role-ulc { border: 1px solid var(--status-ulc); opacity: 0.6; } /* NEW */
  .special-group .agent-pill { opacity: 1 !important; border-width: 2px; } /* No dimming in special cards */
  
  /* UI ELEMENTS */
  .btn { height: 36px; padding: 0 16px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
  .btn-primary { background: var(--text-main); color: var(--bg-root); }
  .btn-glass { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-main); }
  .action-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05); border: var(--glass-border); color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
  .action-btn:hover, .action-btn.active { background: var(--bg-root); color: var(--accent-primary); border-color: var(--accent-primary); }
  .input-aether { width: 100%; padding: 0 16px; height: 40px; border-radius: 10px; background: rgba(0,0,0,0.05); border: 1px solid var(--glass-border); color: var(--text-main); }

  /* POPOUT MODE */
  body.popout-mode { padding: 20px; background: var(--bg-root); overflow: auto; }
  body.popout-mode .top-deck, body.popout-mode .aether-bg { display: none; }
  body.popout-mode .app-shell { margin: 0; width: 100%; max-width: none; padding: 0; }
  .btn-popout { background: rgba(0,0,0,0.05); border: 1px solid var(--glass-border); color: var(--text-secondary); height: 28px; width: 28px; border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; margin-left:8px; }
  
  /* UTILS */
  .hidden { display: none !important; }
  .section-header { font-size: 1rem; font-weight: 700; color: var(--text-main); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); padding-bottom: 8px; }
  
  /* MODALS */
  .modal-blur { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
  .modal-blur.open { opacity: 1; pointer-events: auto; }
  .modal-window { background: var(--bg-root); width: 500px; max-width: 90%; padding: 32px; border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: 0 20px 60px rgba(0,0,0,0.5); transform: scale(0.95); transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
  body.dark .modal-window { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
  
  /* MISC */
  .brand { font-size: 1.4rem; font-weight: 800; display: flex; align-items: center; gap: 12px; }
  .brand-logo-diamond { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent-primary), var(--text-secondary)); border-radius: 6px; transform: rotate(45deg); display: flex; align-items: center; justify-content: center; }
  .brand-logo-inner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.9); border-radius: 3px; }
  .nav-island { display: flex; gap: 4px; background: rgba(0,0,0,0.05); padding: 4px; border-radius: 50px; }
</style>
