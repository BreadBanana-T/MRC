<!DOCTYPE html>
<html lang="en">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRC Center</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <?!= include('CSS'); ?>
  </head>
  <body>
    <div id="data-store" data-url="<?= appUrl ?>" style="display:none;"></div>
    <div id="app-config" 
         data-url="<?= appUrl ?>" 
         data-popout="<?= popoutParam ?>" 
         data-mode="<?= modeParam ?>" 
         style="display:none;"></div>

    <div class="aether-bg"><div class="blob b1"></div><div class="blob b2"></div></div>
    
    <div class="app-shell" id="main-layout">
        <header class="top-deck">
            <div class="brand">
                <div class="brand-logo-diamond"><div class="brand-logo-inner"></div></div>
                <span>MRC Center</span>
            </div>
            
            <nav class="nav-island">
                <button class="nav-btn active" id="btn-overview" onclick="setView('overview')">Dashboard</button>
                <button class="nav-btn" id="btn-agents" onclick="setView('agents')">Floor</button>
                <button class="nav-btn" id="btn-scripts" onclick="setView('scripts')">Scripts</button>
                <button class="nav-btn" id="btn-weather" onclick="setView('weather')">Weather</button>
                <button class="nav-btn" id="btn-calc" onclick="setView('calc')">Calc</button>
            </nav>

            <div class="action-group">
                <div class="kpi-row">
                    <div class="kpi-box"><h4>SVL</h4><div id="hdr-sl">--</div></div>
                    <div class="kpi-box"><h4>Time</h4><div id="clock">00:00</div></div>
                </div>
                <div style="height:30px; width:1px; background:var(--glass-border);"></div>
                
                <button class="action-btn" onclick="toggleTheme()" title="Toggle Theme"><i data-lucide="sun-moon" width="20"></i></button>
                
                <button class="action-btn" onclick="toggleNotifPanel()" title="Notifications">
                    <i data-lucide="bell" width="20"></i>
                    <div id="notif-dot" style="position:absolute; top:10px; right:10px; width:6px; height:6px; background:var(--status-alert); border-radius:50%; display:none;"></div>
                </button>

                <button class="action-btn" id="btn-insights" onclick="setView('insights')" title="Manager Insights & History">
                    <i data-lucide="bar-chart-2" width="20"></i>
                </button>

                <button class="action-btn" onclick="openJournal()" title="Operations Log"><i data-lucide="clipboard-list" width="20"></i></button>
                
                <button class="action-btn" onclick="openImportModal()" title="Import Schedule"><i data-lucide="download" width="20"></i></button>
            </div>
        </header>
        <main class="viewport" id="content"></main>
    </div>

    <div id="notif-panel" class="drawer">
        <div class="flex-between" style="padding:24px; border-bottom:1px solid var(--glass-border);">
            <h3 style="margin:0; font-size:1.2rem; font-weight:800;">Updates</h3>
            <button onclick="toggleNotifPanel()" style="background:none; border:none; color:var(--text-main); cursor:pointer;"><i data-lucide="x"></i></button>
        </div>
        <div id="notif-list" style="padding:24px; overflow-y:auto; flex:1;"></div>
    </div>
    
    <div id="import-modal" class="modal-blur" onclick="closeImportModal()">
       <div class="modal-window" onclick="event.stopPropagation()">
          <h2 style="margin-top:0; font-size:1.5rem; font-weight:800; margin-bottom:24px;">Import Data</h2>
          <textarea id="import-text" class="input-aether mb-6" style="height:auto;" rows="8" placeholder="Paste Schedule Text..."></textarea>
          <div style="display:flex; justify-content:flex-end; gap:16px;">
             <button class="btn btn-glass" onclick="closeImportModal()">Cancel</button>
             <button class="btn btn-primary" onclick="runImportAction()">Sync</button>
          </div>
       </div>
    </div>

    <div id="break-modal" class="modal-blur" onclick="document.getElementById('break-modal').classList.remove('open')">
       <div class="modal-window" onclick="event.stopPropagation()">
          <h2 style="margin-top:0; font-size:1.5rem; font-weight:800; margin-bottom:24px;">Edit Schedule</h2>
          <div id="break-editor-list" style="max-height:300px; overflow-y:auto; margin-bottom:24px;"></div>
          <div style="display:flex; justify-content:flex-end; gap:16px;">
             <button class="btn btn-glass" onclick="document.getElementById('break-modal').classList.remove('open')">Close</button>
             <button class="btn btn-primary" onclick="saveBreaks()">Save</button>
          </div>
       </div>
    </div>

    <div id="ot-modal" class="modal-blur" onclick="document.getElementById('ot-modal').classList.remove('open')">
       <div class="modal-window" onclick="event.stopPropagation()">
          <h2 style="margin-top:0; font-size:1.5rem; font-weight:800; margin-bottom:24px;">Log Overtime</h2>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:30px;">
             <div><label class="text-sm font-bold text-muted mb-2 block">START</label><input id="ot-start" class="input-aether" placeholder="17:00"></div>
             <div><label class="text-sm font-bold text-muted mb-2 block">END</label><input id="ot-end" class="input-aether" placeholder="21:00"></div>
          </div>
          <div style="display:flex; justify-content:flex-end; gap:16px;">
             <button class="btn btn-glass" onclick="document.getElementById('ot-modal').classList.remove('open')">Cancel</button>
             <button class="btn btn-primary" onclick="saveOvertime()">Confirm</button>
          </div>
       </div>
    </div>

    <div id="journal-modal" class="modal-blur" onclick="document.getElementById('journal-modal').classList.remove('open')">
       <div class="modal-window" onclick="event.stopPropagation()" style="width:600px;">
          <h2 style="margin-top:0; font-size:1.5rem; font-weight:800; margin-bottom:16px;">Operations Log</h2>
          <select id="journal-cat" class="input-aether" style="margin-bottom:12px; font-weight:600;">
              <option value="General">General / Handover</option>
              <option value="Critical">Critical Event</option>
              <option value="Weather">Weather Alert</option>
              <option value="Maintenance">Maintenance</option>
          </select>
          <textarea id="journal-text" class="input-aether" style="height:200px; resize:none; line-height:1.5; padding:16px; margin-bottom:24px;" placeholder="Log an event..."></textarea>
          <div style="display:flex; justify-content:flex-end; gap:16px;">
             <button class="btn btn-glass" onclick="document.getElementById('journal-modal').classList.remove('open')">Cancel</button>
             <button id="btn-submit-journal" class="btn btn-primary" onclick="submitJournal()">Log Entry</button>
          </div>
       </div>
    </div>
    
    <div id="weather-modal" class="modal-blur" onclick="document.getElementById('weather-modal').classList.remove('open')">
       <div class="modal-window" onclick="event.stopPropagation()">
          <div class="flex-between mb-4">
             <div><h2 id="wm-city" style="font-size:1.8rem; font-weight:800; margin:0;">City</h2><div id="wm-cond" style="color:var(--text-accent); font-weight:700; margin-top:4px;">Condition</div></div>
             <div style="text-align:right;"><div id="wm-wind" style="font-size:3rem; font-weight:800; color:var(--text-main); line-height:1;">--</div><div class="kpi-label">KM/H WIND</div></div>
          </div>
          <div style="padding:16px; background:var(--bg-root); border-radius:16px; margin-bottom:24px; display:flex; align-items:center; gap:12px;">
             <i data-lucide="thermometer" style="color:var(--text-muted);"></i>
             <div style="font-weight:700;"><span id="wm-temp" style="font-size:1.2rem;">--</span> <span style="font-size:0.9rem; color:var(--text-muted);">TEMP</span></div>
          </div>
          <div id="wm-forecast" style="max-height:200px; overflow-y:auto; margin-bottom:24px;"></div>
          <div style="display:flex; justify-content:flex-end; gap:16px;">
              <button class="btn btn-glass" onclick="copyWindTemplate()"><i data-lucide="copy" width="16"></i> Copy Winds</button>
              <button class="btn btn-primary" onclick="document.getElementById('weather-modal').classList.remove('open')">Done</button>
          </div>
       </div>
    </div>

    <div id="toast" style="position:fixed; bottom:30px; right:30px; background:var(--text-main); color:var(--bg-root); padding:14px 28px; border-radius:50px; opacity:0; pointer-events:none; transition:0.3s; font-weight:700; box-shadow:0 10px 30px rgba(0,0,0,0.2); z-index:2000; display:flex; gap:12px; align-items:center;">
       <i data-lucide="check-circle" width="20" style="color:var(--status-active);"></i> <span id="toast-msg">Success</span>
    </div>

    <div id="agent-menu" class="ctx-menu">
        <button class="ctx-item" onclick="setAgentStatus('role', 'ICL')">Assign ICL</button>
        <button class="ctx-item" onclick="setAgentStatus('role', 'SAFE')">Assign SAFE</button>
        <button class="ctx-item" onclick="setAgentStatus('role', 'Active')">Clear Role / Set Active</button>
        <div style="height:1px; background:var(--glass-border); margin:4px 0;"></div>
        <button class="ctx-item" style="color:var(--status-alert);" onclick="setAgentStatus('absent', 'SICK')">Mark Sick</button>
        <button class="ctx-item" onclick="openBreakModal()">Edit Schedule</button>
        <button class="ctx-item" onclick="openOtModal()">Log Overtime</button>
    </div>
    <div id="overlay" onclick="closeMenu()" style="position:fixed; inset:0; z-index:400; display:none;"></div>

    <div id="compose-area" class="aether-card" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:600px; max-width:90%; z-index:2000; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <div class="flex-between" style="margin-bottom:20px;">
            <h2 style="margin:0;">Compose Script</h2>
            <button onclick="closeComposeMode()" class="btn-icon-sm"><i data-lucide="x"></i></button>
        </div>
        <div style="display:flex; gap:12px; margin-bottom:12px;">
            <input id="new-script-title" class="input-aether" placeholder="Script Title" style="flex:1;">
            <div style="position:relative; width:150px;">
               <input id="new-script-cat" class="input-aether" placeholder="Category" list="cat-suggestions">
               <datalist id="cat-suggestions"></datalist>
            </div>
        </div>
        <textarea id="new-script-body" class="input-aether" style="min-height:300px; resize:none; line-height:1.6; height:auto; align-items:start; padding-top:12px; margin-bottom:20px;" placeholder="Content (HTML/Emojis supported)..."></textarea>
        <div style="display:flex; justify-content:flex-end;">
            <button class="btn btn-primary" onclick="addScript()">Save Script</button>
        </div>
    </div>
    <div id="compose-overlay" onclick="closeComposeMode()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1900;"></div>

    <?!= include('JavaScript'); ?>
  </body>
</html>
