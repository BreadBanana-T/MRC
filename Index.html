<!DOCTYPE html>
<html lang="en">
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRC Operations Portal</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Cdefs%3E%3ClinearGradient id='logoGrad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%234f46e5' /%3E%3Cstop offset='100%25' stop-color='%23475569' /%3E%3C/linearGradient%3E%3C/defs%3E%3Cg transform='rotate(45, 64, 64)'%3E%3Crect x='24' y='24' width='80' height='80' rx='16' fill='url(%23logoGrad)' /%3E%3Crect x='44' y='44' width='40' height='40' rx='8' fill='none' stroke='%23ffffff' stroke-width='5' stroke-opacity='0.9' /%3E%3C/g%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Cdefs%3E%3ClinearGradient id='logoGrad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%234f46e5' /%3E%3Cstop offset='100%25' stop-color='%23475569' /%3E%3C/linearGradient%3E%3C/defs%3E%3Cg transform='rotate(45, 64, 64)'%3E%3Crect x='24' y='24' width='80' height='80' rx='16' fill='url(%23logoGrad)' /%3E%3Crect x='44' y='44' width='40' height='40' rx='8' fill='none' stroke='%23ffffff' stroke-width='5' stroke-opacity='0.9' /%3E%3C/g%3E%3C/svg%3E">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <?!= include('CSS'); ?>
  </head>
  <body>
    <div id="app-config" 
         data-url="<?= appUrl ?>" 
         data-popout="<?= popoutParam ?>" 
         data-mode="<?= modeParam ?>" 
         style="display:none;"></div>

    <div class="aether-bg"><div class="blob b1"></div><div class="blob b2"></div></div>
    
    <div class="app-shell" id="main-layout">
        <header class="top-deck">
            <div class="brand">
                <div class="brand-logo-diamond"><div class="brand-logo-inner"></div></div>
                <span>MRC Operations Portal</span>
            </div>
            
            <nav class="nav-island">
                <button class="nav-btn active" id="btn-overview" onclick="setView('overview')">Dashboard</button>
                <button class="nav-btn" id="btn-agents" onclick="setView('agents')">Floor</button>
                <button class="nav-btn" id="btn-scripts" onclick="setView('scripts')">Scripts</button>
                <button class="nav-btn" id="btn-weather" onclick="setView('weather')">Weather</button>
                <button class="nav-btn" id="btn-calc" onclick="setView('calc')">Calc</button>
                <button class="nav-btn" id="btn-tracker" onclick="setView('tracker')">Tracker</button>
            </nav>

            <div class="action-group">
                <div class="kpi-row">
                    <div class="kpi-box"><h4>SVL</h4><div id="hdr-sl">--</div></div>
                    <div class="kpi-box"><h4>ACK</h4><div id="hdr-ack" style="color:var(--text-secondary);">--</div></div>
                    <div class="kpi-box"><h4>Time</h4><div id="clock">00:00</div></div>
                </div>
                <div style="height:30px; width:1px; background:var(--glass-border);"></div>
                <button class="action-btn" onclick="toggleTheme()"><i data-lucide="sun-moon" width="20"></i></button>
                <button class="action-btn" onclick="toggleNotifPanel()"><i data-lucide="bell" width="20"></i><div id="notif-dot" style="display:none; position:absolute; top:8px; right:8px; width:8px; height:8px; background:var(--status-alert); border-radius:50%;"></div></button>
                <button class="action-btn" id="btn-insights" onclick="setView('insights')"><i data-lucide="bar-chart-2" width="20"></i></button>
                <button class="action-btn" onclick="openImportModal()"><i data-lucide="download" width="20"></i></button>
            </div>
        </header>
        <main class="viewport" id="content"></main>
    </div>

    <div id="notif-panel" class="drawer" style="right:20px; top:80px; bottom:auto; height:500px; transform:translateX(120%);">
        <div class="section-header" style="padding:20px;">
            <span>Notifications</span>
            <button class="btn-icon-sm" onclick="toggleNotifPanel()"><i data-lucide="x" width="20"></i></button>
        </div>
        <div id="notif-list" style="overflow-y:auto; flex:1; padding:0 20px 20px;"></div>
    </div>

    <div id="agent-menu" class="ctx-menu">
        <button class="ctx-item" onclick="setAgentStatus('role', 'ICL')">Assign ICL</button>
        <button class="ctx-item" onclick="setAgentStatus('role', 'SAFE')">Assign SAFE</button>
        <button class="ctx-item" onclick="setAgentStatus('role', 'ULC FIRE')" style="color:var(--status-ulc);">Assign ULC FIRE</button>
        <div style="height:1px; background:var(--glass-border); margin:4px 0;"></div>
        <button class="ctx-item" onclick="setAgentStatus('role', 'Active')">Set Active</button>
        <div style="height:1px; background:var(--glass-border); margin:4px 0;"></div>
        <button class="ctx-item" style="color:var(--status-alert);" onclick="setAgentStatus('absent', 'SICK')">Mark Sick</button>
        <button class="ctx-item" onclick="openBreakModal()">Edit Schedule</button>
        <button class="ctx-item" onclick="openOtModal()">Log Overtime</button>
    </div>
    
    <div id="overlay" onclick="closeMenu()" style="position:fixed; inset:0; z-index:400; display:none;"></div>

    <div id="import-modal" class="modal-blur">
       <div class="modal-window" onclick="event.stopPropagation()">
          <h2 style="margin-top:0;">Import Data</h2>
          <textarea id="import-text" class="input-aether mb-6" rows="8" placeholder="Paste WFM schedule text here... (Also accepts IDP paste for the Tracker)"></textarea>
          <div style="display:flex; justify-content:flex-end; gap:16px; margin-top:16px;">
             <button class="btn btn-glass" onclick="closeImportModal()">Cancel</button>
             <button class="btn btn-primary" onclick="runImportAction()">Sync</button>
          </div>
       </div>
    </div>

    <div id="compose-overlay" class="modal-blur">
        <div id="compose-area" class="modal-window">
            <h2 style="margin-top:0;">Compose Script</h2>
            <input id="new-script-title" class="input-aether" placeholder="Title" style="margin-bottom:12px;">
            <input id="new-script-cat" class="input-aether" placeholder="Category (Optional)" style="margin-bottom:12px;">
            <textarea id="new-script-body" class="input-aether" style="height:150px; margin-bottom:16px;" placeholder="Script content..."></textarea>
            <div style="display:flex; justify-content:flex-end; gap:12px;">
                <button class="btn btn-glass" onclick="closeComposeMode()">Cancel</button>
                <button class="btn btn-primary" onclick="addScript()">Save</button>
            </div>
        </div>
    </div>

    <div id="event-modal" class="modal-blur">
       <div class="modal-window" onclick="event.stopPropagation()" style="width:500px;">
          <h2 id="evt-modal-title" style="margin-top:0;">Event Title</h2>
          <div id="evt-modal-time" style="color:var(--accent-primary); font-weight:700; margin-bottom:16px;"></div>
          <div id="evt-modal-desc" style="white-space:pre-wrap; color:var(--text-secondary); line-height:1.5; max-height:300px; overflow-y:auto; background:rgba(0,0,0,0.03); padding:12px; border-radius:8px;"></div>
          <div style="display:flex; justify-content:flex-end; margin-top:20px;">
             <button class="btn btn-primary" onclick="document.getElementById('event-modal').classList.remove('open')">Close</button>
          </div>
       </div>
    </div>
    
    <div id="break-modal" class="modal-blur">
        <div class="modal-window" onclick="event.stopPropagation()">
            <h2 style="margin-top:0;">Edit Schedule</h2>
            <div id="break-editor" style="max-height:300px; overflow-y:auto; margin-bottom:20px;"></div>
            <div style="display:flex; justify-content:flex-end; gap:12px;">
                <button class="btn btn-glass" onclick="document.getElementById('break-modal').classList.remove('open')">Cancel</button>
                <button class="btn btn-primary" onclick="saveBreaks()">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="ot-modal" class="modal-blur">
        <div class="modal-window" onclick="event.stopPropagation()">
            <h2 style="margin-top:0;">Log Overtime</h2>
            <label style="font-size:0.8rem; font-weight:700; color:var(--text-muted);">OT Start</label>
            <input id="ot-start" class="input-aether" placeholder="17:00" style="margin-bottom:12px;">
            <label style="font-size:0.8rem; font-weight:700; color:var(--text-muted);">OT End</label>
            <input id="ot-end" class="input-aether" placeholder="20:00" style="margin-bottom:12px;">
            <div style="display:flex; justify-content:flex-end; gap:12px;">
                <button class="btn btn-glass" onclick="document.getElementById('ot-modal').classList.remove('open')">Cancel</button>
                <button class="btn btn-primary" onclick="saveOvertime()">Submit OT</button>
            </div>
        </div>
    </div>

    <div id="toast" style="position:fixed; bottom:24px; right:24px; background:var(--text-main); color:var(--bg-root); padding:12px 24px; border-radius:12px; font-weight:700; opacity:0; transform:translateY(20px); transition:0.3s; z-index:2000; display:flex; align-items:center; gap:10px;">
        <i data-lucide="check-circle" width="18"></i>
        <span id="toast-msg">Action Completed</span>
    </div>

    <?!= include('JavaScript'); ?>
  </body>
</html>
