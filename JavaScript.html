<script>
  var refreshIcons = function() { if(typeof lucide !== 'undefined') lucide.createIcons(); };
  
  // CLOSES NOTIFICATION PANEL ON OUTSIDE CLICK
  document.addEventListener('click', function(e) {
      var panel = document.getElementById('notif-panel');
      var bellBtn = document.getElementById('btn-bell');
      if (state.notifOpen && panel && !panel.contains(e.target) && (!bellBtn || !bellBtn.contains(e.target))) {
          toggleNotifPanel();
      }
  });

  var state = { 
      view: 'overview', 
      agents: {}, 
      pendingUpdates: {}, 
      weather: {}, 
      slHistory: [], 
      calendarEvents: [],
      roleLogs: [], 
      statsLogs: [], 
      currentSL: "--", 
      currentACK: "--", 
      selectedAgent: null, 
      searchTerm: "", 
      regionFilter: 'All', 
      notifications: [], 
      knownNotifs: new Set(),
      dismissedNotifs: new Set(), 
      notifOpen: false, 
      scripts: [], 
      agentTab: 'floor', 
      currentReport: "...", 
      selectedCategory: "All", 
      selectedScriptId: null, 
      editingId: null, 
      appUrl: "", 
      insightMode: 'day', 
      selectedDate: new Date().toISOString().split('T')[0],
      insightSearch: '',
      unifiedReport: null,
      archiveList: [],
      selectedArchive: 'LIVE',
      trackerData: null,
      trackerMode: 'furlough', 
      trackerDate: new Date().toISOString().split('T')[0],
      trackerRange: 'day',
      trackerRegion: 'Onshore', 
      trackerCycleFilter: 'ALL',
      trackerSearch: '',
      trackerLoading: true,
      syncMeta: { sched: "Loading...", idp: "Loading...", muSet: "" }
  };

  if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
  } else {
      initApp();
  }

  function initApp() {
    try { if (localStorage.getItem('rta_theme') === 'dark') document.body.classList.add('dark'); } catch(e) {}
    
    var config = document.getElementById('app-config');
    if (config) {
        state.appUrl = config.getAttribute('data-url');
        var popout = config.getAttribute('data-popout');
        var mode = config.getAttribute('data-mode');

        if (popout === "true") {
            document.body.classList.add('popout-mode');
            state.view = 'popout-view'; 
            state.regionFilter = (mode === 'onshore' ? 'Onshore' : (mode === 'offshore' ? 'Offshore' : (mode === 'breaks' ? 'Breaks' : 'All')));
            document.getElementById('content').innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted); font-weight:700;">Loading Floor...</div>';
            if (typeof google !== 'undefined') { setInterval(fetchData, 30000); fetchData(); }
            return;
        }
    }
    
    render(); 
    setInterval(updateClock, 1000); 
    setInterval(fetchData, 60000); 
    setInterval(fetchNotifications, 10000);
    setInterval(fetchCalendar, 300000); 
    setInterval(function() { if(state.view === 'insights') render(); }, 60000); 
    
    fetchData(); 
    fetchStats(); 
    fetchArchiveList();
    fetchNotifications();
    fetchCalendar();
    fetchTrackerData(); 
    fetchMetadata();
  }

  function fetchMetadata() {
      if(typeof google==='undefined') return;
      google.script.run.withSuccessHandler(function(res) {
          try { state.syncMeta = JSON.parse(res); render(); } catch(e){}
      }).fetchSyncMetadata();
  }

  function fallbackCopyTextToClipboard(text, successMsg) {
      var textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.top = "0"; textArea.style.left = "0"; textArea.style.position = "fixed"; 
      document.body.appendChild(textArea);
      textArea.focus(); textArea.select();
      try { document.execCommand('copy'); showToast(successMsg || "Copied"); } catch (err) { showToast("Copy Failed"); }
      document.body.removeChild(textArea);
  }

  window.setView = function(v) { 
      state.view = v; 
      if(v==='scripts') fetchScripts(); 
      if(v==='insights') fetchInsightData(); 
      if(v==='tracker') fetchTrackerData(); 
      render(); 
  };
  
  window.setAgentTab = function(tab) { state.agentTab = tab; render(); };
  window.setInsightMode = function(m) { state.insightMode = m; fetchInsightData(); render(); };
  window.handleDateChange = function(val) { state.selectedDate = val; fetchInsightData(); render(); };
  window.toggleTheme = function() { document.body.classList.toggle('dark'); try{ localStorage.setItem('rta_theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }catch(e){} render(); };
  
  window.openImportModal = function() { document.getElementById('import-modal').classList.add('open'); };
  window.closeImportModal = function() { document.getElementById('import-modal').classList.remove('open'); };
  window.toggleNotifPanel = function() { var p=document.getElementById('notif-panel'); state.notifOpen=!state.notifOpen; p.classList.toggle('open'); if(state.notifOpen) renderNotifList(); };
  
  window.openMenu = function(e, n) { 
      state.selectedAgent=n; 
      var m=document.getElementById('agent-menu'), o=document.getElementById('overlay'); 
      o.style.display='block'; m.style.display='flex'; 
      var r=e.currentTarget.getBoundingClientRect(); 
      m.style.top=(r.bottom+10)+'px'; m.style.left=(r.left)+'px'; 
  };
  window.closeMenu = function() { document.getElementById('agent-menu').style.display='none'; document.getElementById('overlay').style.display='none'; };
  
  window.setAgentStatus = function(type, val) { 
      closeMenu(); 
      var name=state.selectedAgent; 
      state.pendingUpdates[name]={type: type, val: val, timestamp:Date.now()}; 
      moveAgentInMemory(name,type,val); 
      if(state.view==='agents') render(); 
      showToast("Status Updated"); 
      if(typeof google!=='undefined') google.script.run.updateAgentStatus(name,type,val); 
  };
  
  window.openPopout = function(mode) { 
      var baseUrl = state.appUrl || window.location.href.split('?')[0]; 
      var sep = baseUrl.indexOf('?') !== -1 ? '&' : '?'; 
      window.open(baseUrl + sep + "popout=true&mode=" + mode.toLowerCase(), '_blank', 'width=450,height=800,menubar=no,toolbar=no,location=no,status=no'); 
  };

  function showToast(m) { 
      var t=document.getElementById('toast'); 
      if(!t) return; 
      t.querySelector('#toast-msg').innerText=m; 
      t.style.opacity='1'; t.style.transform='translateY(0)'; 
      setTimeout(function(){t.style.opacity='0'; t.style.transform='translateY(20px)';},3000); 
  }

  function updateClock() { var el=document.getElementById('clock'); if(el) el.innerText=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
  
  var searchTimeout;
  window.handleSearch = function(val) { clearTimeout(searchTimeout); searchTimeout = setTimeout(function() { state.searchTerm = val; render(); }, 200); };
  window.handleScriptSearch = function(val) { clearTimeout(searchTimeout); searchTimeout = setTimeout(function() { state.searchTerm = val; render(); }, 200); };
  window.handleTrackerSearch = function(val) { clearTimeout(searchTimeout); searchTimeout = setTimeout(function() { state.trackerSearch = val; render(); }, 200); };
  window.handleInsightSearch = function(val) { clearTimeout(searchTimeout); searchTimeout = setTimeout(function() { state.insightSearch = val; render(); }, 200); };

  function setRegionFilter(v) { state.regionFilter=v; render(); }

  window.handleRangeChange = function(val) {
      state.trackerRange = val; state.trackerCycleFilter = 'ALL'; 
      var parts = state.trackerDate.split('-');
      var y = parseInt(parts[0], 10), m = parseInt(parts[1], 10), d = parseInt(parts[2], 10);
      var selDate = new Date(y, m-1, d, 12, 0, 0); 
      
      if (val === 'month' || val === 'quarter') { selDate.setDate(1); state.trackerDate = selDate.toISOString().split('T')[0]; } 
      else if (val === 'week') {
          var day = selDate.getDay(); var offset = (day >= 4) ? (4 - day) : -(day + 3); 
          selDate.setDate(selDate.getDate() + offset);
          var ny = selDate.getFullYear(); var nm = selDate.getMonth() + 1; var nd = selDate.getDate();
          state.trackerDate = ny + "-" + (nm < 10 ? '0'+nm : nm) + "-" + (nd < 10 ? '0'+nd : nd);
      }
      fetchTrackerData(); render();
  };

  window.toggleCycleFilter = function(targetCycle) {
      if (state.trackerRange === 'week') {
          if (targetCycle === 'ALL') return;
          var parts = state.trackerDate.split('-');
          var y = parseInt(parts[0], 10), m = parseInt(parts[1], 10), d = parseInt(parts[2], 10);
          var dObj = new Date(y, m-1, d, 12, 0, 0); 
          var day = dObj.getDay(); var offset = (day >= 4) ? (4 - day) : -(day + 3);
          dObj.setDate(dObj.getDate() + offset);
          
          var baseDate = new Date(2026, 0, 29, 12, 0, 0); 
          var diffWeeks = Math.floor(Math.round((dObj - baseDate) / 86400000) / 7);
          var isWeekB = (Math.abs(diffWeeks) % 2 === 1);
          var currentCycle = isWeekB ? 'WEEK B' : 'WEEK A';

          if (targetCycle === 'WEEK A' && currentCycle === 'WEEK B') dObj.setDate(dObj.getDate() - 7);
          else if (targetCycle === 'WEEK B' && currentCycle === 'WEEK A') dObj.setDate(dObj.getDate() - 7);
          
          var ny = dObj.getFullYear(); var nm = dObj.getMonth() + 1; var nd = dObj.getDate();
          state.trackerDate = ny + "-" + (nm < 10 ? '0'+nm : nm) + "-" + (nd < 10 ? '0'+nd : nd);
          state.trackerCycleFilter = 'ALL';
      } 
      else if (state.trackerRange === 'month' || state.trackerRange === 'quarter') {
          if (state.trackerCycleFilter === targetCycle) state.trackerCycleFilter = 'ALL';
          else state.trackerCycleFilter = targetCycle;
      }
      fetchTrackerData(); render();
  };

  function fetchData() {
    if(typeof google==='undefined') return;
    
    // 1. Fetch Floor Data
    google.script.run.withSuccessHandler(function(j) {
        try{ 
            var d = JSON.parse(j); 
            if(d){ 
                for (var k in d) { state.agents[k] = d[k]; }
                applyPendingUpdates(); 
                if(state.view !== 'scripts' && state.view !== 'calc' && state.view !== 'insights' && state.view !== 'tracker') render(); 
            } 
        } catch(e){}
    }).getFloorStatus();

    if(state.view !== 'popout-view') {
        // 2. Fetch Weather and Alerts direct from Google Server Engine
        google.script.run.withSuccessHandler(function(r) { 
            try{ 
                var d = (typeof r==='object'&&r!==null) ? r : JSON.parse(r); 
                state.weather = d.weather || {};
                state.alerts = d.alerts || []; 
                if(state.view === 'overview' || state.view === 'weather') render(); 
            }catch(e){} 
        }).getLiveDashboardData();
    }
  }

  function fetchNotifications() { 
      if(typeof google==='undefined') return; 
      google.script.run.withSuccessHandler(function(j) {
          try{
              var fetched = JSON.parse(j);
              var activeNotifs = fetched.filter(function(n){ return !state.dismissedNotifs.has(String(n.id)); });
              
              activeNotifs.forEach(function(n) {
                  if(!state.knownNotifs.has(n.id)) {
                      state.knownNotifs.add(n.id);
                      showToast("🔔 " + n.text); 
                      
                      if (n.text.indexOf("Dashboards refreshed") !== -1) {
                          fetchData();
                          fetchMetadata();
                          if (state.view === 'tracker') fetchTrackerData();
                          if (state.view === 'insights') fetchInsightData();
                      }
                  }
              });

              state.notifications = activeNotifs;
              var dot = document.getElementById('notif-dot'); 
              if(dot) dot.style.display = state.notifications.length ? 'block' : 'none'; 
              if(state.notifOpen) renderNotifList(); 
          } catch(e) {}
      }).getSystemNotifications(); 
  }

  window.renderNotifList = function() {
      var list = document.getElementById('notif-list');
      if(!list) return;
      
      var visibleNotifs = state.notifications.filter(function(n) { return !state.dismissedNotifs.has(String(n.id)); });

      list.innerHTML = visibleNotifs.map(function(n) { return `
          <div style="padding:16px; background:var(--card-bg); backdrop-filter:blur(20px); border:1px solid var(--glass-border); border-radius:16px; margin-bottom:12px; box-shadow:0 4px 15px rgba(0,0,0,0.05); position:relative; overflow:hidden; transition: 0.2s;">
              <div style="position:absolute; top:0; left:0; width:4px; height:100%; background:var(--accent-primary);"></div>
              <div style="font-size:0.75rem; color:var(--text-muted); margin-bottom:4px; margin-left:8px; font-weight:700;">${n.time}</div>
              <div style="font-weight:700; font-size:0.9rem; margin-bottom:12px; margin-left:8px;">${n.text}</div>
              <div style="display:flex; justify-content:flex-end;">
                  <button class="btn btn-glass" style="font-size:0.75rem; padding:4px 16px; height:28px;" onclick="dismissNotif('${n.id}')">Dismiss</button>
              </div>
          </div>
      `; }).join('') || '<div style="padding:20px; text-align:center; color:var(--text-muted); font-weight:600;">No new notifications.</div>';
  };
            
  window.dismissNotif = function(id) {
      state.dismissedNotifs.add(String(id));
      renderNotifList(); 
      if(typeof google !== 'undefined') google.script.run.dismissSystemNotification(id);
      
      var dot = document.getElementById('notif-dot'); 
      var count = state.notifications.filter(function(n){return !state.dismissedNotifs.has(String(n.id));}).length;
      if(dot) dot.style.display = count ? 'block' : 'none';
  };

  function fetchCalendar() { 
      if(typeof google==='undefined') return; 
      google.script.run.withSuccessHandler(function(j) {
          try {
              state.calendarEvents = JSON.parse(j); 
              if(state.view === 'overview') render(); 
              
              var now = new Date();
              for (var i = 0; i < state.calendarEvents.length; i++) {
                  var e = state.calendarEvents[i];
                  if(e.type === 'maintenance') {
                      var parts = (e.startTime || "").match(/(\d{1,2}):(\d{2})/);
                      if(parts) {
                          var evTime = new Date();
                          evTime.setHours(parseInt(parts[1], 10), parseInt(parts[2], 10), 0, 0);
                          var diffMins = (evTime - now) / 60000;
                          if(diffMins > 0 && diffMins <= 15) {
                              showToast("⚠️ Maintenance starts in " + Math.ceil(diffMins) + " mins!");
                          }
                      }
                  }
              }
          } catch(e) {}
      }).getDailyCalendarEvents(); 
  }

  function fetchStats() {
      if(typeof google === 'undefined') return;
      google.script.run.withSuccessHandler(function(j) {
          try {
              var h = JSON.parse(j);
              if(h && h.length){
                  state.slHistory = h;
                  var latest = h[h.length-1];
                  state.currentSL = latest.val + "%";
                  state.currentACK = latest.ack + "s";
                  
                  var slEl = document.getElementById('hdr-sl');
                  if(slEl) slEl.innerText = state.currentSL;
                  
                  var ackEl = document.getElementById('hdr-ack');
                  if(ackEl) ackEl.innerText = state.currentACK;

                  if(state.view === 'overview') render();
              }
          } catch(e) {}
      }).getStatsHistory();
  }

  function fetchArchiveList() {
      if(typeof google === 'undefined') return;
      google.script.run.withSuccessHandler(function(res) {
          try { state.archiveList = JSON.parse(res); if(state.view === 'insights') render(); } catch(e) {}
      }).getArchiveList();
  }
  
  function fetchScripts() { if(typeof google!=='undefined') google.script.run.withSuccessHandler(function(res) { try { state.scripts = JSON.parse(res); render(); } catch(e) {} }).fetchScripts(); }
  
  var insightFetchToken = 0;
  function fetchInsightData() {
      if(typeof google === 'undefined') return;
      state.unifiedReport = null; 
      var myToken = ++insightFetchToken;
      
      if (state.view === 'insights') render();

      if (state.selectedArchive === 'LIVE') {
          google.script.run.withSuccessHandler(function(res) {
              if (myToken !== insightFetchToken) return;
              try { state.unifiedReport = JSON.parse(res); } catch(e) {}
              if (state.view === 'insights') render();
          }).getUnifiedWeeklyReport(state.selectedDate);
      } else {
          google.script.run.withSuccessHandler(function(res) {
              if (myToken !== insightFetchToken) return;
              try { state.unifiedReport = JSON.parse(res); } catch(e) {}
              if (state.view === 'insights') render();
          }).getArchivedReport(state.selectedArchive);
      }
  }

  var trackerFetchToken = 0;
  function fetchTrackerData() {
      if (typeof google === 'undefined') return;
      state.trackerLoading = true;
      var myToken = ++trackerFetchToken;
      
      if (state.view === 'tracker') render(); 
      
      google.script.run.withSuccessHandler(function(res) {
          if (myToken !== trackerFetchToken) return;
          try { state.trackerData = JSON.parse(res); } catch(e) {}
          state.trackerLoading = false;
          if (state.view === 'tracker') render(); 
      }).withFailureHandler(function(err) {
          if (myToken !== trackerFetchToken) return;
          state.trackerLoading = false;
          if (state.view === 'tracker') render();
          showToast("Data error: " + err.message);
      }).getWorkforceAnalytics(state.trackerRange, state.trackerDate, state.trackerMode, state.trackerRegion, state.trackerCycleFilter);
  }

  function applyPendingUpdates() { var now=Date.now(); for(var n in state.pendingUpdates) { if(now-state.pendingUpdates[n].timestamp>120000) delete state.pendingUpdates[n]; else moveAgentInMemory(n, state.pendingUpdates[n].type, state.pendingUpdates[n].val); } }
  
  function moveAgentInMemory(name, type, val) {
     var o = null; 
     for (var k in state.agents) { 
         if(!Array.isArray(state.agents[k])) continue; 
         for(var i=0; i<state.agents[k].length; i++) {
             if(state.agents[k][i].name === name) { o = state.agents[k][i]; break; }
         }
         if(o) break;
     }
     if(o) { 
         if (type === 'role') { o.role = (val === 'Active') ? '' : val; if(val === 'Active') { o.subStatus = ""; } }
         else if (type === 'absent') { o.subStatus = val; } 
     }
  }

  function render() {
      try {
          if (state.view === 'popout-view') { renderPopout(state.regionFilter); refreshIcons(); return; }

          var activeEl = document.activeElement;
          var activeId = activeEl ? activeEl.id : null;
          var cursorStart = activeEl && activeEl.tagName === 'INPUT' ? activeEl.selectionStart : null;
          var cursorEnd = activeEl && activeEl.tagName === 'INPUT' ? activeEl.selectionEnd : null;

          var sl = document.getElementById('hdr-sl');
          if(sl) sl.innerText = state.currentSL;
          var ackEl = document.getElementById('hdr-ack');
          if(ackEl) ackEl.innerText = state.currentACK;
          
          var c = document.getElementById('content');
          if(!c) return;

          var navBtns = document.querySelectorAll('.nav-btn, .action-btn');
          for(var i=0; i<navBtns.length; i++) { navBtns[i].classList.remove('active'); }
          var b = document.getElementById('btn-'+state.view); 
          if(b) b.classList.add('active');

          var h = '';
          try {
              if (state.view === 'overview') h = renderOverview();
              else if (state.view === 'agents') h = renderAgents();
              else if (state.view === 'weather') h = renderWeather();
              else if (state.view === 'calc') h = renderCalc();
              else if (state.view === 'scripts') h = renderScripts();
              else if (state.view === 'insights') h = renderInsights();
              else if (state.view === 'tracker') h = renderTracker();
          } catch(renderErr) {
              console.error("Tab Render Error:", renderErr);
              h = `<div class="aether-card" style="padding:60px; text-align:center; color:var(--status-alert);">
                      <i data-lucide="alert-triangle" width="48" style="margin-bottom:16px;"></i>
                      <h2 style="margin-top:0;">Tab Error</h2>
                      <p style="color:var(--text-secondary);">${renderErr.message}</p>
                   </div>`;
          }
          
          c.innerHTML = h; 
          refreshIcons();
          
          if (activeId) {
              var reFocus = document.getElementById(activeId);
              if (reFocus) {
                  reFocus.focus();
                  if (cursorStart !== null) {
                      try { reFocus.setSelectionRange(cursorStart, cursorEnd); } catch(e) {}
                  }
              }
          }
          
          if(state.view === 'overview') initOverviewChart();
          if(state.view === 'tracker') initTrackerChart(); 
      } catch(err) {
          console.error("Critical Render Error:", err);
          var c = document.getElementById('content');
          if(c) c.innerHTML = `<div class="aether-card" style="padding:60px; text-align:center; color:var(--status-alert);"><i data-lucide="alert-triangle" width="48"></i><h2>Critical Error</h2><p>${err.message}</p></div>`;
      }
  }

  function renderPopout(mode) {
     var c = document.getElementById('content');
     if(!c) return; 
     var upMap = {}; 
     var upBreakList = state.agents.upcomingBreak || [];
     for(var i=0; i<upBreakList.length; i++) { upMap[upBreakList[i].id] = upBreakList[i]; }
     
     var title = "All Units";
     if (mode === 'Onshore') title = "Onshore Unit";
     else if (mode === 'Offshore') title = "Offshore Unit";
     else if (mode === 'Breaks') title = "Break Room";
     
     var filterFn = function(list) {
        return (list||[]).filter(function(a) {
            if (mode === 'All') return true;
            if (mode === 'Breaks') return true; 
            return (a.region||"").indexOf(mode) !== -1;
        });
     };
     
     var h = `<div style="padding:20px;">
         <h2 style="margin-top:0; border-bottom:1px solid var(--glass-border); padding-bottom:10px;">${title}</h2>`;
     
     if (mode !== 'Breaks') {
         h += `
         <div style="font-weight:700; color:var(--text-muted); margin-bottom:10px;">Starting Soon</div>
         <div class="agent-list-view">${filterFn(state.agents.startingSoon).map(function(a){return renderAgentRow(a, upMap[a.id]);}).join('')}</div>
         <div style="font-weight:700; color:var(--text-muted); margin:20px 0 10px;">Active Floor</div>
         <div class="agent-list-view">${filterFn(state.agents.active).map(function(a){return renderAgentRow(a, upMap[a.id]);}).join('')}</div>`;
     }

     if (mode === 'Breaks' || mode === 'All' || mode === 'Onshore' || mode === 'Offshore') {
         var breakList = filterFn(state.agents.active).filter(function(a){return a.onBreakNow;});
         h += `<div style="font-weight:700; color:var(--text-muted); margin:20px 0 10px;">Break Room</div>
         <div class="agent-list-view">${breakList.length ? breakList.map(function(a){return renderAgentRow(a, upMap[a.id]);}).join('') : '<div style="opacity:0.5; font-size:0.8rem;">Empty</div>'}</div>`;
     }
     
     h += `</div>`;
     c.innerHTML = h;
     refreshIcons();
  }
  
  function renderAgents() {
      var upMap = {}; 
      var upBreakList = state.agents.upcomingBreak || [];
      for(var i=0; i<upBreakList.length; i++) { upMap[upBreakList[i].id] = upBreakList[i]; }
      
      return `
      <div class="sticky-header">
         <div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap; width:100%;">
             <input id="agent-search" class="input-aether" style="width:240px; height:34px; font-size:0.85rem;" placeholder="Search agents..." oninput="handleSearch(this.value)" value="${state.searchTerm || ''}">
             
             <button class="btn btn-glass" style="height:34px;" onclick="window.open('https://telus.sharepoint.com/sites/SAM/Lists/Queue_Manager/AllItems.aspx#InplviewHash590fd117-67d3-4b41-ac7c-4cbe29d7eb34=', '_blank')">
                 <i data-lucide="radio" width="16"></i> Tower Control
             </button>

             <div style="flex:1"></div>
             <div style="display:flex; gap:8px;">
                <button class="btn ${state.regionFilter==='All'?'btn-primary':'btn-glass'}" onclick="setRegionFilter('All')">All</button>
                <button class="btn ${state.regionFilter==='Onshore'?'btn-primary':'btn-glass'}" onclick="setRegionFilter('Onshore')">On</button>
                <button class="btn ${state.regionFilter==='Offshore'?'btn-primary':'btn-glass'}" onclick="setRegionFilter('Offshore')">Off</button>
             </div>
         </div>
      </div>
      ${renderFloorLayout(upMap)}`;
  }
  
  function renderFloorLayout(upMap) {
     var startingHtml = '';
     if (state.agents.startingSoon && state.agents.startingSoon.length > 0) {
         startingHtml = `
         <div class="aether-card" style="padding:20px; margin-bottom:24px; border-left:4px solid var(--accent-primary);">
             <div class="section-header" style="color:var(--accent-primary);">Starting Soon (Next 30m)</div>
             <div class="agent-list-view">${renderGroup(state.agents.startingSoon, upMap)}</div>
         </div>`;
     }

     var offHtml = '';
     if (state.searchTerm && state.searchTerm.trim() !== '') {
         var offAgents = state.agents.off || [];
         var offRendered = renderGroup(offAgents, upMap);
         if (offRendered) {
             offHtml = `
             <div class="group-header" style="opacity:0.6;"><i data-lucide="power-off" width="14"></i> Offline / Not Active</div>
             <div class="agent-list-view" style="opacity:0.6; margin-bottom:30px;">
                 ${offRendered}
             </div>`;
         }
     }

     return `
     ${startingHtml}

     <div class="group-header"><i data-lucide="shield" width="14"></i> Special Roles</div>
     <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:24px; margin-bottom:24px;">
        <div class="aether-card special-group" style="padding:20px;">
            <div class="section-header" style="color:var(--status-role);">ICL</div>
            <div class="agent-list-view">${renderGroup(state.agents.icl||[], upMap)}</div>
        </div>
        <div class="aether-card special-group" style="padding:20px;">
            <div class="section-header" style="color:var(--status-active);">SAFE</div>
            <div class="agent-list-view">${renderGroup(state.agents.safe||[], upMap)}</div>
        </div>
        <div class="aether-card special-group" style="padding:20px;">
            <div class="section-header" style="color:var(--status-ulc);">ULC FIRE</div>
            <div class="agent-list-view">${renderGroup(state.agents.ulc||[], upMap)}</div>
        </div>
     </div>

     <div class="grid-split" style="align-items:start;">
         <div style="display:flex; flex-direction:column; gap:20px;">
             <div class="aether-card" style="padding:24px;">
                 <div class="section-header">
                    Onshore Unit
                    <button class="btn-popout" title="Popout Onshore" onclick="openPopout('Onshore')"><i data-lucide="external-link" width="14"></i></button>
                 </div>
                 <div class="agent-list-view">${renderGroup((state.agents.active||[]).filter(function(a){return (a.region||'').indexOf('Onshore')!==-1;}), upMap)}</div>
             </div>
         </div>
         <div style="display:flex; flex-direction:column; gap:20px;">
             <div class="aether-card" style="padding:24px;">
                 <div class="section-header">
                    Offshore Unit
                    <button class="btn-popout" title="Popout Offshore" onclick="openPopout('Offshore')"><i data-lucide="external-link" width="14"></i></button>
                 </div>
                 <div class="agent-list-view">${renderGroup((state.agents.active||[]).filter(function(a){return (a.region||'').indexOf('Offshore')!==-1;}), upMap)}</div>
             </div>
         </div>
     </div>
     
     <div class="group-header"><i data-lucide="calendar" width="14"></i> Planned / Support</div>
     <div class="agent-list-view" style="opacity:0.8;">
         ${renderGroup([].concat(state.agents.vacation||[], state.agents.training||[], state.agents.planned||[]), upMap)}
     </div>

     <div class="group-header alert"><i data-lucide="alert-triangle" width="14"></i> Needs Attention</div>
     <div class="agent-list-view" style="margin-bottom:30px;">
        ${renderGroup(state.agents.unplanned || [], upMap) || '<div style="padding:10px; color:var(--text-muted); font-size:0.9rem;">No unplanned absences.</div>'}
     </div>
     
     ${offHtml}`;
  }
  
  function renderGroup(list, upMap) {
      if (!list) return '';
      var filtered = list.filter(function(a) {
         var safeName = a.name || '';
         var safeReg = a.region || '';
         var mName = !state.searchTerm || safeName.toLowerCase().indexOf(state.searchTerm.toLowerCase()) !== -1;
         var mReg = state.regionFilter === 'All' || safeReg.indexOf(state.regionFilter) !== -1;
         return mName && mReg;
      });
      if(!filtered.length) return '';
      return filtered.map(function(a){return renderAgentRow(a, upMap[a.id]);}).join('');
  }

  function renderAgentRow(a, upInfo) {
     var start = "00:00", end = "00:00";
     if (a.shift && a.shift.indexOf("?") === -1) { var parts = a.shift.split(' - '); if(parts.length===2){ start=parts[0]; end=parts[1]; } }
     
     var stripClass = (a.region || '').indexOf('Onshore') !== -1 ? 'on' : 'off';
     if(a.subStatus && a.subStatus.match(/SICK|NCNS|AWOL/)) stripClass = 'alert';
     if(a.onBreakNow) stripClass = 'break';

     var statusText = a.subStatus || "Active";
     var statusColor = "var(--text-secondary)";
     
     if (a.role && a.role.indexOf('SAFE') !== -1) { statusColor = "var(--status-active)"; }
     if (a.role && a.role.indexOf('ICL') !== -1) { statusColor = "var(--status-role)"; }
     if (a.role && (a.role.indexOf('ULC') !== -1 || a.role.indexOf('FIRE') !== -1)) { statusColor = "var(--status-ulc)"; }
     
     if (a.onBreakNow) {
         statusColor = "var(--status-break)";
         statusText = a.subStatus; 
     }

     var breakHtml = "";
     if (a.onBreakNow && a.currentBreakStr) {
         breakHtml += `<div style="font-size:0.75rem; opacity:0.8; margin-top:2px; color:var(--text-main); font-weight:500;">from ${a.currentBreakStr} • Remaining: <span style="font-weight:800; color:var(--status-break);">${a.timer}</span></div>`;
     } else if (upInfo && upInfo.nextBreakType && upInfo.startsIn) {
         breakHtml += `<div style="font-size:0.7rem; color:var(--text-muted); margin-top:2px; font-weight:500;"><span style="background:var(--card-bg); padding:2px 6px; border-radius:4px; border:1px solid var(--glass-border); font-size:0.65rem; margin-right:6px; font-weight:800; color:var(--text-main);">UPCOMING</span>${upInfo.nextBreakType} in <span style="font-weight:800; color:var(--text-main);">${upInfo.startsIn}</span></div>`;
     }

     if (a.shiftEndsIn) {
         breakHtml += `<div style="font-size:0.7rem; color:var(--status-alert); margin-top:2px; font-weight:500;"><span style="background:rgba(220, 38, 38, 0.1); padding:2px 6px; border-radius:4px; border:1px solid rgba(220, 38, 38, 0.2); font-size:0.65rem; margin-right:6px; font-weight:800; color:var(--status-alert);">SHIFT ENDS</span>in <span style="font-weight:800;">${a.shiftEndsIn}</span></div>`;
     }

     var prefix = (a.region || '').indexOf('Onshore') !== -1 ? 'T' : 'x';
     var formattedId = prefix + (a.id || '');
     
     var timeDisplay = start + "-" + end;
     if (!a.shift || a.shiftType === 'Off' || a.subStatus === 'Scheduled Off') {
         timeDisplay = "OFF";
     }

     return `
     <div class="agent-row" onclick="openMenu(event, '${(a.name || '').replace(/'/g, "\\'")}')">
        <div class="status-strip ${stripClass}"></div>
        <div class="row-name" data-full-name="${a.name || ''}">${a.name || ''}</div>
        
        <div style="display:flex; align-items:center; width:80px; cursor:pointer;" onclick="copyAgentInfo(event, '${formattedId}')" title="Click to Copy ID">
           <span class="row-id" style="text-decoration:underline dashed var(--glass-border); text-underline-offset:4px; font-weight:700; color:var(--text-muted); transition:0.2s;" onmouseover="this.style.color='var(--accent-primary)'" onmouseout="this.style.color='var(--text-muted)'">${formattedId}</span>
        </div>

        <div class="row-status" style="color:${statusColor};">
           <div><span style="font-weight:700;">${statusText}</span> ${a.isOT ? '<span style="font-size:0.7em; border:1px solid currentColor; padding:0 3px; border-radius:3px; margin-left:4px;">OT</span>' : ''}</div>
           ${breakHtml}
        </div>
        <div class="row-time">${timeDisplay}</div>
     </div>`;
  }
  
  window.copyAgentInfo = function(e, idText) {
      e.stopPropagation(); 
      fallbackCopyTextToClipboard(idText, `Copied: ${idText}`);
  }

  window.openBreakModal = function() {
      closeMenu();
      var name = state.selectedAgent;
      var agent = null;
      for(var k in state.agents) {
          if(!Array.isArray(state.agents[k])) continue;
          for(var i=0; i<state.agents[k].length; i++) {
              if(state.agents[k][i].name === name) { agent = state.agents[k][i]; break; }
          }
          if(agent) break;
      }
      
      if(!agent) { showToast("Agent data not found"); return; }
      
      var container = document.getElementById('break-editor');
      container.innerHTML = "";
      (agent.rawBreaks || []).forEach(function(b, i) {
          container.innerHTML += `
          <div style="margin-bottom:12px; border-bottom:1px solid var(--glass-border); padding-bottom:8px;">
              <div style="font-weight:700; font-size:0.8rem; margin-bottom:4px;">${b.type}</div>
              <div style="display:flex; gap:8px;">
                  <input id="bs-${i}" class="input-aether" value="${b.start || ''}" style="font-size:0.85rem;">
                  <input id="be-${i}" class="input-aether" value="${b.end || ''}" style="font-size:0.85rem;">
              </div>
          </div>`;
      });
      document.getElementById('break-modal').classList.add('open');
  };

  window.openOtModal = function() {
      closeMenu();
      document.getElementById('ot-start').value = "";
      document.getElementById('ot-end').value = "";
      document.getElementById('ot-modal').classList.add('open');
  };

  function renderOverview() {
      var unplanCount = (state.agents.unplanned||[]).length;
      var planCount = (state.agents.vacation||[]).length + (state.agents.planned||[]).length;
      var totalActive = Math.max(1, (state.agents.active||[]).length + 10);
      var shrinkPct = Math.round(((unplanCount + planCount) / totalActive) * 100);
      
      var safeCount = (state.agents.safe||[]).length;
      var iclCount = (state.agents.icl||[]).length;
      var ulcCount = (state.agents.ulc||[]).length;

      var eventsHtml = '<div style="padding:20px; text-align:center; color:var(--text-muted); font-size:0.8rem;">No meetings or maintenance scheduled.</div>';
      if(state.calendarEvents && state.calendarEvents.length > 0) {
          eventsHtml = state.calendarEvents.map(function(e, i) { return `
              <div onclick="openEventModal(${i})" style="padding:10px; border-bottom:1px solid var(--glass-border); display:flex; gap:10px; align-items:center; cursor:pointer; transition:0.2s;" class="hover-bg">
                 <div style="width:4px; height:30px; background:${e.type==='maintenance'?'var(--status-alert)':'var(--accent-primary)'}; border-radius:2px;"></div>
                 <div style="flex:1;">
                     <div style="font-weight:700; font-size:0.9rem;">${e.title || 'Untitled Event'}</div>
                     <div style="font-size:0.75rem; color:var(--text-muted);">
                         <span style="color:var(--text-main); font-weight:700;">${e.date || ''}</span> • ${e.startTime || ''} - ${e.endTime || ''}
                     </div>

      }

      return `
      <style>.hover-bg:hover { background: rgba(0,0,0,0.03); }</style>
      <div class="grid-bento">
         <div class="aether-card" style="grid-column: span 4; display:flex; flex-direction:column; min-height:220px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><div style="font-size:0.8rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; margin-bottom:4px;">Service Level</div><div id="ov-sl-text" style="font-size:3.5rem; font-weight:800; color:var(--text-main); line-height:1;">${state.currentSL}</div></div>
                <div style="text-align:right;"><div style="font-size:0.8rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; margin-bottom:4px;">Response Time</div><div id="ov-ack-text" style="font-size:2rem; font-weight:800; color:var(--text-main); line-height:1;">${state.currentACK}</div></div>
            </div>
            <div style="position:relative; height:120px; width:100%; margin-top:20px; display:flex;">
                <canvas id="chart-overview" style="width:100%; height:120px;"></canvas>
            </div>
         </div>

         <div class="aether-card" onclick="setView('agents')" style="cursor:pointer; transition:0.2s;">
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <span style="font-weight:700; color:var(--status-alert);">Unplanned</span>
                <i data-lucide="alert-circle" color="var(--status-alert)" width="20"></i>
            </div>
            <div id="ov-unplanned" style="font-size:2rem; font-weight:800; color:var(--status-alert);">${unplanCount}</div>
         </div>

         <div class="aether-card" style="display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
            <h4 style="margin:0; font-size:0.8rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Shrinkage</h4>
            <div id="ov-shrink" style="font-size:2.5rem; font-weight:800; color:var(--text-main);">${shrinkPct}%</div>
         </div>
         
         <div class="aether-card" onclick="setView('agents')" style="cursor:pointer; transition:0.2s;">
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <span style="font-weight:700;">Planned</span>
                <i data-lucide="calendar" class="text-muted" width="20"></i>
            </div>
            <div id="ov-planned" style="font-size:2rem; font-weight:800; color:var(--text-main);">${planCount}</div>
         </div>

         <div class="aether-card" onclick="setView('agents')" style="cursor:pointer; transition:0.2s; display:flex; flex-direction:column; justify-content:center;">
            <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                <span style="font-weight:700;">Special Roles</span>
                <i data-lucide="shield" class="text-muted" width="20"></i>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align:center;">
                    <div style="font-size:0.65rem; font-weight:800; color:var(--status-active); margin-bottom:4px; letter-spacing:1px;">SAFE</div>
                    <div id="ov-safe" style="font-size:1.8rem; font-weight:800; line-height:1;">${safeCount}</div>
                </div>
                <div style="width:1px; height:30px; background:var(--glass-border);"></div>
                <div style="text-align:center;">
                    <div style="font-size:0.65rem; font-weight:800; color:var(--status-role); margin-bottom:4px; letter-spacing:1px;">ICL</div>
                    <div id="ov-icl" style="font-size:1.8rem; font-weight:800; line-height:1;">${iclCount}</div>
                </div>
                <div style="width:1px; height:30px; background:var(--glass-border);"></div>
                <div style="text-align:center;">
                    <div style="font-size:0.65rem; font-weight:800; color:var(--status-ulc); margin-bottom:4px; letter-spacing:1px;">ULC</div>
                    <div id="ov-ulc" style="font-size:1.8rem; font-weight:800; line-height:1;">${ulcCount}</div>
                </div>
            </div>
         </div>
         
         <div class="aether-card" style="grid-column: span 4; display:flex; flex-direction:column;">
            <div class="section-header">
                Agenda
                <i data-lucide="calendar" class="text-muted" width="16"></i>
            </div>
            <div id="ov-agenda" style="overflow-y:auto; max-height:200px;">
                ${eventsHtml}
            </div>
         </div>
      </div>`;
  }
  
  function renderWeather() {
      if (!state.weather || typeof state.weather !== 'object') {
           return `<div class="aether-card" style="padding:60px; text-align:center;"><div style="font-weight:700; color:var(--text-muted);">Weather data unavailable</div></div>`;
      }
      var provs = Object.keys(state.weather);
      if (provs.length === 0) {
           return `<div class="aether-card" style="padding:60px; text-align:center;"><div style="font-weight:700; color:var(--text-muted);">Weather data loading...</div></div>`;
      }

      var html = '<div class="grid-masonry"><div style="grid-column:1/-1; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><h2 style="margin:0;">National Overview</h2><div style="display:flex; gap:8px;"><button class="btn btn-primary" onclick="copyWindTemplate()"><i data-lucide="copy" width="16"></i> Copy Winds</button></div></div>';
      
      if (state.alerts && state.alerts.length > 0) {
         html += `<div class="aether-card" style="grid-column: 1 / -1; border-left: 4px solid var(--status-alert); background: linear-gradient(90deg, rgba(220, 38, 38, 0.05), transparent);"><div class="section-header" style="color:var(--status-alert); border-bottom-color:rgba(220,38,38,0.2);">⚠️ Active Alerts</div><div style="display:flex; flex-wrap:wrap; gap:12px;">`;
         state.alerts.forEach(function(a) { html += `<div style="background:var(--bg-root); border:1px solid var(--status-alert); color:var(--status-alert); padding:6px 12px; border-radius:8px; font-size:0.8rem; font-weight:700; box-shadow:0 2px 10px rgba(220,38,38,0.1);">${a.province || 'Unknown'}: ${a.type || ''} (${a.count || 0})</div>`; });
         html += `</div></div>`;
      } else {
         html += `<div class="aether-card" style="grid-column: 1 / -1; padding:20px; display:flex; align-items:center; gap:12px; opacity:0.8;"><i data-lucide="check-circle" style="color:var(--status-active);"></i><span style="font-weight:700; color:var(--text-muted);">No active warnings or watches in key regions.</span></div>`;
      }
      
      for(var i=0; i<provs.length; i++) {
         var prov = provs[i];
         var cities = state.weather[prov];
         if (!cities || !Array.isArray(cities)) continue;
         
         cities.forEach(function(c) {
             var icon = getWeatherIcon(c.condition);
             var forecastHtml = (c.forecast || []).slice(0,3).map(function(f) {
                 var dayName = f.day ? String(f.day).substring(0,3) : "---";
                 return `<div class="weather-day"><span class="wd-name">${dayName}</span><div class="wd-icon">${getWeatherIcon(f.wind, true)}</div><span class="wd-temp">${f.temp || ''}</span></div>`;
             }).join('');
             html += `
             <div class="aether-card" onclick="openWeatherModal('${c.id}')" style="cursor:pointer; transition:0.2s;">
                 <div class="flex-between" style="margin-bottom:16px;">
                     <span style="font-weight:800; font-size:1.1rem;">${c.name || ''}</span>
                     <span class="region-tag" style="margin:0; background:rgba(0,0,0,0.05); color:var(--text-muted);">${prov}</span>
                 </div>
                 <div class="flex-between" style="align-items:flex-end;">
                     <div>
                         <div style="font-size:3rem; font-weight:800; line-height:1; letter-spacing:-2px; margin-bottom:4px;">${c.temp || ''}°</div>
                         <div style="display:flex; align-items:center; gap:6px; color:var(--text-secondary); font-weight:600; font-size:0.9rem;">${icon} ${c.condition || ''}</div>
                     </div>
                     <div style="text-align:right;">
                         <div style="font-size:1.4rem; font-weight:700;">${c.wind || ''}</div>
                         <div class="kpi-label">KM/H</div>
                     </div>
                 </div>
                 <div class="weather-mini-row">
                     ${forecastHtml || '<div style="width:100%; text-align:center; font-size:0.8rem; color:var(--text-muted);">Forecast Unavailable</div>'}
                 </div>
             </div>`;
         });
      }
      html += '</div>';
      return html;
  }

  function getWeatherIcon(cond, isSmall) {
      var c = (cond || "").toLowerCase();
      var i = "cloud";
      if(c.indexOf("sun") !== -1 || c.indexOf("clear") !== -1) i = "sun";
      else if(c.indexOf("rain") !== -1 || c.indexOf("shower") !== -1) i = "cloud-rain";
      else if(c.indexOf("snow") !== -1 || c.indexOf("flurr") !== -1) i = "snowflake";
      else if(c.indexOf("storm") !== -1 || c.indexOf("thunder") !== -1) i = "cloud-lightning";
      else if(c.indexOf("cloud") !== -1 || c.indexOf("overcast") !== -1) i = "cloud";
      
      if(isSmall) {
          if (i==="sun") return `<i data-lucide="sun" width="16"></i>`;
          if (i==="cloud-rain") return `<i data-lucide="cloud-rain" width="16"></i>`;
          if (i==="snowflake") return `<i data-lucide="snowflake" width="16"></i>`;
          return `<i data-lucide="cloud" width="16"></i>`;
      }
      return `<i data-lucide="${i}" width="20"></i>`;
  }

  // --- SCRIPT UI & CATEGORY SYSTEM ---
  function renderScripts() {
     var cats = new Set();
     cats.add("All");
     var scriptArr = state.scripts || [];
     for(var i=0; i<scriptArr.length; i++) {
         cats.add(scriptArr[i].category || "General");
     }
     var categories = Array.from(cats).sort();
     
     var catList = categories.map(function(c) { return `
         <button onclick="state.selectedCategory='${c}'; state.selectedScriptId=null; render();" 
                 class="ctx-item" 
                 style="width:100%; text-align:left; padding:12px 16px; margin-bottom:6px; border-radius:12px; transition:0.2s; ${state.selectedCategory===c ? 'background:var(--accent-primary); color:#fff; font-weight:800;' : 'color:var(--text-main); font-weight:600;'}">
             <i data-lucide="${c === 'All' ? 'layers' : 'folder'}" width="16" style="margin-right:10px; vertical-align:middle; opacity:0.8;"></i> 
             ${c}
         </button>`; }).join('');

     var filtered = scriptArr.filter(function(s) {
         var st = s.title || "";
         var sb = s.body || "";
         var matchSearch = !state.searchTerm || st.toLowerCase().indexOf(state.searchTerm.toLowerCase()) !== -1 || sb.toLowerCase().indexOf(state.searchTerm.toLowerCase()) !== -1;
         var matchCat = state.selectedCategory === "All" || (s.category || "General") === state.selectedCategory;
         return matchSearch && matchCat;
     });
     
     var scriptListHTML = filtered.map(function(s) {
         var isActive = state.selectedScriptId === s.index;
         var titleSafe = s.title || "Untitled";
         var catSafe = s.category || "General";
         var bodySafe = String(s.body || "").replace(/\n/g, ' ');
         return `
         <div onclick="state.selectedScriptId=${s.index}; render();" 
              class="aether-card hover-bg" 
              style="padding:16px; cursor:pointer; margin-bottom:12px; border:2px solid ${isActive ? 'var(--accent-primary)' : 'transparent'}; border-left:4px solid ${isActive ? 'var(--accent-primary)' : 'var(--glass-border)'}; box-shadow: ${isActive ? '0 8px 25px rgba(99,102,241,0.2)' : 'none'};">
             <div style="font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; font-weight:800;">${catSafe}</div>
             <div style="font-weight:800; font-size:1.05rem; color:var(--text-main); margin-bottom:6px;">${titleSafe}</div>
             <div style="font-size:0.85rem; color:var(--text-secondary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${bodySafe}</div>
         </div>`;
     }).join('') || '<div style="text-align:center; padding:40px; color:var(--text-muted); font-weight:600;">No scripts found.</div>';

  window.toggleNewCategoryInput = function() {
      var sel = document.getElementById('new-script-cat-select');
      var inp = document.getElementById('new-script-cat-input');
      if(!sel || !inp) return;
      if(sel.value === '__NEW__') {
          inp.style.display = 'block';
          inp.focus();
      } else {
          inp.style.display = 'none';
          inp.value = "";
      }
  };

  window.openComposeMode = function() { 
      document.getElementById('compose-overlay').classList.add('open');
      state.editingId = null; 
      document.getElementById('compose-title').innerText = "Create New Script";
      document.getElementById('new-script-title').value = ""; 
      document.getElementById('new-script-body').value = ""; 
      
      var cats = new Set();
      var scriptArr = state.scripts || [];
      for(var i=0; i<scriptArr.length; i++) { cats.add(scriptArr[i].category || "General"); }
      
      var optionsHtml = Array.from(cats).sort().map(function(c){return `<option value="${c}">${c}</option>`;}).join('');
      optionsHtml += `<option value="__NEW__" style="font-weight:800; color:var(--accent-primary);">➕ Create New Category...</option>`;
      
      var sel = document.getElementById('new-script-cat-select');
      if(sel) {
          sel.innerHTML = optionsHtml;
          var targetCat = state.selectedCategory !== "All" ? state.selectedCategory : "General";
          if(!cats.has(targetCat)) targetCat = "General"; 
          sel.value = targetCat;
      }
      toggleNewCategoryInput();
  };

  window.closeComposeMode = function() { 
      document.getElementById('compose-overlay').classList.remove('open');
      state.editingId = null; 
  };

  window.editScript = function(idx) { 
      var s = null;
      var scriptArr = state.scripts || [];
      for(var i=0; i<scriptArr.length; i++) { if(scriptArr[i].index === idx) { s = scriptArr[i]; break; } }
      if(!s) return; 
      
      openComposeMode(); 
      document.getElementById('compose-title').innerText = "Edit Script";
      state.editingId = s.index; 
      document.getElementById('new-script-title').value = s.title || ""; 
      document.getElementById('new-script-body').value = s.body || ""; 
      
      var sel = document.getElementById('new-script-cat-select');
      var cat = s.category || "General";
      
      if(sel) {
          var found = false;
          for(var j=0; j<sel.options.length; j++) { if(sel.options[j].value === cat) { found = true; break; } }
          if(found) {
              sel.value = cat;
          } else {
              sel.value = '__NEW__';
              var inp = document.getElementById('new-script-cat-input');
              if(inp) inp.value = cat;
          }
      }
      toggleNewCategoryInput();
  };

  window.copyScript = function(idx) { 
      var s = null;
      var scriptArr = state.scripts || [];
      for(var i=0; i<scriptArr.length; i++) { if(scriptArr[i].index === idx) { s = scriptArr[i]; break; } }
      if(s) fallbackCopyTextToClipboard(s.body || "", "Script Copied!"); 
  };

  window.delScript = function(idx) { 
      if(confirm("Are you sure you want to delete this script? This action cannot be undone.")) { 
          if(typeof google !== 'undefined') { 
              google.script.run.withSuccessHandler(function() { 
                  showToast("Script Deleted"); 
                  if(state.selectedScriptId === idx) state.selectedScriptId = null;
                  google.script.run.withSuccessHandler(function(res) { try { state.scripts = JSON.parse(res); render(); } catch(e){} }).fetchScripts(); 
              }).deleteTeamScript(idx); 
          } else { 
              var newArr = [];
              for(var i=0; i<state.scripts.length; i++) { if(state.scripts[i].index !== idx) newArr.push(state.scripts[i]); }
              state.scripts = newArr;
              if(state.selectedScriptId === idx) state.selectedScriptId = null;
              render(); 
          } 
      } 
  };

  window.addScript = function() { 
      var t = document.getElementById('new-script-title').value; 
      var b = document.getElementById('new-script-body').value; 
      
      var sel = document.getElementById('new-script-cat-select');
      var inp = document.getElementById('new-script-cat-input');
      
      var finalCat = "General";
      if(sel) {
         finalCat = (sel.value === '__NEW__' ? (inp ? inp.value.trim() : "General") : sel.value) || "General";
      }
      
      if(!t || !b) {
          showToast("Title and script content are required!");
          return; 
      }
      
      if(typeof google !== 'undefined') { 
          google.script.run.withSuccessHandler(function() { 
              closeComposeMode();
              showToast("Saved to Library"); 
              google.script.run.withSuccessHandler(function(res) { try { state.scripts = JSON.parse(res); render(); } catch(e){} }).fetchScripts(); 
          }).saveTeamScript(state.editingId, t, b, finalCat); 
      }
