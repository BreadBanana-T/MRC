<style>
  .row-name { position: relative; cursor: help; }
  .agent-tooltip { position: absolute; left: 0; bottom: 100%; margin-bottom: 8px; background: var(--bg-root); border: 1px solid var(--glass-border); padding: 12px 16px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); opacity: 0; visibility: hidden; transition: 0.2s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; width: max-content; max-width: 250px; pointer-events: none; white-space: normal; }
  body.dark .agent-tooltip { background: #1e293b; border-color: rgba(255,255,255,0.1); }
  .row-name:hover .agent-tooltip { opacity: 1; visibility: visible; transform: translateY(-4px); }
  .row-name:hover::after { display: none !important; }
  .custom-scrollbar::-webkit-scrollbar { width: 6px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
  .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideUp { to { opacity:1; transform:translateY(0); } }
  .insight-row { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(15px); }
</style>

<script>
  function escapeHTML(str) {
      if (!str) return "";
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }

  var refreshIcons = function() { if(typeof lucide !== 'undefined') lucide.createIcons(); };

  // ── GSAP view entrances ──────────────────────────────────────────────────
  // One-shot, GPU-friendly (y + opacity only — no scale, so Chart.js canvases
  // never blur or resize). Animates ONLY on view switches and on the
  // loading→content transition, never on periodic re-renders, and degrades
  // to nothing when GSAP is blocked or the user prefers reduced motion.
  var __lastAnimKey = null;
  function __sliceQ(sel, n) { return Array.prototype.slice.call(document.querySelectorAll(sel), 0, n); }

  // One consistent search field (pill + embedded icon) for every view.
  function searchBox(id, placeholder, value, handler, wrapStyle, inputStyle) {
      return '<span class="search-wrap" style="' + (wrapStyle || '') + '"><i data-lucide="search" width="15"></i><input id="' + id + '" type="text" class="input-search" style="' + (inputStyle || '') + '" placeholder="' + placeholder + '" oninput="' + handler + '" value="' + value + '"></span>';
  }
  // MasterList Skills are a SharePoint multi-value cell ("Name;#Lvl;#Name;#Lvl…").
  // Render the skill NAMES as a clean comma list (drop the level tokens).
  function prettySkills(raw) {
      var s = String(raw == null ? '' : raw).trim();
      if (!s) return '';
      if (s.indexOf(';#') !== -1) {
          return s.split(';#').filter(function(t) { t = t.trim(); return t && !/^\d+$/.test(t); }).join(', ');
      }
      return s.split(/[;,]/).map(function(t) { return t.trim(); }).filter(Boolean).join(', ');
  }

  // Split-flap status flip — modern take on the train-departure board.
  // The status cell and dot flip in around the X axis with a back-out
  // settle, and the row washes indigo for a second so the change is
  // findable even in a long list.
  function flipAgentRow(name) {
      if (typeof gsap === 'undefined') return;
      var row = document.querySelector('.agent-row[data-agent="' + encodeURIComponent(name || '') + '"]');
      if (!row) return;
      var parts = [row.querySelector('.row-status'), row.querySelector('.status-dot')].filter(Boolean);
      if (parts.length) {
          gsap.fromTo(parts,
              { rotationX: -90, autoAlpha: 0, transformPerspective: 500, transformOrigin: '50% 50%' },
              { rotationX: 0, autoAlpha: 1, duration: 0.55, ease: 'back.out(1.8)', stagger: 0.06, clearProps: 'transform,opacity,visibility' });
      }
      gsap.fromTo(row,
          { backgroundColor: 'rgba(99,102,241,0.14)' },
          { backgroundColor: 'rgba(99,102,241,0)', duration: 1.1, ease: 'power2.out', clearProps: 'backgroundColor' });
  }

  // Count-up for KPI numbers marked .cnum. Only fires on pure values like
  // "470h", "89%", "+3", "1,689" — anything with nested markup or multiple
  // numbers is left untouched (the regex won't match its textContent).
  function animateCountUps() {
      if (typeof gsap === 'undefined') return;
      __sliceQ('#content .cnum', 24).forEach(function(el) {
          var txt = (el.textContent || '').trim();
          var m = txt.match(/^([+\-]?)(\d{1,3}(?:,\d{3})+|\d+)(?:\.(\d+))?(%|h|s|m|×|°)?$/);
          if (!m) return;
          var num = parseFloat(m[2].replace(/,/g, '') + (m[3] ? '.' + m[3] : ''));
          if (!isFinite(num) || num === 0) return;
          var dec = m[3] ? m[3].length : 0;
          var sign = m[1] || '', suf = m[4] || '';
          var useComma = m[2].indexOf(',') !== -1;
          var o = { v: 0 };
          gsap.to(o, { v: num, duration: 0.8, ease: 'power2.out', onUpdate: function() {
              var val = useComma
                  ? Number(o.v.toFixed(dec)).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec })
                  : o.v.toFixed(dec);
              el.textContent = sign + val + suf;
          } });
      });
  }

  // Per-component entrance choreography. Each component family gets its own
  // signature move; everything is y/x + opacity only (GPU-composited, no
  // canvas blur), one-shot, and keyed so periodic re-renders never replay it.
  function animateViewEntrance() {
      if (typeof gsap === 'undefined') return;
      if (document.body.classList.contains('popout-mode')) return;
      try { if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return; } catch(e) {}
      var cards = __sliceQ('#content .aether-card', 16);
      var key = state.view + ':' + (cards.length > 2 ? 'full' : 'load');
      if (__lastAnimKey === key) return;
      __lastAnimKey = key;

      var tl = gsap.timeline({ defaults: { ease: 'power3.out' } });
      var header = document.querySelector('#content .sticky-header');
      if (header) tl.from(header, { y: -12, autoAlpha: 0, duration: 0.35, clearProps: 'transform,opacity,visibility' }, 0);
      if (cards.length) tl.from(cards, { y: 18, autoAlpha: 0, duration: 0.5, stagger: 0.05, clearProps: 'transform,opacity,visibility' }, 0.05);
      var rows = __sliceQ('#content .agent-row', 36);
      if (rows.length) tl.from(rows, { x: -14, autoAlpha: 0, duration: 0.3, stagger: 0.014, clearProps: 'transform,opacity,visibility' }, 0.18);
      var chips = __sliceQ('#content .soon-chip', 24);
      if (chips.length) tl.from(chips, { y: 10, autoAlpha: 0, duration: 0.3, stagger: 0.022, clearProps: 'transform,opacity,visibility' }, 0.12);
      var groups = __sliceQ('#content .group-header', 8);
      if (groups.length) tl.from(groups, { autoAlpha: 0, x: -8, duration: 0.35, stagger: 0.05, clearProps: 'transform,opacity,visibility' }, 0.12);
      var heat = __sliceQ('#content .heatmap-cell', 0); // heatmap cells animate via CSS only — too many nodes
      animateCountUps();
  }
  
  document.addEventListener('click', function(e) {
      var panel = document.getElementById('notif-panel');
      var bellBtn = document.getElementById('btn-bell');
      if (state.notifOpen && panel && !panel.contains(e.target) && (!bellBtn || !bellBtn.contains(e.target))) toggleNotifPanel();
  });

  // Header toggle removed — nav now collapses to icons in CSS via media
  // queries. Stub kept so any stale onclick attributes in cached pages
  // don't throw a ReferenceError.
  window.toggleHeaderActions = function() {};

  // Body-level tooltip for the Red Flags help icons. Rendering inside the
  // card got clipped by the card's overflow:hidden — appending to body and
  // positioning via getBoundingClientRect avoids that entirely.
  window.showRfTip = function(el, ev) {
      hideRfTip();
      var raw = el.getAttribute('data-tip') || '';
      var text = decodeURIComponent(raw);
      var rect = el.getBoundingClientRect();
      var tip = document.createElement('div');
      tip.id = '__rf_tip';
      tip.textContent = text;
      tip.style.cssText = [
          'position:fixed',
          'z-index:99999',
          'max-width:300px',
          'padding:12px 14px',
          'border-radius:10px',
          'font-size:0.75rem',
          'font-weight:500',
          'line-height:1.5',
          'background:#0f172a',
          'color:#f1f5f9',
          'box-shadow:0 12px 32px rgba(0,0,0,0.35)',
          'pointer-events:none',
          'opacity:0',
          'transition:opacity 0.15s'
      ].join(';');
      document.body.appendChild(tip);
      // Position above the icon, clamped to viewport
      var w = tip.offsetWidth, h = tip.offsetHeight;
      var left = Math.min(window.innerWidth - w - 12, Math.max(12, rect.left + rect.width / 2 - w / 2));
      var top  = Math.max(12, rect.top - h - 10);
      tip.style.left = left + 'px';
      tip.style.top  = top + 'px';
      // requestAnimationFrame to trigger transition
      requestAnimationFrame(function() { tip.style.opacity = '1'; });
  };
  window.hideRfTip = function() {
      var existing = document.getElementById('__rf_tip');
      if (existing) existing.parentNode.removeChild(existing);
  };

  // Local "yyyy-mm-dd" — never use toISOString().split('T')[0] for default
  // dates. ISO returns UTC, so at 10 PM Toronto the user is rolled forward
  // a day. This pulls the local-calendar date instead.
  function localDateStr(d) {
      d = d || new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
  }

  // Build stamp — visible in the Import modal so "is the new code actually
  // deployed?" is answerable at a glance (GAS freezes code per deployment
  // version; pasting files + browser refresh is NOT enough without a new
  // version).
  var APP_BUILD = 'build 2026.06.14-SAFE19 · pin-capable parity + OT true-fill + Mgmt pre-coded OT';

  var state = { 
      view: 'overview', agents: {}, pendingUpdates: {}, weather: {}, slHistory: [], calendarEvents: [], roleLogs: [], statsLogs: [], currentSL: "--", currentACK: "--", selectedAgent: null, searchTerm: "", regionFilter: 'All', notifications: [], knownNotifs: new Set(), dismissedNotifs: new Set(), notifOpen: false, scripts: [], agentTab: 'floor', currentReport: "...", selectedCategory: "All", selectedScriptId: null, editingId: null, appUrl: "", insightMode: 'month', selectedDate: localDateStr(), insightSearch: '', insightRegionFilter: 'All', insightCycleFilter: 'ALL', insightSort: 'total', unifiedReport: null, trackerData: null, trackerMode: 'furlough', trackerDate: localDateStr(), trackerRange: 'day', trackerRegion: 'Onshore', trackerCycleFilter: 'ALL', trackerSearch: '', trackerLoading: true, analyzerData: null, analyzerLoading: false, expandedInsights: new Set(), syncMeta: { sched: "Loading...", idp: "Loading...", muSet: "" }, absencesData: null, selectedAbsenceAgent: null, absenceMonthFilter: 'ALL', outagesData: null, outageHistory: [], outageDrawerProv: null, regionRegistry: null, regionManagerFilter: 'ALL', staffingBalance: null, outageCorrelation: null, trainingDefs: [], selectedTrainingId: null, trainingRoster: null, trainingLoading: false, editingTrainingId: null, trackerBucket: 'live', mgmtData: null, mgmtLoading: false, mgmtGrain: 'week', mgmtDate: localDateStr(), safeSelectedAgent: null, safeView: 'agents', safeOpenDay: null, safePins: new Set(), boardAgents: [], boardData: null, boardRangeData: null, boardRoster: null, boardLoading: false, boardDrillDate: null, safeCompareMode: 'day', compareHourStart: 0, compareHourEnd: 1440, scheduleDates: null
  };

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initApp);
  else initApp();

  function initApp() {
    try { console.log('[MRC] ' + APP_BUILD); var bEl = document.getElementById('import-build'); if (bEl) bEl.textContent = APP_BUILD; } catch(e) {}
    try { if (localStorage.getItem('rta_theme') === 'dark') document.body.classList.add('dark'); } catch(e) {}
    var config = document.getElementById('app-config');
    if (config) {
        state.appUrl = config.getAttribute('data-url');
        var popout = config.getAttribute('data-popout');
        var mode = config.getAttribute('data-mode');
        if (popout === "true") {
            document.body.classList.add('popout-mode');
            state.view = 'popout-view'; 
            state.regionFilter = (mode === 'onshore' ? 'Onshore' : (mode === 'offshore' ? 'Offshore' : (mode === 'breaks' ? 'Breaks' : 'All')));
            document.getElementById('content').innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted); font-weight:700;">Loading Floor...</div>';
            if (typeof google !== 'undefined') { setInterval(fetchData, 30000); fetchData(); }
            return;
        }
    }
    render(); 
    setInterval(updateClock, 1000); 
    setInterval(fetchData, 60000); 
    setInterval(fetchNotifications, 15000);
    setInterval(fetchCalendar, 300000); 
    setInterval(function() { if(state.view === 'insights') render(); }, 60000); 
    fetchData(); fetchStats(); fetchNotifications(); fetchCalendar(); fetchTrackerData(); fetchMetadata(); fetchOutages(); fetchStaffingBalance();
    setInterval(fetchOutages, 300000); // 5 min
    setInterval(fetchStaffingBalance, 60000); // 1 min — aligned with IDP bucket granularity
  }

  function fetchStaffingBalance() {
      if (typeof google === 'undefined') return;
      google.script.run.withSuccessHandler(function(res) {
          try { state.staffingBalance = JSON.parse(res); if (state.view === 'overview') render(); } catch (e) {}
      }).getStaffingBalance();
  }

  function fetchOutages() {
      if (typeof google === 'undefined') return;
      google.script.run.withSuccessHandler(function(res) {
          try {
              state.outagesData = JSON.parse(res);
              if (state.view === 'overview') render();
          } catch (e) {}
      }).withFailureHandler(function() {}).getPowerOutages();
      google.script.run.withSuccessHandler(function(res) {
          try {
              state.outageCorrelation = JSON.parse(res);
              if (state.view === 'overview') render();
          } catch (e) {}
      }).withFailureHandler(function() {}).getOutageAgentCorrelation(5000, 2);
      google.script.run.withSuccessHandler(function(res) {
          try {
              state.outageHistory = JSON.parse(res);
              if (state.view === 'overview') render();
          } catch (e) {}
      }).withFailureHandler(function() {}).getOutageHistory();
  }

  window.openRegionManager = function() {
      document.getElementById('region-modal').classList.add('open');
      state.regionManagerFilter = 'ALL';
      fetchRegionRegistry();
  };
  window.closeRegionManager = function() {
      document.getElementById('region-modal').classList.remove('open');
  };
  function fetchRegionRegistry() {
      if (typeof google === 'undefined') return;
      document.getElementById('region-list').innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted); font-size:0.85rem;">Loading registry…</div>';
      google.script.run.withSuccessHandler(function(res) {
          try { state.regionRegistry = JSON.parse(res); renderRegionManager(); }
          catch(e) { document.getElementById('region-list').innerHTML = '<div style="padding:40px; text-align:center; color:var(--status-alert); font-weight:600;">Failed to load registry.</div>'; }
      }).getRegionRegistry();
  }
  window.renderRegionManager = function() {
      var list = state.regionRegistry || [];
      var q = (document.getElementById('region-search') || {}).value || '';
      q = q.toLowerCase().trim();
      var filter = state.regionManagerFilter || 'ALL';
      var filtered = list.filter(function(r) {
          if (filter !== 'ALL' && r.region !== filter) return false;
          if (q && r.display.toLowerCase().indexOf(q) === -1) return false;
          return true;
      });
      var sourceBadge = function(src) {
          var color = src === 'manual' ? 'var(--status-alert)' : (src === 'masterlist' ? 'var(--accent-primary)' : 'var(--text-muted)');
          var bg = src === 'manual' ? 'rgba(220,38,38,0.1)' : (src === 'masterlist' ? 'rgba(99,102,241,0.1)' : 'rgba(0,0,0,0.05)');
          return '<span style="background:' + bg + '; color:' + color + '; padding:2px 8px; border-radius:6px; font-size:0.65rem; font-weight:800; text-transform:uppercase; letter-spacing:0.5px;">' + src + '</span>';
      };
      var rows = filtered.map(function(r) {
          var regionColor = r.region === 'Offshore' ? 'var(--region-off, #b45309)' : 'var(--status-active)';
          var flipTo = r.region === 'Offshore' ? 'Onshore' : 'Offshore';
          var nameEsc = escapeHTML(r.display).replace(/'/g, "\\'");
          return '<div style="padding:12px 20px; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center; gap:12px;">' +
                   '<div style="flex:1; min-width:0;">' +
                     '<div style="font-weight:700; color:var(--text-main); font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + escapeHTML(r.display) + '</div>' +
                     '<div style="display:flex; gap:6px; margin-top:4px; align-items:center;">' +
                       '<span style="font-size:0.7rem; font-weight:800; color:' + regionColor + ';">' + escapeHTML(r.region) + '</span>' +
                       sourceBadge(r.source) +
                     '</div>' +
                   '</div>' +
                   '<div style="display:flex; gap:6px; flex-shrink:0;">' +
                     '<button class="btn btn-glass" onclick="flipAgentRegion(\'' + nameEsc + '\', \'' + flipTo + '\')" style="height:30px; padding:0 12px; font-size:0.75rem;">Flip to ' + flipTo + '</button>' +
                     (r.source === 'manual' ? '<button class="btn btn-glass" onclick="resetAgentRegion(\'' + nameEsc + '\')" style="height:30px; padding:0 10px; font-size:0.75rem; color:var(--text-muted);" title="Remove manual override, revert to auto-detection">Reset</button>' : '') +
                   '</div>' +
                 '</div>';
      }).join('') || '<div style="padding:40px; text-align:center; color:var(--text-muted); font-weight:600;">No agents match the filter.</div>';
      document.getElementById('region-list').innerHTML = rows;
      ['all','on','off'].forEach(function(k) {
          var el = document.getElementById('region-filter-' + k);
          if (!el) return;
          var wantActive = (filter === 'ALL' && k === 'all') || (filter === 'Onshore' && k === 'on') || (filter === 'Offshore' && k === 'off');
          el.classList.toggle('btn-primary', wantActive);
      });
      refreshIcons();
  };
  window.flipAgentRegion = function(name, newRegion) {
      if (typeof google === 'undefined') return;
      google.script.run.withSuccessHandler(function() { fetchRegionRegistry(); showToast('Flipped ' + name + ' → ' + newRegion); }).setAgentRegionManual(name, newRegion);
  };
  window.resetAgentRegion = function(name) {
      if (typeof google === 'undefined') return;
      google.script.run.withSuccessHandler(function() { fetchRegionRegistry(); showToast('Reset ' + name + ' to auto-detection'); }).clearAgentRegion(name);
  };

  window.openOutageDrawer = function(prov) {
      state.outageDrawerProv = prov;
      var modal = document.getElementById('outage-modal');
      if (modal) modal.classList.add('open');
      renderOutageDrawer();
  };
  window.closeOutageDrawer = function() {
      var modal = document.getElementById('outage-modal');
      if (modal) modal.classList.remove('open');
      state.outageDrawerProv = null;
  };
  function renderOutageDrawer() {
      var p = state.outageDrawerProv;
      if (!p || !state.outagesData || !state.outagesData.byProvince[p]) return;
      var d = state.outagesData.byProvince[p];
      var titleEl = document.getElementById('outage-modal-title');
      var subEl = document.getElementById('outage-modal-sub');
      var listEl = document.getElementById('outage-modal-list');
      if (!titleEl || !listEl) return;
      var totalCust = d.customers || 0;
      var totalOut = d.outages || 0;
      var headSev = totalCust >= 5000 ? 'var(--status-alert)' : totalCust >= 500 ? 'var(--status-warn)' : 'var(--accent-primary)';
      titleEl.innerHTML = '<span style="display:inline-block; padding:4px 10px; background:' + headSev + '; color:#fff; border-radius:8px; font-size:0.75rem; font-weight:800; letter-spacing:1px; vertical-align:middle; margin-right:10px;">' + escapeHTML(p) + '</span><span style="font-variant-numeric:tabular-nums;">' + totalCust.toLocaleString() + '</span> <span style="font-size:0.85rem; font-weight:600; color:var(--text-muted);">customer' + (totalCust === 1 ? '' : 's') + ' affected</span>';
      subEl.innerHTML = '<span style="display:inline-flex; align-items:center; gap:6px;"><i data-lucide="zap" width="13"></i> ' + escapeHTML(d.source || 'Unknown') + '</span> &nbsp;•&nbsp; <span>' + totalOut.toLocaleString() + ' active outage' + (totalOut === 1 ? '' : 's') + '</span>';
      var maxCustomers = (d.top || []).reduce(function(m, r) { return Math.max(m, r.customers || 0); }, 0) || 1;
      var rows = (d.top || []).map(function(r) {
          var n = r.customers || 0;
          // Severity color by share of the largest outage in the list.
          var pct = n / maxCustomers;
          var sev = pct >= 0.66 ? 'var(--status-alert)' : pct >= 0.25 ? 'var(--status-warn)' : 'var(--accent-primary)';
          var barWidth = Math.max(4, Math.round(pct * 100));
          var eta = r.eta ? ('<div style="font-size:0.7rem; color:var(--text-muted); margin-top:4px; display:flex; align-items:center; gap:4px;"><i data-lucide="clock" width="11"></i> ETA ' + escapeHTML(String(r.eta)) + '</div>') : '';
          return '<div style="padding:14px 18px; border-bottom:1px solid var(--glass-border); position:relative;">' +
                   '<div style="display:flex; justify-content:space-between; align-items:flex-start; gap:16px;">' +
                     '<div style="flex:1; min-width:0;">' +
                       '<div style="font-weight:800; color:var(--text-main); font-size:0.95rem; display:flex; align-items:center; gap:8px;"><div style="width:6px; height:6px; border-radius:50%; background:' + sev + '; flex-shrink:0;"></div>' + escapeHTML(r.region || 'Unknown') + '</div>' +
                       '<div style="font-size:0.75rem; color:var(--text-muted); font-weight:600; margin-top:4px;">' + escapeHTML(r.cause || '—') + '</div>' + eta +
                     '</div>' +
                     '<div style="text-align:right; flex-shrink:0;"><div style="font-size:1.4rem; font-weight:800; color:' + sev + '; line-height:1; font-variant-numeric:tabular-nums;">' + n.toLocaleString() + '</div><div style="font-size:0.62rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-top:4px;">customers</div></div>' +
                   '</div>' +
                   '<div style="height:3px; margin-top:12px; background:var(--bg-root); border-radius:2px; overflow:hidden;"><div style="width:' + barWidth + '%; height:100%; background:' + sev + '; transition:width 0.4s ease;"></div></div>' +
                 '</div>';
      }).join('');
      var emptyMsg = (d.outages > 0)
          ? 'Per-region breakdown not available from this source.<div style="font-size:0.7rem; font-weight:600; color:var(--text-muted); margin-top:8px;">Headline counts are accurate; the utility just doesn\'t expose region-level detail in this feed.</div>'
          : 'No active outages.';
      listEl.innerHTML = rows || '<div style="padding:40px; text-align:center; color:var(--text-muted); font-weight:600;">' + emptyMsg + '</div>';
      refreshIcons();
  }

  function fetchMetadata() {
      if(typeof google==='undefined') return;
      // Only re-render views whose headers display sync metadata — a blanket
      // render() here was redrawing static views (Mgmt, Calc) for no reason.
      google.script.run.withSuccessHandler(function(res) { try { state.syncMeta = JSON.parse(res); if (state.view === 'tracker' || state.view === 'insights') render(); } catch(e){} }).fetchSyncMetadata();
  }

  // ───────────────────────────── Outage URL admin ─────────────────────────────
  window.openOutageAdmin = function() {
      var modal = document.getElementById('outage-admin-modal');
      if (modal) modal.classList.add('open');
      renderOutageAdmin({ loading: true });
      if (typeof google === 'undefined') { renderOutageAdmin({ urls: { BC:'(local preview)', ON:'(local preview)', QC:'(local preview)' } }); return; }
      google.script.run.withSuccessHandler(function(res) {
          try { renderOutageAdmin({ urls: JSON.parse(res) }); }

  // Resolved-range chip for the ops trackers: spells out the exact days the
  // selected Daily / Weekly (7-7 Wed–Tue) / Monthly / Quarterly range covers,
  // since the date picker alone doesn't make the snapped window obvious.
  function trackerRangeChip() {
      var p = state.trackerDate.split('-');
      var y = parseInt(p[0], 10), m = parseInt(p[1], 10), dd = parseInt(p[2], 10);
      if (isNaN(y) || isNaN(m) || isNaN(dd)) return '';
      var dt = new Date(y, m - 1, dd, 12, 0, 0);
      var DN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var fmt = function(d) { return DN[d.getDay()] + ' ' + MN[d.getMonth()] + ' ' + d.getDate(); };
      var text;
      if (state.trackerRange === 'day') text = fmt(dt);
      else if (state.trackerRange === 'week') {
          var day = dt.getDay();
          var off = (day >= 3) ? (day - 3) : (day + 4);
          var s2 = new Date(dt.getTime()); s2.setDate(s2.getDate() - off);
          var e2 = new Date(s2.getTime()); e2.setDate(e2.getDate() + 6);
          text = fmt(s2) + ' → ' + fmt(e2) + ' · ops 7-7';
      }
      else if (state.trackerRange === 'month') text = MN[m - 1] + ' ' + y;
      else if (state.trackerRange === 'ytd') text = 'YTD ' + y + ' · Jan 1 → ' + fmt(dt);
      else text = 'Q' + (Math.floor((m - 1) / 3) + 1) + ' ' + y;

      'COMP':    { color: '#fbbf24', label: 'COMP' },
      'COMPU':   { color: '#c084fc', label: 'COMPU' },
      'LOA':     { color: '#38bdf8', label: 'LOA · LONG TERM' },
      'TI AWOL': { color: '#dc2626', label: 'AWOL' },
      'ALU':     { color: '#d97706', label: 'ALU · LATE' }
  };

      var k = String(t || '').toUpperCase().trim();
      if (ABS_TYPE_META[k]) return ABS_TYPE_META[k];
      if (isLateType(k)) return { color: 'var(--status-warn)', label: k + ' · LATE' };

          } else {

      var headerHtml = '<div class="sticky-header" style="justify-content:space-between; row-gap:10px;">' +

          '<div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">' +
          grainBtn('Daily','day') + grainBtn('Weekly','week') + grainBtn('Monthly','month') + grainBtn('Quarterly','quarter') + grainBtn('YTD','ytd') +
          '<input type="date" class="input-aether" style="width:auto; height:32px; font-size:0.8rem; font-weight:700; cursor:pointer;" value="' + escapeHTML(state.mgmtDate) + '" onchange="setMgmtDate(this.value)" onclick="try{this.showPicker();}catch(e){}">' +
          '<button class="btn btn-glass" style="height:32px; font-size:0.78rem;" onclick="fetchMgmtData(); render();"><i data-lucide="refresh-cw" width="14"></i> Refresh</button>' +
          '</div>' +
          (stripHtml ? '<div style="width:100%;">' + stripHtml + '</div>' : '') +

      if (state.mgmtLoading || !state.mgmtData) {
          return headerHtml + '<div class="aether-card" style="padding:60px; text-align:center; min-height:400px; display:flex; flex-direction:column; align-items:center; justify-content:center;"><div style="width: 44px; height: 44px; border: 4px solid var(--glass-border); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 24px;"></div><h3 style="margin:0 0 8px 0;">Compiling aggregates…</h3><p style="color:var(--text-muted); font-size:0.9rem; margin:0;">Scanning OT, roles, coaching, absences and SL history.</p></div>';
      }

      if (d.error) {
          return headerHtml + '<div class="aether-card" style="padding:60px; text-align:center;"><i data-lucide="alert-triangle" width="40" style="color:var(--status-alert);"></i><h3>Management data unavailable</h3><p style="color:var(--text-muted);">' + escapeHTML(d.error) + '</p></div>';
      }

      var cur = (d.totals || {}).sel || {};
      var prev = (d.totals || {}).prev || {};
      var sel = d.sel || {};
      var word = ({ day: 'day', week: 'week', month: 'month', quarter: 'quarter', ytd: 'year' })[d.grain] || 'period';

      var delta = function(curV, prevV, goodWhenUp, suffix) {
          if (curV == null || prevV == null) return '';
          var diff = Math.round((curV - prevV) * 10) / 10;
          if (diff === 0) return '<span style="font-size:0.7rem; font-weight:800; color:var(--text-muted); margin-left:8px;">= prev ' + word + '</span>';
          var up = diff > 0;
          var good = (up && goodWhenUp) || (!up && !goodWhenUp);
          var color = good ? 'var(--status-active)' : 'var(--status-alert)';
          return '<span style="font-size:0.7rem; font-weight:800; color:' + color + '; margin-left:8px;">' + (up ? '▲' : '▼') + ' ' + Math.abs(diff) + (suffix || '') + ' vs prev ' + word + '</span>';
      };
      var kpi = function(label, value, deltaHtml, sub, color) {
          return '<div class="aether-card" style="padding:20px 22px;">' +
                 '<div class="aurora-label" style="margin-bottom:8px;">' + label + '</div>' +

      var kpisHtml = '<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:18px; margin-bottom:24px;">' +

          kpi('Absences', String(cur.absences || 0), delta(cur.absences, prev.absences, false), 'agent-days · Onshore ' + (cur.absOn || 0) + ' / Offshore ' + (cur.absOff || 0) + (absTypesSub ? '<br>' + absTypesSub : '') + '<br>Lates (ALU): <b style="color:var(--status-warn);">' + (cur.lates || 0) + '</b>' + (cur.approvedLeave ? ' · approved leave (excl.): ' + cur.approvedLeave : ''), (cur.absences || 0) > 0 ? 'var(--status-alert)' : 'var(--text-main)') +
          kpi('Avg Service Level', cur.slAvg != null ? cur.slAvg + '%' : '—', delta(cur.slAvg, prev.slAvg, true, '%'), cur.ackAvg != null ? 'avg ACK ' + cur.ackAvg + 's' : 'no readings in this ' + word) +
          '</div>';

      var chartCard = function(title, canvasId, sub) {
          return '<div class="aether-card" style="padding:24px;"><div class="section-header">' + title + (sub ? '<span style="font-size:0.68rem; font-weight:700; color:var(--text-muted); text-transform:none;">' + sub + '</span>' : '') + '</div><div style="position:relative; height:240px;"><canvas id="' + canvasId + '" style="display:block;"></canvas></div></div>';

                     '<div style="display:flex; align-items:center; gap:10px; min-width:0;"><span style="width:22px; height:22px; border-radius:50%; background:' + (i === 0 ? color : 'rgba(0,0,0,0.05)') + '; color:' + (i === 0 ? '#fff' : 'var(--text-muted)') + '; font-size:0.7rem; font-weight:800; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;">' + (i + 1) + '</span><span style="font-weight:700; font-size:0.88rem; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + escapeHTML(a.name) + '</span></div>' +

          }).join('') || '<div style="padding:24px 0; text-align:center; color:var(--text-muted); font-size:0.85rem; font-weight:600;">Nothing logged in this ' + word + '.</div>';

          '<div class="grid-split" style="margin-bottom:24px;">' +
          chartCard('Overtime vs Demand — ' + escapeHTML(sel.label || ''), 'mgmt-chart-ot', 'outline = OT posted (incl. upcoming) · solid = OT in schedules (&times;1/&times;1.5) · dashed = IDP hours short (incl. forecast)') +

          chartCard('Service Level' + (d.grain === 'day' ? ' by Hour' : ' vs Absences & Lates'), 'mgmt-chart-sl', slSub) +

          topTable('Top Overtime — ' + escapeHTML(sel.label || ''), hrs(sel.topOt), 'var(--accent-primary)') +

  function initMgmtCharts() {
      if (typeof Chart === 'undefined' || !state.mgmtData || !state.mgmtData.buckets) return;

      var absSeries = d.abs || [];

      var manyBars = labels.length > 16;
      var baseOpts = function(stacked) {
          return {
              responsive: true, maintainAspectRatio: false, resizeDelay: 200,
              plugins: { legend: { display: true, position: 'top', align: 'end', labels: { usePointStyle: true, boxWidth: 8, boxHeight: 8, font: { family: "'Outfit', sans-serif", weight: '700', size: 10 }, color: textColor } } },

                  y: { stacked: !!stacked, beginAtZero: true, grid: { color: gridColor }, ticks: { font: { family: "'Outfit', sans-serif", weight: '600', size: 10 }, color: textColor } }
              },
              // Slow, visible reveal: bars cascade left→right, starting after
              // the card entrance has landed.
              animation: { duration: 900, easing: 'easeOutQuart', delay: function(c2) { return (c2.type === 'data' && c2.mode === 'default') ? 180 + (c2.dataIndex || 0) * 24 : 0; } }
          };
      };
      var bw = manyBars ? 14 : 30;

      ['mgmtOt', 'mgmtRoles', 'mgmtSl', 'mgmtAbs'].forEach(function(k) { if (charts[k]) { charts[k].destroy(); charts[k] = null; } });

      var elOt = document.getElementById('mgmt-chart-ot');
      if (elOt) {
          var hasOpen = buckets.some(function(b) { return (b.openOt || 0) > 0; });
          var hasIdp = buckets.some(function(b) { return b.idpNet != null; });
          var otSets = [];
          if (hasOpen) otSets.push({ label: 'Open OT (posted)', data: buckets.map(function(b) { return b.openOt || 0; }), backgroundColor: 'rgba(129,140,248,0.14)', borderColor: '#818cf8', borderWidth: 1.5, borderRadius: 6, maxBarThickness: bw, stack: 'open' });
          otSets.push({ label: '×1 Straight', data: buckets.map(function(b) { return b.otX1; }), backgroundColor: '#818cf8', borderRadius: 4, maxBarThickness: bw, stack: 'given' });
          otSets.push({ label: '×1.5 Premium', data: buckets.map(function(b) { return b.otX15; }), backgroundColor: '#f472b6', borderRadius: 4, maxBarThickness: bw, stack: 'given' });
          // Same hours axis as the bars: posted, scheduled and deficit are
          // all hours, so one scale = honest visual comparison.
          if (hasIdp) otSets.push({ type: 'line', label: 'IDP deficit (h short)', data: buckets.map(function(b) { return b.idpDeficit || 0; }), borderColor: '#f87171', borderWidth: 2, borderDash: [6, 5], pointRadius: 0, pointHoverRadius: 4, pointBackgroundColor: '#f87171', tension: 0.35, spanGaps: true, order: 10 });
          var otOpts = baseOpts(true);
          otOpts.scales.y.ticks.callback = function(v) { return v + 'h'; };
          otOpts.plugins.tooltip = { callbacks: {
              label: function(c2) { return ' ' + c2.dataset.label + ': ' + (Math.round((c2.parsed.y || 0) * 10) / 10) + 'h'; },
              footer: function(items) {
                  var i = items[0].dataIndex; var b2 = buckets[i];
                  if (!b2.openOt) return '';
                  return 'Fill rate: ' + Math.round(((b2.ot || 0) / b2.openOt) * 100) + '%' + (b2.openSlots ? ' · ' + b2.openSlots + ' slots' : '');
              } } };
          charts.mgmtOt = new Chart(elOt.getContext('2d'), { type: 'bar', data: { labels: labels, datasets: otSets }, options: otOpts });
      }
      var elRoles = document.getElementById('mgmt-chart-roles');
      if (elRoles) {
          charts.mgmtRoles = new Chart(elRoles.getContext('2d'), { type: 'bar', data: { labels: labels, datasets: [
              { label: 'SAFE', data: buckets.map(function(b) { return b.safe; }), backgroundColor: '#34d399', borderRadius: 4, maxBarThickness: bw },
              { label: 'ICL', data: buckets.map(function(b) { return b.icl; }), backgroundColor: '#c084fc', borderRadius: 4, maxBarThickness: bw },
              { label: 'ULC', data: buckets.map(function(b) { return b.ulc; }), backgroundColor: '#fb923c', borderRadius: 4, maxBarThickness: bw },
              { label: 'Tower', data: buckets.map(function(b) { return b.tower; }), backgroundColor: '#38bdf8', borderRadius: 4, maxBarThickness: bw },
              { label: 'Coaching', data: buckets.map(function(b) { return b.coach; }), backgroundColor: '#fbbf24', borderRadius: 4, maxBarThickness: bw },
              { label: 'ACSU', data: buckets.map(function(b) { return b.acsu; }), backgroundColor: '#94a3b8', borderRadius: 4, maxBarThickness: bw }
          ] }, options: baseOpts(true) });
      }
      var elSl = document.getElementById('mgmt-chart-sl');
      if (elSl) {
          var opts = baseOpts(false);
          opts.scales.y = { position: 'left', min: 0, max: 100, grid: { color: gridColor }, ticks: { callback: function(v) { return v + '%'; }, font: { family: "'Outfit', sans-serif", weight: '600', size: 10 }, color: textColor } };
          opts.scales.y1 = { position: 'right', beginAtZero: true, grid: { display: false }, ticks: { font: { family: "'Outfit', sans-serif", weight: '600', size: 10 }, color: textColor } };
          var slSets = [
              { type: 'line', label: 'Avg SL %', data: buckets.map(function(b) { return b.slAvg; }), borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.12)', borderWidth: 3, tension: 0.35, fill: true, pointRadius: 3, pointBackgroundColor: '#38bdf8', yAxisID: 'y', spanGaps: true }
          ];
          // Hourly absence bars are meaningless for a single day — KPI carries it.
          if (d.grain !== 'day' && absSeries.length === buckets.length) {
              slSets.push({ label: 'Absences', data: absSeries.map(function(a) { return a.absences; }), backgroundColor: 'rgba(248,113,113,0.55)', borderRadius: 4, maxBarThickness: bw, yAxisID: 'y1' });
              slSets.push({ label: 'Lates (ALU)', data: absSeries.map(function(a) { return a.lates || 0; }), backgroundColor: 'rgba(251,191,36,0.55)', borderRadius: 4, maxBarThickness: bw, yAxisID: 'y1' });
          }
          charts.mgmtSl = new Chart(elSl.getContext('2d'), { type: 'bar', data: { labels: labels, datasets: slSets }, options: opts });
      }
      var elAbs = document.getElementById('mgmt-chart-abs');
      if (elAbs) {
          var ABS_COLORS = { 'SICK': '#f87171', 'UNAB': '#fb923c', 'COMP': '#fbbf24', 'COMPU': '#c084fc', 'LOA': '#38bdf8', 'TI AWOL': '#dc2626' };
          var typeSet = {};
          absSeries.forEach(function(a) { Object.keys(a.absTypes || {}).forEach(function(t) { typeSet[t] = true; }); });
          var types = Object.keys(typeSet).sort();
          var absLabels = absSeries.map(function(a) { return a.label; });
          var sets = [];
          types.forEach(function(t) {
              var base = ABS_COLORS[t] || '#94a3b8';
              var onData = absSeries.map(function(a) { return ((a.absTypes || {})[t] || 0) - ((a.absTypesOff || {})[t] || 0); });
              var offData = absSeries.map(function(a) { return (a.absTypesOff || {})[t] || 0; });
              if (onData.some(function(v) { return v > 0; })) sets.push({ label: t + ' · On', data: onData, backgroundColor: base, borderRadius: 3, maxBarThickness: bw });
              if (offData.some(function(v) { return v > 0; })) sets.push({ label: t + ' · Off', data: offData, backgroundColor: base + '66', borderColor: base, borderWidth: 1.5, borderRadius: 3, maxBarThickness: bw });
          });
          charts.mgmtAbs = new Chart(elAbs.getContext('2d'), { type: 'bar', data: { labels: absLabels, datasets: sets }, options: baseOpts(true) });
      }
  }

  // ──────────────────── ACK POINT OF NO RETURN (calculator) ────────────────────
  // Fully automatic: after a calculation, the BURG count / BURG ACK /
  // snapshot time parsed from the paste produce the verdict with zero
  // typing — shown as a slim banner, not a form. A "What-if" toggle
  // exposes the manual fields for scenario testing only.
  // Math (validated against the "Point of no return" sheet):
  //   remaining  = (alarms ÷ hoursElapsed) × (24 − hoursElapsed)
  //   required   = (target×(alarms+remaining) − currentACK×alarms) ÷ remaining
  //   floor      = best achievable day-end ACK if the rest are instant
  function computePonr(ack, alarms, t, target) {
      if (!(ack >= 0) || !(alarms > 0) || !(t > 0) || t >= 24 || !(target > 0)) return null;
      var remaining = (alarms / t) * (24 - t);
      var required = (target * (alarms + remaining) - ack * alarms) / remaining;
      var floor = (ack * alarms) / (alarms + remaining);
      return { remaining: remaining, required: required, floor: floor };
  }
  function ponrTarget() {
      var v = 30;
      try { v = parseFloat(localStorage.getItem('ponr_target')) || 30; } catch(e) {}
      return v;
  }
  window.setPonrTarget = function(v) {
      v = parseFloat(v);
      if (v > 0) { try { localStorage.setItem('ponr_target', String(v)); } catch(e) {} }
      render();
  };
  window.togglePonrWhatIf = function() { state.ponrWhatIf = !state.ponrWhatIf; render(); };

  window.updatePonr = function() {
      var box = document.getElementById('ponr-result');
      if (!box) return;
      var num = function(id) { var el = document.getElementById(id); return el ? parseFloat(el.value) : NaN; };
      var target = num('ponr-target');
      if (target > 0) { try { localStorage.setItem('ponr_target', String(target)); } catch(e) {} }
      var r = computePonr(num('ponr-ack'), num('ponr-alarms'), num('ponr-time'), target);
      if (!r) {
          box.innerHTML = '<div style="padding:16px; color:var(--text-muted); font-size:0.85rem; font-weight:600;">Enter current ACK, BURG alarms received, and the time (e.g. 16.25 = 4:15 PM) to project the rest of the day.</div>';
          return;
      }
      box.innerHTML = ponrVerdictHtml(r, target, true);
      refreshIcons();
  };
  window.ponrSetNow = function() {
      var el = document.getElementById('ponr-time');
      if (!el) return;
      var n = new Date();
      el.value = (n.getHours() + Math.floor(n.getMinutes() / 15) * 0.25).toFixed(2);
      updatePonr();
  };

  function ponrVerdictHtml(r, target, withStats) {
      var stat = function(label, value, color) {
          return '<div style="flex:1; min-width:140px; background:var(--bg-root); border:1px solid var(--glass-border); border-radius:12px; padding:12px 16px;"><div style="font-size:0.65rem; font-weight:800; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px;">' + label + '</div><div style="font-size:1.5rem; font-weight:800; color:' + (color || 'var(--text-main)') + '; font-variant-numeric:tabular-nums; margin-top:4px;">' + value + '</div></div>';
      };

  // Threshold above which the paste won't survive a single google.script.run
  // call (it silently drops with no error). Anything bigger is sent in

  function _chunkUpload(text, kind, onSuccess, onFailure) {
      var token = 't' + Date.now() + Math.random().toString(36).slice(2, 8);
      var total = Math.ceil(text.length / CHUNK_SIZE);
      console.log('[sync] chunked upload: ' + total + ' chunks of ~' + CHUNK_SIZE + ' bytes');
      var sent = 0;
      function next() {
          if (sent >= total) {
              console.log('[sync] all chunks uploaded, processing server-side');
              showToast('Processing ' + Math.round(text.length / 1024) + ' KB…');
              google.script.run
                  .withSuccessHandler(onSuccess)
                  .withFailureHandler(onFailure)
                  .processChunkedImport(token, total, kind);
              return;
          }
          var slice = text.slice(sent * CHUNK_SIZE, (sent + 1) * CHUNK_SIZE);
          google.script.run
              .withSuccessHandler(function() {
                  sent++;
                  if (sent === 1 || sent % 5 === 0 || sent === total) {
                      console.log('[sync] uploaded ' + sent + '/' + total);
                      showToast('Uploading ' + sent + '/' + total + '…');
                  }
                  next();
              })
              .withFailureHandler(function(err) {
                  console.error('[sync] chunk ' + sent + ' failed:', err);
                  onFailure(err);
              })
              .uploadChunk(token, sent, total, slice);
      }
      next();
  }

  function sanitizeRichText(html) {
      if (!html) return '';
      var allowed = {P:1,BR:1,STRONG:1,B:1,EM:1,I:1,U:1,UL:1,OL:1,LI:1,A:1,SPAN:1,DIV:1,H1:1,H2:1,H3:1,H4:1,H5:1,H6:1,CODE:1,PRE:1,BLOCKQUOTE:1,HR:1};
      var temp = document.createElement('div');
      temp.innerHTML = String(html);
      function walk(node) {
          var kids = Array.prototype.slice.call(node.childNodes);
          kids.forEach(function(child) {
              if (child.nodeType === 1) {
                  var tag = child.tagName;
                  if (tag === 'SCRIPT' || tag === 'STYLE') { node.removeChild(child); return; }
                  if (!allowed[tag]) {
                      while (child.firstChild) node.insertBefore(child.firstChild, child);
                      node.removeChild(child);
                      return;
                  }
                  Array.prototype.slice.call(child.attributes).forEach(function(attr) {
                      if (tag === 'A' && attr.name === 'href') {
                          var v = String(attr.value || '').trim();
                          if (/^(javascript|data|vbscript):/i.test(v)) child.removeAttribute('href');
                      } else {
                          child.removeAttribute(attr.name);
                      }
                  });
                  if (tag === 'A' && child.getAttribute('href')) {
                      child.setAttribute('target', '_blank');
                      child.setAttribute('rel', 'noopener noreferrer');
                      child.style.color = 'var(--accent-primary)';
                      child.style.textDecoration = 'underline';
                  }
                  walk(child);
              } else if (child.nodeType === 3) {
                  var text = child.nodeValue;
                  if (node.tagName !== 'A' && /https?:\/\//.test(text)) {
                      var frag = document.createDocumentFragment();
                      var last = 0, re = /https?:\/\/[^\s<>"']+/g, m;
                      while ((m = re.exec(text)) !== null) {
                          if (m.index > last) frag.appendChild(document.createTextNode(text.substring(last, m.index)));
                          var a = document.createElement('a');
                          a.href = m[0];
                          a.textContent = m[0];
                          a.target = '_blank';
                          a.rel = 'noopener noreferrer';
                          a.style.color = 'var(--accent-primary)';
                          a.style.textDecoration = 'underline';
                          frag.appendChild(a);
                          last = m.index + m[0].length;
                      }
                      if (last < text.length) frag.appendChild(document.createTextNode(text.substring(last)));
                      node.replaceChild(frag, child);
                  }
              } else {
                  node.removeChild(child);
              }
          });
      }
      walk(temp);
      return temp.innerHTML;
  }
