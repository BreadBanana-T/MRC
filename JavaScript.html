      if (state.syncMeta && state.syncMeta.sched) schedText = state.syncMeta.sched;

      var headerHtml = `
      <style>
          @keyframes spin { to { transform: rotate(360deg); } }
      </style>
      <div class="sticky-header" style="justify-content:space-between; align-items:center;">
         <div style="display:flex; align-items:center; gap:16px;">
             <div>
                 <h2 style="margin:0;">Master Operations Tracker</h2>
                 <div style="font-size:0.7rem; color:var(--text-muted); margin-top:4px; display:flex; gap:12px; font-weight:600;">
                     <span><i data-lucide="calendar-check" width="10"></i> ${schedText}</span>
                 </div>
             </div>
             
             <div class="nav-island" style="background:${state.selectedArchive === 'LIVE' ? 'var(--accent-primary)' : 'var(--status-break)'}; border:none; padding:4px 16px; border-radius:12px; margin-left:16px;">
                 <span style="font-weight:800; font-size:0.8rem; color:${state.selectedArchive === 'LIVE' ? 'white' : '#000'}; letter-spacing:1px;">
                    ${u.cycle || 'CALCULATING...'}
                 </span>
             </div>

             <select class="input-aether" style="width:auto; height:34px; font-weight:700;" onchange="state.selectedArchive=this.value; fetchInsightData();">
                 <option value="LIVE" ${state.selectedArchive === 'LIVE' ? 'selected' : ''}>🔴 Live Calculation Engine</option>
                 ${archiveOptionsHtml}
             </select>

             ${datePickerHtml}
         </div>
         <div style="display:flex; gap:12px;">
             <input id="insight-search" type="text" class="input-aether" style="width:200px; height:34px; font-size:0.85rem;" placeholder="Search agent..." oninput="handleInsightSearch(this.value)" value="${state.insightSearch || ''}">
             ${rightSideHtml}
         </div>
      </div>`;

      if (!u.data) {
          return headerHtml + `
          <div class="aether-card" style="padding:60px; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:400px;">
              <div style="width: 40px; height: 40px; border: 3px solid var(--glass-border); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 24px;"></div>
              <h3 style="color:var(--text-main); margin:0 0 8px 0;">Compiling Wednesday Cycle...</h3>
              <p style="color:var(--text-muted); font-size:0.9rem; margin:0;">Aggregating Furloughs, Coachings, and Special Roles.</p>
          </div>`;
      }
      
      var displayData = u.data || [];
      if (state.insightSearch) {
          var term = state.insightSearch.toLowerCase();
          displayData = displayData.filter(function(a) { return (a.name||'').toLowerCase().indexOf(term) !== -1; });
      }

      var rowsHtml = displayData.map(function(a) { return `
          <tr style="border-bottom:1px solid var(--glass-border); transition:0.2s;" class="hover-bg">
              <td style="padding:16px; font-weight:700; color:var(--text-main);">${a.name || ''}</td>
              <td style="padding:16px; text-align:right; font-family:monospace;">${a.acsu > 0 ? a.acsu + 'h' : '-'}</td>
              <td style="padding:16px; text-align:right; font-family:monospace;">${a.coach > 0 ? a.coach + 'h' : '-'}</td>
              <td style="padding:16px; text-align:right; font-family:monospace; color:var(--status-active);">${a.safe > 0 ? a.safe + 'h' : '-'}</td>
              <td style="padding:16px; text-align:right; font-family:monospace; color:var(--status-role);">${a.icl > 0 ? a.icl + 'h' : '-'}</td>
              <td style="padding:16px; text-align:right; font-family:monospace; color:var(--status-ulc);">${a.ulc > 0 ? a.ulc + 'h' : '-'}</td>
              <td style="padding:16px; text-align:right; font-weight:800; font-size:1.1rem; color:var(--text-main);">${a.total || 0}h</td>
          </tr>
      `; }).join('') || `<tr><td colspan="7" style="padding:40px; text-align:center; color:var(--text-muted);">No off-phone activity found for this cycle.</td></tr>`;

      return `
      ${headerHtml}
      
      <div style="background:rgba(220, 38, 38, 0.05); border-left:4px solid var(--status-alert); padding:16px; margin-bottom:24px; border-radius:8px;">
          <h3 style="margin:0 0 4px 0; color:var(--status-alert); font-size:1rem; display:flex; align-items:center; gap:8px;">
              <i data-lucide="alert-triangle" width="18"></i> CUMULATIVE WEEKLY TOTALS
          </h3>
          <p style="margin:0; font-size:0.85rem; color:var(--text-secondary); font-weight:600;">This tracker displays the combined total hours for the entire Wednesday-to-Wednesday cycle. It is not a daily view.</p>
      </div>

      <div class="aether-card" style="padding:0; overflow:hidden; display:flex; flex-direction:column; min-height:500px;">
          <div style="background:rgba(0,0,0,0.02); padding:16px 24px; border-bottom:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center;">
              <div style="font-weight:700; color:var(--text-muted); font-size:0.85rem; text-transform:uppercase; letter-spacing:1px;">
                  Cycle Range: <span style="color:var(--text-main);">${u.period || ''}</span>
              </div>
          </div>
          <div style="overflow-y:auto; flex:1;">
              <table style="width:100%; border-collapse:collapse; font-size:0.9rem;">
                 <thead style="background:rgba(0,0,0,0.03); color:var(--text-muted); font-size:0.75rem; text-transform:uppercase; position:sticky; top:0; z-index:10; backdrop-filter:blur(10px);">
                     <tr>
                         <th style="padding:16px; text-align:left;">Agent Name</th>
                         <th style="padding:16px; text-align:right;">WEEKLY ACSU</th>
                         <th style="padding:16px; text-align:right;">WEEKLY Coaching</th>
                         <th style="padding:16px; text-align:right;">WEEKLY SAFE</th>
                         <th style="padding:16px; text-align:right;">WEEKLY ICL</th>
                         <th style="padding:16px; text-align:right;">WEEKLY ULC</th>
                         <th style="padding:16px; text-align:right; color:var(--text-main);">TOTAL WEEKLY</th>
                     </tr>
                 </thead>
                 <tbody>${rowsHtml}</tbody>
              </table>
          </div>
      </div>`;
  }

  function renderCalc() {
     return `<div class="grid-split">
        <div class="aether-card">
            <div style="font-weight:700; margin-bottom:20px; color:var(--text-muted); letter-spacing:1px;">DATA STREAM</div>
            <textarea id="in-text" class="input-aether" rows="8" placeholder="Inbound Data" style="margin-bottom:20px; font-family:monospace; font-size:0.9rem; height:auto; align-items:start; padding-top:12px;"></textarea>
            <textarea id="out-text" class="input-aether" rows="8" placeholder="Outbound Data" style="margin-bottom:24px; font-family:monospace; font-size:0.9rem; height:auto; align-items:start; padding-top:12px;"></textarea>
            <button class="btn btn-primary" style="width:100%;" onclick="runCalculation()">Run Analysis</button>
        </div>
        <div class="aether-card" style="display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
            <div style="font-weight:700; margin-bottom:20px; color:var(--text-muted); letter-spacing:1px;">PROJECTED SVL</div>
            <div style="font-size:6rem; font-weight:800; color:var(--text-accent); margin-bottom:40px;">${state.currentSL}</div>
            <div id="report-box" style="width:100%;">
                <div style="background:var(--bg-root); padding:24px; border-radius:24px; text-align:left; font-family:monospace; font-size:0.85rem; max-height:300px; overflow-y:auto; border:1px solid var(--glass-border); white-space:pre-wrap;" id="report-content">${state.currentReport || "..."}</div>
                <button class="btn btn-glass" style="width:100%; margin-top:20px;" onclick="copyReport()">Copy Report</button>
            </div>
        </div>
     </div>`;
  }
  
  window.runCalculation = function() {
     var i = document.getElementById('in-text').value; 
     var o = document.getElementById('out-text').value;
     if(typeof google!=='undefined') { 
         showToast("Calculating..."); 
         google.script.run.withSuccessHandler(function(r){ 
             var d=JSON.parse(r); 
             state.currentSL=d.svl; 
             state.currentReport = d.report; 
             fetchStats(); 
             render(); 
         }).runCalculator(i, o); 
     } else { 
         state.currentSL = "84.5%"; 
         state.currentReport = "STATS UPDATE:\nSVL OUT: 84.5%\n..."; 
         render(); 
     }
  };

  window.copyReport = function() {
      var text = document.getElementById('report-content').innerText; 
      fallbackCopyTextToClipboard(text, "Report Copied");
  };

  window.copyWindTemplate = function() {
     var targetOrder = ["Toronto", "Ottawa", "Calgary", "Edmonton", "Vancouver", "Prince George", "Montreal", "Quebec City"];
     var flatList = []; 
     if(state.weather) {
         var keys = Object.keys(state.weather);
         for(var i=0; i<keys.length; i++) {
             var list = state.weather[keys[i]];
             if (!list || !Array.isArray(list)) continue;
             for(var j=0; j<list.length; j++) flatList.push(list[j]);
         }
     }
     var rows = targetOrder.map(function(name) { 
         var city = null;
         for(var i=0; i<flatList.length; i++) { if(flatList[i].name === name) { city = flatList[i]; break; } }
         if (!city) return ""; 
         return formatWindString(city.wind); 
     });
     
     fallbackCopyTextToClipboard(rows.join("\n"), "Winds Copied");
  };

  function formatWindString(val) { if (!val) return ""; var w = val.toString(); if (w.toLowerCase().indexOf("light") !== -1) w = "~5"; if (w.indexOf("G") !== -1) return w.replace("G", " km/h Gust "); else if (w.match(/^\d/) || w === "~5") return w + " km/h"; return w; }
  
  window.saveBreaks = function() { var name = state.selectedAgent; var agent = null; for(var k in state.agents) { if(!Array.isArray(state.agents[k])) continue; for(var i=0; i<state.agents[k].length; i++) { if(state.agents[k][i].name === name) { agent = state.agents[k][i]; break; } } if(agent) break; } if(agent) { var newBreaks = (agent.rawBreaks || []).map(function(b, i) { return { type: b.type, start: document.getElementById("bs-"+i).value, end: document.getElementById("be-"+i).value }; }); agent.rawBreaks = newBreaks; agent.isModified = true; if(typeof google!=='undefined') google.script.run.updateAgentBreaks(name, JSON.stringify(newBreaks)); } document.getElementById('break-modal').classList.remove('open'); showToast("Saved"); render(); };
  
  window.saveOvertime = function() { var name = state.selectedAgent; var s = document.getElementById('ot-start').value; var e = document.getElementById('ot-end').value; if(s && e) { var agent = null; for(var k in state.agents) { if(!Array.isArray(state.agents[k])) continue; for(var i=0; i<state.agents[k].length; i++) { if(state.agents[k][i].name === name) { agent = state.agents[k][i]; break; } } if(agent) break; } if(agent) agent.isOT = true; if(typeof google!=='undefined') google.script.run.submitOvertime(name, s, e, "", ""); document.getElementById('ot-modal').classList.remove('open'); showToast("Logged"); render(); } };
  
  window.runImportAction = function() { 
      var t = document.getElementById('import-text').value; 
      if(!t) return; 
      closeImportModal(); 
      showToast("Syncing Database..."); 
      
      if(typeof google !== 'undefined') {
          google.script.run.runImport(t);
          google.script.run
             .withSuccessHandler(function(trackerResult) {
                 var finalMsg = trackerResult.indexOf("Error") !== -1 ? "Schedule Synced" : trackerResult;
                 showToast(finalMsg); 
                 
                 fetchData();
                 fetchMetadata();
                 if (state.view === 'tracker') fetchTrackerData(); 
                 if (state.view === 'insights') fetchInsightData();

                 google.script.run.addGlobalNotification("Global Update: A manager synced new WFM Data. Dashboards refreshed.");
             })
             .withFailureHandler(function(err) {
                 showToast("Schedule Synced");
                 fetchData();
                 fetchMetadata();
                 if (state.view === 'tracker') fetchTrackerData(); 
                 if (state.view === 'insights') fetchInsightData();
             })
             .importWorkforceData(t, t); 
      } 
  };

  window.openEventModal = function(idx) {
      var e = state.calendarEvents[idx];
      if(!e) return;
      document.getElementById('evt-modal-title').innerText = e.title || '';
      document.getElementById('evt-modal-time').innerText = (e.date || '') + " • " + (e.startTime || '') + " - " + (e.endTime || '');
      document.getElementById('evt-modal-desc').innerHTML = e.description || "No description provided.";
      document.getElementById('event-modal').classList.add('open');
  };
  
  var charts = {};

  function initTrackerChart() {
      if (typeof Chart === 'undefined' || !state.trackerData || !state.trackerData.events || state.trackerLoading) return;
      var canvas = document.getElementById('tracker-chart');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');

      if (charts.tracker) { charts.tracker.destroy(); charts.tracker = null; }

      var d = state.trackerData;
      var isCoach = d.trackerType === 'coaching' || d.trackerType === 'roles';
      var isDark = document.body.classList.contains('dark');
      var textColor = isDark ? '#94a3b8' : '#64748b';

      var shadowPlugin = {
          id: 'shadowPlugin',
          beforeDraw: function(chart) {
              var ctx = chart.ctx;
              ctx.save();
              ctx.shadowColor = isDark ? 'rgba(0,0,0,0.8)' : 'rgba(0,0,0,0.2)';
              ctx.shadowBlur = 15;
              ctx.shadowOffsetX = 0;
              ctx.shadowOffsetY = 10;
          },
          afterDraw: function(chart) { chart.ctx.restore(); }
      };

      var insideLabelsPlugin = {
          id: 'insideLabels',
          afterDatasetsDraw: function(chart) {
              var ctx = chart.ctx;
              var data = chart.data;
              chart.getDatasetMeta(0).data.forEach(function(datapoint, index) {
                  var value = data.datasets[0].data[index];
                  if (value <= 0) return; 
                  
                  var label = data.labels[index];
                  var pos = datapoint.tooltipPosition();
                  
                  ctx.save();
                  ctx.font = "bold 12px 'Outfit', sans-serif";
                  ctx.fillStyle = 'white';
                  ctx.textAlign = 'center';
                  ctx.textBaseline = 'middle';
                  ctx.shadowColor = 'rgba(0,0,0,0.5)';
                  ctx.shadowBlur = 4;
                  ctx.shadowOffsetX = 0;
                  ctx.shadowOffsetY = 1;
                  
                  ctx.fillText(label, pos.x, pos.y - 8);
                  ctx.font = "800 14px 'Outfit', sans-serif";
                  ctx.fillText(value.toFixed(1) + 'h', pos.x, pos.y + 8);
                  ctx.restore();
              });
          }
      };

      if (!isCoach) {
          var g1 = ctx.createLinearGradient(0,0,0,300); g1.addColorStop(0, '#fde68a'); g1.addColorStop(1, '#d97706'); 
          var g2 = ctx.createLinearGradient(0,0,0,300); g2.addColorStop(0, '#fdba74'); g2.addColorStop(1, '#c2410c'); 
          var g3 = ctx.createLinearGradient(0,0,0,300); g3.addColorStop(0, '#a5b4fc'); g3.addColorStop(1, '#4338ca'); 

          charts.tracker = new Chart(ctx, {
              type: 'pie',
              plugins: [shadowPlugin, insideLabelsPlugin],
              data: {
                  labels: ['Morning', 'Evening', 'Night'],
                  datasets: [{
                      data: [d.totals.morning || 0, d.totals.evening || 0, d.totals.night || 0],
                      backgroundColor: [g1, g2, g3],
                      borderColor: isDark ? '#1e293b' : '#ffffff',
                      borderWidth: 2,
                      hoverOffset: 0
                  }]
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  layout: { padding: 25 },
                  events: [], 
                  plugins: { 
                      legend: { display: false },
                      tooltip: { enabled: false } 
                  },
                  animation: { animateScale: true, animateRotate: true, duration: 1200, easing: 'easeOutQuart' }
              }
          });
      } else {
          var gBar = ctx.createLinearGradient(0,0,300,0);
          gBar.addColorStop(0, '#818cf8');
          gBar.addColorStop(1, '#4f46e5');

          var activityCount = {};
          (d.events || []).forEach(function(e) {
              var name = e.activityName || 'Unknown';
              activityCount[name] = (activityCount[name] || 0) + (e.hours || 0);
          });
          var sortedNames = Object.keys(activityCount).sort(function(a,b){return activityCount[b] - activityCount[a];}).slice(0, 5);
          var sortedData = sortedNames.map(function(n){return activityCount[n];});

          charts.tracker = new Chart(ctx, {
              type: 'bar',
              plugins: [shadowPlugin],
              data: {
                  labels: sortedNames.map(function(n){return n.length > 15 ? n.substring(0,15)+'...' : n;}),
                  datasets: [{
                      data: sortedData,
                      backgroundColor: gBar,
                      borderRadius: 8,
                      borderWidth: 0,
                      barThickness: 'flex',
                      maxBarThickness: 30
                  }]
              },
              options: {
                  indexAxis: 'y',
                  responsive: true,
                  maintainAspectRatio: false,
                  layout: { padding: { right: 20 } },
                  plugins: { 
                      legend: { display: false },
                      tooltip: {
                          backgroundColor: isDark ? 'rgba(15, 23, 42, 0.95)' : 'rgba(255, 255, 255, 0.95)',
                          titleColor: isDark ? '#fff' : '#0f172a',
                          bodyColor: isDark ? '#cbd5e1' : '#475569',
                          borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)',
                          borderWidth: 1,
                          titleFont: { family: "'Outfit', sans-serif", size: 14, weight: '800' },
                          bodyFont: { family: "'Outfit', sans-serif", size: 13, weight: '600' },
                          padding: 12,
                          cornerRadius: 12
                      }
                  },
                  scales: { 
                      x: { display: false }, 
                      y: { grid: { display: false }, ticks: { font: { family: "'Outfit', sans-serif", weight: 'bold'}, color: textColor } } 
                  },
                  animation: { duration: 1200, easing: 'easeOutBounce' }
              }
          });
      }
  }

  function initCharts() {}

  function initOverviewChart() {
      if (typeof Chart === 'undefined') return;
      
      var canvas = document.getElementById('chart-overview');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');

      var labels = state.slHistory.map(function(d){return d.name || '';});
      var slData = state.slHistory.map(function(d){return d.val || 0;});
      var rawAck = state.slHistory.map(function(d){return d.ack || 0;});

      if (charts.overview) {
          charts.overview.destroy();
          charts.overview = null;
      }

      var gradientSL = ctx.createLinearGradient(0, 0, 0, canvas.height || 200);
      gradientSL.addColorStop(0, 'rgba(99, 102, 241, 0.4)');
      gradientSL.addColorStop(1, 'rgba(99, 102, 241, 0.0)'); 
      
      var gradientACK = ctx.createLinearGradient(0, 0, 0, canvas.height || 200);
      gradientACK.addColorStop(0, 'rgba(244, 63, 94, 0.4)'); 
      gradientACK.addColorStop(1, 'rgba(244, 63, 94, 0.0)');

      var isDark = document.body.classList.contains('dark');
      var gridColor = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';
      var textColor = isDark ? '#94a3b8' : '#64748b';

      var shadowPlugin = {
          id: 'shadowPluginLine',
          beforeDatasetsDraw: function(chart) {
              var ctx = chart.ctx;
              ctx.save();
              ctx.shadowColor = isDark ? 'rgba(0,0,0,0.6)' : 'rgba(99, 102, 241, 0.3)';
              ctx.shadowBlur = 12;
              ctx.shadowOffsetX = 0;
              ctx.shadowOffsetY = 6;
          },
          afterDatasetsDraw: function(chart) {
              chart.ctx.restore();
          }
      };

      charts.overview = new Chart(ctx, {
          type: 'line',
          plugins: [shadowPlugin],
          data: {
              labels: labels,
              datasets: [
                  {
                      label: 'Service Level (%)',
                      data: slData,
                      borderColor: '#4f46e5',
                      backgroundColor: gradientSL,
                      borderWidth: 3,
                      fill: true,
                      tension: 0.4, 
                      pointRadius: 0, 
                      pointHoverRadius: 6,
                      pointBackgroundColor: '#4f46e5',
                      pointBorderColor: '#fff',
                      pointBorderWidth: 2,
                      yAxisID: 'y'
                  },
                  {
                      label: 'Response Time (s)',
                      data: rawAck.map(function(v){return v > 120 ? 120 : v;}), 
                      borderColor: '#f43f5e',
                      backgroundColor: gradientACK,
                      borderWidth: 3,
                      borderDash: [6, 4], 
                      fill: true,
                      tension: 0.4,
                      pointRadius: 0,
                      pointHoverRadius: 6,
                      pointBackgroundColor: '#f43f5e',
                      pointBorderColor: '#fff',
                      pointBorderWidth: 2,
                      yAxisID: 'y1'
                  }
              ]
          },
          options: { 
              responsive: true, 
              maintainAspectRatio: false,
              interaction: {
                  mode: 'index',
                  intersect: false,
              },
              plugins: { 
                  legend: { 
                      display: true, 
                      position: 'top', 
                      align: 'end',
                      labels: { 
                          usePointStyle: true, 
                          boxWidth: 8,
                          boxHeight: 8,
                          font: { family: "'Outfit', sans-serif", weight: '700', size: 11 },
                          color: textColor
                      } 
                  },
                  tooltip: {
                      backgroundColor: isDark ? 'rgba(15, 23, 42, 0.95)' : 'rgba(255, 255, 255, 0.95)',
                      titleColor: isDark ? '#fff' : '#0f172a',
                      bodyColor: isDark ? '#cbd5e1' : '#475569',
                      borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)',
                      borderWidth: 1,
                      titleFont: { family: "'Outfit', sans-serif", size: 14, weight: '800' },
                      bodyFont: { family: "'Outfit', sans-serif", size: 13, weight: '600' },
                      padding: 12,
                      cornerRadius: 12,
                      boxPadding: 6,
                      usePointStyle: true,
                      callbacks: {
                          label: function(context) {
                              var label = context.dataset.label || '';
                              if (label) { label = label.replace(' (%)', '').replace(' (s)', '') + ': '; }
                              if (context.datasetIndex === 0) {
                                  label += context.raw + '%';
                              } else {
                                  label += rawAck[context.dataIndex] + 's';
                              }
                              return label;
                          }
                      }
                  }
              },
              scales: {
                  x: {
                      grid: { display: false, drawBorder: false },
                      ticks: { font: { family: "'Outfit', sans-serif", weight: '600' }, color: textColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }
                  },
                  y: {
                      type: 'linear',
                      display: true,
                      position: 'left',
                      min: 0,
                      max: 100,
                      grid: { color: gridColor, drawBorder: false, borderDash: [5, 5] },
                      ticks: { callback: function(value){return value + '%';}, font: { family: "'Outfit', sans-serif", weight: '600' }, color: textColor, padding: 10 }
                  },
                  y1: {
                      type: 'linear',
                      display: true,
                      position: 'right',
                      min: 0,
                      suggestedMax: Math.max.apply(null, rawAck.map(function(v){return v > 120 ? 120 : v;}).concat([40])) * 1.2, 
                      grid: { display: false, drawBorder: false },
                      ticks: { callback: function(value){return value + 's';}, font: { family: "'Outfit', sans-serif", weight: '600' }, color: textColor, padding: 10 }
                  }
              },
              animation: { duration: 1500, easing: 'easeOutQuart' }
          }
      });
  }

</script>
