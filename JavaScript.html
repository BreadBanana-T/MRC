<script>
  // --- INITIALIZATION & GLOBAL STATE ---
  const refreshIcons = () => { if(typeof lucide !== 'undefined') lucide.createIcons(); };
  
  let state = { 
      view: 'overview', 
      agents: {}, 
      pendingUpdates: {}, 
      weather: {}, 
      slHistory: [], 
      idpHistory: [],
      calendarEvents: [],
      roleLogs: [], 
      statsLogs: [], 
      currentSL: "--", 
      currentACK: "--", 
      selectedAgent: null, 
      searchTerm: "", 
      regionFilter: 'All', 
      notifications: [], 
      dismissedNotifs: new Set(), 
      notifOpen: false, 
      scripts: [], 
      agentTab: 'floor', 
      currentReport: "...", 
      selectedCategory: "All", 
      editingId: null, 
      appUrl: "", 
      insightMode: 'day', 
      selectedDate: new Date().toISOString().split('T')[0],
      graphRendered: false 
  };

  // Mouse move effect for glass cards
  document.addEventListener('mousemove', e => {
      document.querySelectorAll('.aether-card').forEach(card => {
          const rect = card.getBoundingClientRect();
          card.style.setProperty('--x', `${e.clientX - rect.left}px`);
          card.style.setProperty('--y', `${e.clientY - rect.top}px`);
      });
  });
  
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initApp); else initApp();

  function initApp() {
    try { if (localStorage.getItem('rta_theme') === 'dark') document.body.classList.add('dark'); } catch(e) {}
    
    // Read Params from Hidden Div
    const config = document.getElementById('app-config');
    if (config) {
        state.appUrl = config.getAttribute('data-url');
        const popout = config.getAttribute('data-popout');
        const mode = config.getAttribute('data-mode');

        if (popout === "true") {
            document.body.classList.add('popout-mode');
            state.view = 'popout-view'; 
            state.regionFilter = (mode === 'onshore' ? 'Onshore' : (mode === 'offshore' ? 'Offshore' : (mode === 'breaks' ? 'Breaks' : 'All')));
            document.getElementById('content').innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted); font-weight:700;">Loading Floor...</div>';
            if (typeof google !== 'undefined') { setInterval(fetchData, 30000); fetchData(); }
            return;
        }
    }
    
    render(); 
    setInterval(updateClock, 1000); 
    setInterval(fetchData, 60000); 
    setInterval(fetchNotifications, 10000);
    setInterval(fetchCalendar, 300000); // 5 mins
    // Refresh Insights timers every minute if on insights tab
    setInterval(() => { if(state.view === 'insights') render(); }, 60000); 
    fetchData(); 
    fetchNotifications();
    fetchCalendar();
  }

  // --- NAVIGATION & VIEW CONTROL ---
  window.setView = (v) => { 
      state.view = v; 
      if(v==='scripts') fetchScripts(); 
      if(v==='insights') fetchInsightData(); 
      render(); 
  };
  
  window.setAgentTab = (tab) => { state.agentTab = tab; render(); };
  window.setInsightMode = (m) => { state.insightMode = m; fetchInsightData(); render(); };
  window.handleDateChange = (val) => { state.selectedDate = val; fetchInsightData(); render(); };
  window.toggleTheme = () => { document.body.classList.toggle('dark'); try{ localStorage.setItem('rta_theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }catch(e){} render(); };
  
  // --- ACTIONS ---
  window.openImportModal = () => document.getElementById('import-modal').classList.add('open');
  window.closeImportModal = () => document.getElementById('import-modal').classList.remove('open');
  window.toggleNotifPanel = () => { const p=document.getElementById('notif-panel'); state.notifOpen=!state.notifOpen; p.classList.toggle('open'); if(state.notifOpen) renderNotifList(); };
  
  window.openMenu = (e, n) => { 
      state.selectedAgent=n; 
      const m=document.getElementById('agent-menu'), o=document.getElementById('overlay'); 
      o.style.display='block'; m.style.display='flex'; 
      const r=e.currentTarget.getBoundingClientRect(); 
      m.style.top=(r.bottom+10)+'px'; m.style.left=(r.left)+'px'; 
  };
  window.closeMenu = () => { document.getElementById('agent-menu').style.display='none'; document.getElementById('overlay').style.display='none'; };
  
  window.setAgentStatus = (type, val) => { 
      closeMenu(); 
      const name=state.selectedAgent; 
      state.pendingUpdates[name]={type,val,timestamp:Date.now()}; 
      moveAgentInMemory(name,type,val); 
      if(state.view==='agents') render(); 
      showToast("Status Updated"); 
      if(typeof google!=='undefined') google.script.run.updateAgentStatus(name,type,val); 
  };
  
  window.openPopout = (mode) => { 
      const baseUrl = state.appUrl || window.location.href.split('?')[0]; 
      const sep = baseUrl.includes('?') ? '&' : '?'; 
      window.open(`${baseUrl}${sep}popout=true&mode=${mode.toLowerCase()}`, '_blank', 'width=450,height=800,menubar=no,toolbar=no,location=no,status=no'); 
  };

  function showToast(m) { const t=document.getElementById('toast'); if(!t) return; t.querySelector('#toast-msg').innerText=m; t.style.opacity='1'; t.style.transform='translateY(0)'; setTimeout(()=>{t.style.opacity='0'; t.style.transform='translateY(20px)';},3000); }
  function updateClock() { const el=document.getElementById('clock'); if(el) el.innerText=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
  
  let searchTimeout;
  window.handleScriptSearch = (val) => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { state.searchTerm = val; render(); }, 200); };
  function handleSearch(v) { 
      state.searchTerm = v; 
      if(state.view === 'agents') { 
          const pills = document.querySelectorAll('.agent-pill'); const term = v.toLowerCase(); 
          pills.forEach(p => { 
              const name = p.getAttribute('data-name').toLowerCase(); 
              const reg = p.getAttribute('data-region'); 
              const matchName = !term || name.includes(term); 
              const matchReg = state.regionFilter === 'All' || reg.includes(state.regionFilter); 
              if (matchName && matchReg) p.style.display = 'flex'; else p.style.display = 'none'; 
          }); 
      } else { render(); } 
  }
  function setRegionFilter(v) { state.regionFilter=v; render(); }

  // --- DATA FETCHING ---
  function fetchData() {
    if(typeof google==='undefined') return;
    google.script.run.withSuccessHandler(j=>{
        try{ const d=JSON.parse(j); if(d){ state.agents={...state.agents,...d}; applyPendingUpdates(); if(state.view!=='scripts' && state.view!=='calc' && state.view!=='insights') render(); } }catch(e){}
    }).getFloorStatus();

    if(state.view !== 'popout-view') {
      google.script.run.withSuccessHandler(r=>{ try{ const d=(typeof r==='object'&&r!==null)?r:JSON.parse(r); state.weather=d.weather||d; state.alerts=d.alerts||[]; if(state.view.match(/overview|weather/)) render(); }catch(e){} }).getLiveDashboardData();
      google.script.run.withSuccessHandler(j=>{ try{ const h=JSON.parse(j); if(h && h.length){ state.slHistory=h; const latest=h[h.length-1]; state.currentSL=latest.val+"%"; state.currentACK=latest.ack+"s"; if(state.view==='overview') render(); } }catch(e){} }).getStatsHistory();
    }
  }
  
  function fetchScripts() { if(typeof google!=='undefined') google.script.run.withSuccessHandler(res => { state.scripts = JSON.parse(res); render(); }).fetchScripts(); }
  function fetchNotifications() { if(typeof google==='undefined') return; google.script.run.withSuccessHandler(j=>{try{state.notifications=JSON.parse(j).filter(n=>!state.dismissedNotifs.has(String(n.id))); const dot = document.getElementById('notif-dot'); if(dot) dot.style.display=state.notifications.length?'block':'none'; if(state.notifOpen) renderNotifList(); }catch(e){}}).getSystemNotifications(); }
  function fetchCalendar() { if(typeof google==='undefined') return; google.script.run.withSuccessHandler(j=>{try{state.calendarEvents=JSON.parse(j); if(state.view==='overview') render(); }catch(e){}}).getDailyCalendarEvents(); }
  
  function fetchInsightData() {
      if(typeof google === 'undefined') return;
      
      const roleHandler = (res) => { try { state.roleLogs = JSON.parse(res); if (state.view === 'insights') render(); } catch(e) {} };
      const statsHandler = (res) => { try { state.statsLogs = JSON.parse(res); if (state.view === 'insights') render(); } catch(e) {} };
      const idpHandler = (res) => { try { state.idpHistory = JSON.parse(res); if (state.view === 'insights') initCharts(); } catch(e) {} };

      google.script.run.withSuccessHandler(idpHandler).getIdpHistory();

      if (state.insightMode === 'week') {
          google.script.run.withSuccessHandler(roleHandler).getWeeklyRoleLogs(state.selectedDate);
      } else {
          google.script.run.withSuccessHandler(roleHandler).getDailyRoleLogs(state.selectedDate);
          google.script.run.withSuccessHandler(statsHandler).getDailyStatsLog(state.selectedDate);
      }
  }

  function applyPendingUpdates() { const now=Date.now(); for(const n in state.pendingUpdates) { if(now-state.pendingUpdates[n].timestamp>120000) delete state.pendingUpdates[n]; else moveAgentInMemory(n, state.pendingUpdates[n].type, state.pendingUpdates[n].val); } }
  function moveAgentInMemory(name, type, val) {
     let o = null; 
     for (const k in state.agents) { if(!Array.isArray(state.agents[k])) continue; const i = state.agents[k].findIndex(a => a.name === name); if(i > -1) { o = state.agents[k][i]; break; } }
     if(o) { 
         if (type === 'role') { o.role = (val === 'Active') ? '' : val; if(val === 'Active') { o.subStatus = ""; } }
         else if (type === 'absent') { o.subStatus = val; } 
     }
  }

  // --- RENDER MAIN ROUTER ---
  function render() {
     if (state.view === 'popout-view') { renderPopout(state.regionFilter); refreshIcons(); return; }

     const sl = document.getElementById('hdr-sl');
     if(sl) sl.innerText = state.currentSL;
     
     const c = document.getElementById('content');
     if(!c) return;

     document.querySelectorAll('.nav-btn, .action-btn').forEach(b => b.classList.remove('active'));
     const b = document.getElementById('btn-'+state.view); 
     if(b) b.classList.add('active');

     let h = '';
     if (state.view === 'overview') h = renderOverview();
     else if (state.view === 'agents') h = renderAgents();
     else if (state.view === 'weather') h = renderWeather();
     else if (state.view === 'calc') h = renderCalc();
     else if (state.view === 'scripts') h = renderScripts();
     else if (state.view === 'insights') h = renderInsights();
     
     c.innerHTML = h; refreshIcons();
     const search = document.getElementById('agent-search'); if(state.view === 'agents' && search && state.searchTerm && document.activeElement !== search) search.value = state.searchTerm;
     
     if(state.view === 'insights') initCharts();
     if(state.view === 'overview') initOverviewChart();
  }
  
  // --- INSIGHTS RENDERER ---
  function renderInsights() {
      const isWeek = state.insightMode === 'week';
      
      let activeRoles = [];
      if (!isWeek && state.selectedDate === new Date().toISOString().split('T')[0]) {
          ['icl','safe','ulc','active'].forEach(group => {
              if (state.agents[group]) {
                  state.agents[group].forEach(a => {
                      if (a.role && a.role !== 'Active') {
                          activeRoles.push({ agent: a.name, role: a.role, status: 'LIVE' });
                      }
                  });
              }
          });
      }

      const activeRows = activeRoles.map(r => `
          <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; background:var(--glass-surface); border-radius:12px; margin-bottom:10px; border:1px solid var(--glass-border); box-shadow:0 2px 8px rgba(0,0,0,0.05);">
              <div style="font-weight:700; color:var(--text-main);">${r.agent}</div>
              <div style="display:flex; align-items:center; gap:12px;">
                  <span class="agent-pill ${r.role.includes('SAFE')?'role-safe':(r.role.includes('ICL')?'role-icl':'role-ulc')}" style="font-size:0.8rem; padding:4px 10px;">${r.role}</span>
                  <div style="color:var(--status-active); font-weight:800; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; animation:pulse 2s infinite;">● LIVE</div>
              </div>
          </div>
      `).join('');

      const tableRows = state.roleLogs.map(log => `
          <tr style="border-bottom:1px solid var(--glass-border);">
              ${isWeek ? `<td style="padding:12px; color:var(--text-muted); font-size:0.8rem;">${log.date.substring(5)}</td>` : ''}
              <td style="padding:12px; font-weight:700;">${log.agent}</td>
              <td style="padding:12px;"><span class="agent-pill ${log.role.includes('SAFE')?'role-safe':(log.role.includes('ICL')?'role-icl':'role-ulc')}" style="width:fit-content; font-size:0.75rem; padding:4px 8px;">${log.role}</span></td>
              <td style="padding:12px; text-align:right; font-weight:700;">${log.duration} min</td>
              <td style="padding:12px; text-align:right; color:var(--text-muted); font-family:monospace; font-size:0.85rem;">${log.start} - ${log.end}</td>
          </tr>
      `).join('');

      const statsRows = state.statsLogs.map(s => `
          <tr style="border-bottom:1px solid var(--glass-border);">
              <td style="padding:12px; font-family:monospace; font-weight:700;">${s.time}</td>
              <td style="padding:12px; color:${parseFloat(s.svl)<80?'var(--status-alert)':'var(--status-active)'}; font-weight:700;">${s.svl}</td>
              <td style="padding:12px;">${s.ack}s</td>
          </tr>
      `).join('');

      const flagged = (state.agents.unplanned||[]).map(a => `
          <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid var(--glass-border);">
             <span style="font-weight:700;">${a.name}</span>
             <span style="color:var(--status-alert); font-weight:700; background:rgba(220,38,38,0.1); padding:4px 8px; border-radius:6px; font-size:0.8rem;">${a.subStatus}</span>
          </div>`).join('') || '<div style="padding:24px; color:var(--text-muted); text-align:center;">No active flags today</div>';

      return `
      <style>@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }</style>
      <div class="sticky-header" style="justify-content:space-between;">
         <div style="display:flex; align-items:center; gap:16px;">
             <h2 style="margin:0;">Operations Insight</h2>
             
             <div class="nav-island" style="background:var(--card-bg); border:var(--glass-border);">
                <button class="nav-btn ${!isWeek?'active':''}" style="height:32px; font-size:0.8rem;" onclick="setInsightMode('day')">Daily</button>
                <button class="nav-btn ${isWeek?'active':''}" style="height:32px; font-size:0.8rem;" onclick="setInsightMode('week')">Weekly</button>
             </div>

             <input type="date" class="input-aether" style="width:auto; height:34px;" value="${state.selectedDate}" onchange="handleDateChange(this.value)">
         </div>
         <div style="display:flex; gap:16px;">
             <button class="btn btn-primary" onclick="openIdpModal()">Log IDP</button>
             <div class="kpi-box" style="text-align:right;">
                 <h4 style="margin:0; color:var(--text-muted);">Current SVL</h4>
                 <div style="font-size:1.5rem; font-weight:800; color:var(--accent-primary);">${state.currentSL}</div>
             </div>
         </div>
      </div>
      
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:24px;">
         
         <div style="display:flex; flex-direction:column; gap:24px;">
             <div class="aether-card">
                 <div class="section-header" style="color:var(--status-active);">Active Roles (Live)</div>
                 <div style="max-height:300px; overflow-y:auto;">
                    ${activeRows || '<div style="color:var(--text-muted); text-align:center; padding:20px;">No agents currently in special roles.</div>'}
                 </div>
             </div>
             
             <div class="aether-card" style="padding:0; overflow:hidden; display:flex; flex-direction:column; max-height:400px;">
                 <div class="section-header" style="padding:20px; border-bottom:1px solid var(--glass-border); margin:0; color:var(--status-alert);">
                     ⚠️ Active Flags
                 </div>
                 <div style="flex:1; overflow-y:auto;">
                     ${flagged}
                 </div>
             </div>
         </div>
         
         <div class="aether-card" style="padding:0; overflow:hidden; display:flex; flex-direction:column; max-height:800px; border:2px solid var(--accent-primary);">
             <div class="section-header" style="padding:20px; border-bottom:1px solid var(--glass-border); margin:0; background:var(--accent-primary); color:white;">
                 Completed Sessions (Roles)
             </div>
             <div style="overflow-y:auto; flex:1;">
                 <table style="width:100%; border-collapse:collapse; font-size:0.8rem;">
                    <thead style="background:rgba(0,0,0,0.03); color:var(--text-muted); font-size:0.75rem; text-transform:uppercase;">
                        <tr>
                            ${isWeek ? '<th style="padding:10px;">Date</th>' : ''}
                            <th style="padding:10px; text-align:left;">Agent</th>
                            <th style="padding:10px; text-align:left;">Role</th>
                            <th style="padding:10px; text-align:right;">Mins</th>
                            <th style="padding:10px; text-align:right;">Time</th>
                        </tr>
                    </thead>
                    <tbody>${tableRows}</tbody>
                 </table>
             </div>
         </div>

         <div style="display:flex; flex-direction:column; gap:24px;">
             <div class="aether-card">
                 <div class="section-header">Total Hours</div>
                 <div style="height:160px; width:100%;"><canvas id="chart-roles-hist"></canvas></div>
             </div>

             <div class="aether-card">
                 <div class="section-header">IDP History</div>
                 <div style="height:160px; width:100%;"><canvas id="chart-idp-hist"></canvas></div>
             </div>
             
             <div class="aether-card" style="padding:0; overflow:hidden; display:flex; flex-direction:column; flex:1; min-height:300px;">
                 <div class="section-header" style="padding:20px; border-bottom:1px solid var(--glass-border); margin:0;">
                     Stats Updates (No IDP)
                 </div>
                 <div style="overflow-y:auto; flex:1;">
                     <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
                        <thead style="background:rgba(0,0,0,0.03); color:var(--text-muted); font-size:0.75rem; text-transform:uppercase;">
                            <tr><th style="padding:10px; text-align:left;">Time</th><th style="padding:10px; text-align:left;">SVL</th><th style="padding:10px; text-align:left;">ACK</th></tr>
                        </thead>
                        <tbody>
                            ${statsRows || '<tr><td colspan="3" style="padding:30px; text-align:center; color:var(--text-muted);">No stats recorded.</td></tr>'}
                        </tbody>
                     </table>
                 </div>
             </div>
         </div>

      </div>
      `;
  }
  
  let charts = {};
  function initCharts() {
      if (typeof Chart === 'undefined') return;
      if(charts.rolesHist) charts.rolesHist.destroy();
      if(charts.idpHist) charts.idpHist.destroy();

      const roleData = { 'SAFE': 0, 'ICL': 0, 'ULC': 0 };
      state.roleLogs.forEach(log => {
          if (log.role.includes('SAFE')) roleData.SAFE += (log.duration/60);
          else if (log.role.includes('ICL')) roleData.ICL += (log.duration/60);
          else if (log.role.includes('ULC') || log.role.includes('FIRE')) roleData.ULC += (log.duration/60);
      });

      // Add Active sessions
      ['safe','icl','ulc'].forEach(g => {
          if(state.agents[g]) {
              state.agents[g].forEach(a => {
                  if (a.role && a.role.includes('SAFE')) roleData.SAFE += 0.5;
                  if (a.role && a.role.includes('ICL')) roleData.ICL += 0.5;
                  if (a.role && (a.role.includes('ULC') || a.role.includes('FIRE'))) roleData.ULC += 0.5;
              });
          }
      });

      const ctx2 = document.getElementById('chart-roles-hist');
      if(ctx2) {
          charts.rolesHist = new Chart(ctx2, {
              type: 'bar',
              data: {
                  labels: ['SAFE', 'ICL', 'ULC'],
                  datasets: [{
                      label: 'Hours',
                      data: [roleData.SAFE, roleData.ICL, roleData.ULC],
                      backgroundColor: ['#059669', '#7c3aed', '#f97316'],
                      borderRadius: 6
                  }]
              },
              options: { 
                  responsive: true, 
                  maintainAspectRatio: false, 
                  plugins: { legend: { display: false } },
                  scales: { y: { beginAtZero: true } }
              }
          });
      }

      // IDP GRAPH
      const ctx3 = document.getElementById('chart-idp-hist');
      if(ctx3 && state.idpHistory.length) {
          charts.idpHist = new Chart(ctx3, {
              type: 'line',
              data: {
                  labels: state.idpHistory.map(d=>d.name),
                  datasets: [{
                      label: 'IDP %',
                      data: state.idpHistory.map(d=>d.val),
                      borderColor: '#f97316',
                      backgroundColor: 'rgba(249, 115, 22, 0.1)',
                      fill: true,
                      tension: 0.3
                  }]
              },
              options: { 
                  responsive: true, 
                  maintainAspectRatio: false, 
                  plugins: { legend: { display: false } }
              }
          });
      }
  }

  function initOverviewChart() {
      if (typeof Chart === 'undefined') return;
      
      const ctx = document.getElementById('chart-overview');
      if (!ctx) return;

      const labels = state.slHistory.map(d => d.name);
      const dataPoints = state.slHistory.map(d => d.val);

      // FIX: Destroy old chart instance if the canvas was re-created in DOM
      if (charts.overview) {
          charts.overview.destroy();
          charts.overview = null;
      }
      
      // Determine Animation
      let animConfig = { duration: 1000 };
      if (state.graphRendered) {
          animConfig = { duration: 0 }; // Disable animation for updates
      } else {
          state.graphRendered = true;
      }

      charts.overview = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Service Level',
                data: dataPoints,
                borderColor: '#4f46e5',
                backgroundColor: 'rgba(79, 70, 229, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { y: { min: 0, max: 100 } },
            plugins: { legend: { display: false } },
            animation: animConfig
        }
      });
  }

  // --- STANDARD RENDER FUNCTIONS ---
  function renderPopout(mode) {
     const c = document.getElementById('content');
     if(!c) return; 
     const upMap = new Map(); (state.agents.upcomingBreak||[]).forEach(a=>upMap.set(a.id, a));
     
     let title = "All Units";
     if (mode === 'Onshore') title = "Onshore Unit";
     else if (mode === 'Offshore') title = "Offshore Unit";
     else if (mode === 'Breaks') title = "Break Room";
     
     const filterFn = (list) => (list||[]).filter(a => {
        if (mode === 'All') return true;
        if (mode === 'Breaks') return true; 
        return (a.region||"").includes(mode);
     });
     
     let h = `<div style="padding:20px;">
         <h2 style="margin-top:0; border-bottom:1px solid var(--glass-border); padding-bottom:10px;">${title}</h2>`;
     
     if (mode !== 'Breaks') {
         h += `
         <div style="font-weight:700; color:var(--text-muted); margin-bottom:10px;">Starting Soon</div>
         <div class="agent-list" style="grid-template-columns:1fr;">${filterFn(state.agents.startingSoon).map(a => renderAgentPill(a, upMap.get(a.id))).join('')}</div>
         <div style="font-weight:700; color:var(--text-muted); margin:20px 0 10px;">Active Floor</div>
         <div class="agent-list" style="grid-template-columns:1fr;">${filterFn(state.agents.active).map(a => renderAgentPill(a, upMap.get(a.id))).join('')}</div>`;
     }

     if (mode === 'Breaks' || mode === 'All' || mode === 'Onshore' || mode === 'Offshore') {
         const breakList = filterFn(state.agents.active).filter(a=>a.onBreakNow);
         h += `<div style="font-weight:700; color:var(--text-muted); margin:20px 0 10px;">Break Room</div>

             <div style="width:4px; height:30px; background:${e.type==='maintenance'?'var(--status-alert)':'var(--accent-primary)'}; border-radius:2px;"></div>

                <div style="text-align:right;"><div style="font-size:0.8rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; margin-bottom:4px;">Response Time</div><div style="font-size:2rem; font-weight:800; color:var(--text-main); line-height:1;">${state.currentACK}</div></div>

            <div style="position:relative; height:120px; width:100%; margin-top:20px; display:flex;">
                <canvas id="chart-overview"></canvas>

         <div class="aether-card" onclick="setView('agents')" style="cursor:pointer; transition:0.2s;">

  function renderAgents() {
      const tab = state.agentTab;
      const upMap = new Map(); (state.agents.upcomingBreak||[]).forEach(a=>upMap.set(a.id, a));
      
      return `

         <div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap; width:100%;">
             <input id="agent-search" class="input-aether" style="width:240px; height:34px; font-size:0.85rem;" placeholder="Search agents..." oninput="handleSearch(this.value)" value="${state.searchTerm}">
             <div class="nav-island" style="background:var(--card-bg); border:var(--glass-border);">
                <button class="nav-btn ${tab==='floor'?'active':''}" style="height:32px; font-size:0.8rem;" onclick="setAgentTab('floor')">Floor</button>

  function renderFloorLayout(upMap) {
     let startingHtml = '';
     if (state.agents.startingSoon && state.agents.startingSoon.length > 0) {
         startingHtml = `
         <div class="aether-card" style="padding:20px; margin-bottom:24px; border-left:4px solid var(--accent-primary);">

             <div class="agent-list">${renderGroup(state.agents.startingSoon, upMap)}</div>

     }

     return `
     ${startingHtml}

        <div class="aether-card special-group" style="padding:20px;">

        </div>
        <div class="aether-card special-group" style="padding:20px;">

        </div>

            <div class="section-header" style="color:var(--status-ulc);">Special Roles (ULC FIRE)</div>

        </div>

     <div class="grid-split" style="align-items:start;">
         <div style="display:flex; flex-direction:column; gap:20px;">
             <div class="aether-card" style="padding:24px;">
                 <div class="section-header">
                    Onshore Unit
                    <button class="btn-popout" title="Popout Onshore" onclick="openPopout('Onshore')"><i data-lucide="external-link" width="14"></i></button>
                 </div>

             </div>
         </div>
         <div style="display:flex; flex-direction:column; gap:20px;">
             <div class="aether-card" style="padding:24px;">
                 <div class="section-header">

         </div>
     </div>`;
  }
  
  function renderBreakLayout(upMap) {
      const onBreakList = (state.agents.active||[]).filter(a => a.onBreakNow);
      return `
      <div>
         <div class="section-header">
             Currently on Break <span class="count-badge" style="background:var(--card-bg); padding:2px 8px; border-radius:12px; font-size:0.8rem; margin-left:8px;">${onBreakList.length}</span>
             <button class="btn-popout" title="Popout Break Room" onclick="openPopout('Breaks')"><i data-lucide="external-link" width="14"></i></button>
         </div>
         <div class="break-grid" style="margin-bottom:40px;">
            ${onBreakList.map(a => renderBreakCard(a)).join('') || '<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:40px;">Break Room Empty</div>'}
         </div>
         <div class="section-header">Upcoming Breaks <span class="count-badge" style="background:var(--card-bg); padding:2px 8px; border-radius:12px; font-size:0.8rem;">${(state.agents.upcomingBreak||[]).length}</span></div>
         <div class="break-grid">
            ${(state.agents.upcomingBreak||[]).map(a => renderBreakCard(a)).join('') || '<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:40px;">No Upcoming Breaks</div>'}
         </div>
      </div>`;
  }

  function renderGroup(list, upMap) {
      const filtered = list.filter(a => {
         const mName = !state.searchTerm || a.name.toLowerCase().includes(state.searchTerm.toLowerCase());
         const mReg = state.regionFilter === 'All' || (a.region||"").includes(state.regionFilter);
         return mName && mReg;
      });
      if(!filtered.length) return '';
      return filtered.map(a => renderAgentPill(a, upMap.get(a.id))).join('');
  }

  function renderAgentPill(a, upInfo) {
     let start = "00:00", end = "00:00";
     if (a.shift && !a.shift.includes("?")) { const parts = a.shift.split(' - '); if(parts.length===2){ start=parts[0]; end=parts[1]; } }
     const regionClass = a.region.includes('Onshore') ? 'on' : 'off';
     const regionLabel = a.region.includes('Onshore') ? 'ONSHORE' : 'OFFSHORE';
     let extraClass = "";
     
     let statusColor = "var(--text-secondary)";
     if (a.role && a.role.includes('SAFE')) { extraClass += " role-safe"; statusColor = "var(--status-active)"; }
     if (a.role && a.role.includes('ICL')) { extraClass += " role-icl"; statusColor = "var(--status-role)"; }
     if (a.role && (a.role.includes('ULC') || a.role.includes('FIRE'))) { extraClass += " role-ulc"; statusColor = "var(--status-ulc)"; }
     
     if (a.onBreakNow) { extraClass += " status-break"; statusColor = "var(--status-break)"; }
     
     let statusText = a.subStatus || "Active";
     if (a.onBreakNow) statusText = "ON BREAK";

     return `<div class="agent-pill ${extraClass}" data-name="${a.name}" data-region="${a.region}" onclick="openMenu(event, '${a.name}')">
        <div class="pill-left">
           <div class="pill-av" style="${a.role?'border:2px solid '+statusColor:''}">${a.name.substring(0,2).toUpperCase()}</div>
           <div class="pill-info">
              <div class="pill-name">
                  <button class="btn-icon-sm" style="width:18px; height:18px; margin-right:6px; background:rgba(0,0,0,0.1); color:var(--text-muted); display:inline-flex;" onclick="copyAgentInfo(event, '${a.name}', '${a.id}')" title="Copy ID & Name">
                      <i data-lucide="copy" width="10"></i>
                  </button>
                  <span style="font-family:monospace; opacity:0.6; font-size:0.8em; margin-right:4px;">${a.id||''}</span>
                  ${a.name} ${a.isOT?'<span style="color:var(--text-accent); font-size:0.8em;">(OT)</span>':''}
              </div>
              <div style="display:flex; align-items:center;">
                 <div class="region-tag ${regionClass}">${regionLabel}</div>
                 <div class="pill-role" style="color:${statusColor}; font-weight:700;">${statusText}</div>
              </div>
           </div>
        </div>
        <div class="pill-time">${start}-${end}</div>
     </div>`;
  }
  
  function copyAgentInfo(e, name, id) {
      e.stopPropagation(); 
      const text = `${name} (${id})`;
      navigator.clipboard.writeText(text).then(() => {
          showToast(`Copied: ${text}`);
      });
  }
  
  function renderBreakCard(a) {
      const isNow = a.onBreakNow;
      return `<div class="break-card" onclick="openMenu(event, '${a.name}')" style="${!isNow ? 'opacity:0.7; border-top:none;' : ''}">
         <div class="break-name">${a.name}</div>
         <div class="break-timer" style="${!isNow ? 'font-size:1.5rem; color:var(--text-muted);' : ''}">${a.timer}</div>
         <div class="break-label">${a.auxLabel}</div>
      </div>`;
  }

  function renderWeather() {
      if (!state.weather || Object.keys(state.weather).length === 0) {
         return `<div class="aether-card" style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px; text-align:center;"><i data-lucide="cloud-off" width="48" style="color:var(--text-muted); margin-bottom:16px;"></i><div style="font-weight:700; color:var(--text-muted);">Weather data unavailable</div></div>`;
      }
      let html = '<div class="grid-masonry"><div style="grid-column:1/-1; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><h2 style="margin:0;">National Overview</h2><div style="display:flex; gap:8px;"><button class="btn btn-glass" onclick="fillWindsAction()"><i data-lucide="save" width="16"></i> Fill Sheet</button><button class="btn btn-primary" onclick="copyWindTemplate()"><i data-lucide="copy" width="16"></i> Copy Winds</button></div></div>';
      if (state.alerts && state.alerts.length > 0) {
         html += `<div class="aether-card" style="grid-column: 1 / -1; border-left: 4px solid var(--status-alert); background: linear-gradient(90deg, rgba(220, 38, 38, 0.05), transparent);"><div class="section-header" style="color:var(--status-alert); border-bottom-color:rgba(220,38,38,0.2);">⚠️ Active Alerts</div><div style="display:flex; flex-wrap:wrap; gap:12px;">`;
         state.alerts.forEach(a => html += `<div style="background:var(--bg-root); border:1px solid var(--status-alert); color:var(--status-alert); padding:6px 12px; border-radius:8px; font-size:0.8rem; font-weight:700; box-shadow:0 2px 10px rgba(220,38,38,0.1);">${a.province}: ${a.type} (${a.count})</div>`);
         html += `</div></div>`;
      } else {
         html += `<div class="aether-card" style="grid-column: 1 / -1; padding:20px; display:flex; align-items:center; gap:12px; opacity:0.8;"><i data-lucide="check-circle" style="color:var(--status-active);"></i><span style="font-weight:700; color:var(--text-muted);">No active warnings or watches in key regions.</span></div>`;
      }
      Object.keys(state.weather).forEach(prov => {
         const cities = state.weather[prov];
         cities.forEach(c => {
             const icon = getWeatherIcon(c.condition);
             const forecastHtml = (c.forecast || []).slice(0,3).map(f => {
                 return `<div class="weather-day"><span class="wd-name">${f.day.substring(0,3)}</span><div class="wd-icon">${getWeatherIcon(f.wind, true)}</div><span class="wd-temp">${f.temp}</span></div>`;
             }).join('');
             html += `
             <div class="aether-card" onclick="openWeatherModal('${c.id}')" style="cursor:pointer; transition:0.2s;">
                <div class="flex-between" style="margin-bottom:16px;">
                    <span style="font-weight:800; font-size:1.1rem;">${c.name}</span>
                    <span class="region-tag" style="margin:0; background:rgba(0,0,0,0.05); color:var(--text-muted);">${prov}</span>
                </div>
                <div class="flex-between" style="align-items:flex-end;">
                    <div>
                        <div style="font-size:3rem; font-weight:800; line-height:1; letter-spacing:-2px; margin-bottom:4px;">${c.temp}°</div>
                        <div style="display:flex; align-items:center; gap:6px; color:var(--text-secondary); font-weight:600; font-size:0.9rem;">${icon} ${c.condition}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:1.4rem; font-weight:700;">${c.wind}</div>
                        <div class="kpi-label">KM/H</div>
                    </div>
                </div>
                <div class="weather-mini-row">
                    ${forecastHtml || '<div style="width:100%; text-align:center; font-size:0.8rem; color:var(--text-muted);">Forecast Unavailable</div>'}
                </div>
             </div>`;
         });
      });
      html += '</div>';
      return html;
  }

  function getWeatherIcon(cond, isSmall) {
      const c = (cond || "").toLowerCase();
      let i = "cloud";
      if(c.includes("sun") || c.includes("clear")) i = "sun";
      else if(c.includes("rain") || c.includes("shower")) i = "cloud-rain";
      else if(c.includes("snow") || c.includes("flurr")) i = "snowflake";
      else if(c.includes("storm") || c.includes("thunder")) i = "cloud-lightning";
      else if(c.includes("cloud") || c.includes("overcast")) i = "cloud";
      if(isSmall) {
          if (i==="sun") return `<i data-lucide="sun" width="16"></i>`;
          if (i==="cloud-rain") return `<i data-lucide="cloud-rain" width="16"></i>`;
          if (i==="snowflake") return `<i data-lucide="snowflake" width="16"></i>`;
          return `<i data-lucide="cloud" width="16"></i>`;
      }
      return `<i data-lucide="${i}" width="20"></i>`;
  }

     const cats = new Set(["All"]);
     state.scripts.forEach(s => cats.add(s.category || "General"));

         const matchSearch = !state.searchTerm || s.title.toLowerCase().includes(state.searchTerm.toLowerCase()) || s.body.toLowerCase().includes(state.searchTerm.toLowerCase());

     return `

         <div style="display:flex; flex-direction:column; gap:24px;">
             <input id="script-search" class="input-aether" placeholder="Search scripts..." oninput="handleScriptSearch(this.value)" value="${state.searchTerm || ''}">

                ${listHTML || '<div style="text-align:center; color:var(--text-muted); padding:40px; grid-column:1/-1;">No scripts found in this category.</div>'}
             </div>
         </div>
     </div>`;
  }
  
  window.openComposeMode = () => { document.getElementById('compose-area').style.display='block'; document.getElementById('compose-overlay').style.display='block'; state.editingId = null; document.getElementById('new-script-title').value=""; document.getElementById('new-script-body').value=""; document.getElementById('new-script-cat').value=""; };

  function renderCalc() {
     return `<div class="grid-split">

            <div id="report-box" class="${state.currentSL==='0%'?'hidden':''}" style="width:100%;">
                <div style="background:var(--bg-root); padding:24px; border-radius:24px; text-align:left; font-family:monospace; font-size:0.85rem; max-height:300px; overflow-y:auto; border:1px solid var(--glass-border); white-space:pre-wrap;" id="report-content">${state.currentReport || "..."}</div>
                <button class="btn btn-glass" style="width:100%; margin-top:20px;" onclick="copyReport()">Copy Report</button>
            </div>
        </div>
     </div>`;
  }
  window.runCalculation = () => {
     const i = document.getElementById('in-text').value; 
     const o = document.getElementById('out-text').value;
     if(typeof google!=='undefined') { 
         showToast("Calculating..."); 
         google.script.run.withSuccessHandler(r=>{ 
             const d=JSON.parse(r); 
             state.currentSL=d.svl; 
             state.currentReport = d.report; 
             render(); 
         }).runCalculator(i, o); 
     } else { 
         state.currentSL = "84.5%"; 
         state.currentReport = "STATS UPDATE:\nSVL OUT: 84.5%\n..."; 
         render(); 
     }
  };
  window.copyReport = () => {
      const text = document.getElementById('report-content').innerText; const textArea = document.createElement("textarea"); textArea.value = text; document.body.appendChild(textArea); textArea.select(); try { document.execCommand('copy'); showToast("Copied Report"); } catch (err) { showToast("Copy Failed"); } document.body.removeChild(textArea);
  };
  window.copyWindTemplate = () => {
     const targetOrder = ["Toronto", "Ottawa", "Calgary", "Edmonton", "Vancouver", "Prince George", "Montreal", "Quebec City"];
     let flatList = []; if(state.weather) Object.values(state.weather).forEach(list => flatList.push(...list));
     const rows = targetOrder.map(name => { const city = flatList.find(c => c.name === name); if (!city) return ""; return formatWindString(city.wind); });
     navigator.clipboard.writeText(rows.join("\n")).then(() => showToast("Copied")).catch(() => showToast("Error"));
  };
  function formatWindString(val) { if (!val) return ""; let w = val.toString(); if (w.toLowerCase().includes("light")) w = "~5"; if (w.includes("G")) return w.replace("G", " km/h Gust "); else if (w.match(/^\d/) || w === "~5") return w + " km/h"; return w; }
  window.saveBreaks = () => { const name = state.selectedAgent; let agent = null; for(let k in state.agents) { const f = state.agents[k].find(a => a.name === name); if(f) { agent = f; break; } } if(agent) { const newBreaks = agent.rawBreaks.map((b, i) => ({ type: b.type, start: document.getElementById(`bs-${i}`).value, end: document.getElementById(`be-${i}`).value })); agent.rawBreaks = newBreaks; agent.isModified = true; if(typeof google!=='undefined') google.script.run.updateAgentBreaks(name, JSON.stringify(newBreaks)); } document.getElementById('break-modal').classList.remove('open'); showToast("Saved"); render(); };
  window.saveOvertime = () => { const name = state.selectedAgent; const s = document.getElementById('ot-start').value; const e = document.getElementById('ot-end').value; if(s && e) { let agent = null; for(let k in state.agents) { const f = state.agents[k].find(a => a.name === name); if(f) { agent = f; break; } } if(agent) agent.isOT = true; if(typeof google!=='undefined') google.script.run.submitOvertime(name, s, e, "", ""); document.getElementById('ot-modal').classList.remove('open'); showToast("Logged"); render(); } };
  
  window.addScript = () => { 
      const t = document.getElementById('new-script-title').value; 
      const b = document.getElementById('new-script-body').value; 
      const c = document.getElementById('new-script-cat').value;
      if(!t || !b) return; 
      if(typeof google !== 'undefined') { 
          google.script.run.withSuccessHandler(() => { 
              closeComposeMode();
              showToast("Saved to Library"); 
              google.script.run.withSuccessHandler(res => { state.scripts = JSON.parse(res); render(); }).fetchScripts(); 
          }).saveTeamScript(state.editingId, t, b, c); 
      } 
  };
  window.editScript = (idx) => { 
      const s = state.scripts[idx]; if(!s) return; 
      openComposeMode(); 
      state.editingId = s.index; 
      document.getElementById('new-script-title').value = s.title; 
      document.getElementById('new-script-body').value = s.body; 
      document.getElementById('new-script-cat').value = s.category || "";
  };
  window.copyScript = (i) => { navigator.clipboard.writeText(state.scripts[i].body); showToast("Copied"); };
  window.delScript = (idx) => { if(confirm("Delete script?")) { if(typeof google !== 'undefined') { google.script.run.withSuccessHandler(() => { showToast("Deleted"); google.script.run.withSuccessHandler(res => { state.scripts = JSON.parse(res); render(); }).fetchScripts(); }).deleteTeamScript(idx); } else { state.scripts.splice(idx, 1); render(); } } };
  
  window.runImportAction = () => { const t=document.getElementById('import-text').value; if(!t)return; closeImportModal(); showToast("Syncing..."); if(typeof google!=='undefined') google.script.run.withSuccessHandler(r=>{showToast(r);fetchData();}).runImport(t); };
  
  window.fillWindsAction = () => { if(confirm("Write current winds to the Daily Sheet?")) { if(typeof google !== 'undefined') { showToast("Writing to Sheet..."); google.script.run.withSuccessHandler(res => { showToast(res); }).fillWindsToSheet(); } } };

  // IDP ACTIONS
  window.openIdpModal = () => document.getElementById('idp-modal').classList.add('open');
  window.submitIdpAction = () => {
     const val = document.getElementById('idp-input').value;
     if(!val) return;
     document.getElementById('idp-modal').classList.remove('open');
     showToast("Saving IDP...");
     if(typeof google !== 'undefined') {
         google.script.run.withSuccessHandler(() => {
             showToast("IDP Saved");
             fetchInsightData();
         }).submitIdpValue(val);
     }
  }

  // EVENT DETAILS MODAL
  window.openEventModal = (idx) => {
      const e = state.calendarEvents[idx];
      if(!e) return;
      document.getElementById('evt-modal-title').innerText = e.title;
      document.getElementById('evt-modal-time').innerText = `${e.date} • ${e.startTime} - ${e.endTime}`;
      document.getElementById('evt-modal-desc').innerText = e.description || "No description provided.";
      document.getElementById('event-modal').classList.add('open');
  };
</script>
