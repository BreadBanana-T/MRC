<script>
  // --- INITIALIZATION & GLOBAL STATE ---
  const refreshIcons = () => { if(typeof lucide !== 'undefined') lucide.createIcons(); };
  
  let state = { 
      view: 'overview', 
      agents: {}, 
      pendingUpdates: {}, 
      weather: {}, 
      slHistory: [], 
      calendarEvents: [],
      roleLogs: [], 
      statsLogs: [], 
      currentSL: "--", 
      currentACK: "--", 
      selectedAgent: null, 
      searchTerm: "", 
      regionFilter: 'All', 
      notifications: [], 
      knownNotifs: new Set(),
      dismissedNotifs: new Set(), 
      notifOpen: false, 
      scripts: [], 
      agentTab: 'floor', 
      currentReport: "...", 
      selectedCategory: "All", 
      editingId: null, 
      appUrl: "", 
      insightMode: 'day', 
      selectedDate: new Date().toISOString().split('T')[0],
      insightSearch: '',
      unifiedReport: null,
      archiveList: [],
      selectedArchive: 'LIVE',
      trackerData: null,
      trackerMode: 'furlough', 
      trackerDate: new Date().toISOString().split('T')[0],
      trackerRange: 'day',
      trackerRegion: 'Onshore', 
      trackerCycleFilter: 'ALL',
      trackerSearch: '',
      trackerLoading: true
  };

  document.addEventListener('mousemove', e => {
      requestAnimationFrame(() => {
          const card = e.target.closest('.aether-card');
          if (!card) return;
          const rect = card.getBoundingClientRect();
          card.style.setProperty('--x', `${e.clientX - rect.left}px`);
          card.style.setProperty('--y', `${e.clientY - rect.top}px`);
      });
  });
  
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initApp); else initApp();

  function initApp() {
    try { if (localStorage.getItem('rta_theme') === 'dark') document.body.classList.add('dark'); } catch(e) {}
    
    const config = document.getElementById('app-config');
    if (config) {
        state.appUrl = config.getAttribute('data-url');
        const popout = config.getAttribute('data-popout');
        const mode = config.getAttribute('data-mode');

        if (popout === "true") {
            document.body.classList.add('popout-mode');
            state.view = 'popout-view'; 
            state.regionFilter = (mode === 'onshore' ? 'Onshore' : (mode === 'offshore' ? 'Offshore' : (mode === 'breaks' ? 'Breaks' : 'All')));
            document.getElementById('content').innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted); font-weight:700;">Loading Floor...</div>';
            if (typeof google !== 'undefined') { setInterval(fetchData, 30000); fetchData(); }
            return;
        }
    }
    
    render(); 
    setInterval(updateClock, 1000); 
    setInterval(fetchData, 60000); 
    setInterval(fetchNotifications, 10000);
    setInterval(fetchCalendar, 300000); 
    setInterval(() => { if(state.view === 'insights') render(); }, 60000); 
    
    fetchData(); 
    fetchStats(); 
    fetchArchiveList();
    fetchNotifications();
    fetchCalendar();
    fetchTrackerData(); 
  }

  function fallbackCopyTextToClipboard(text, successMsg) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      textArea.style.top = "0"; textArea.style.left = "0"; textArea.style.position = "fixed"; 
      document.body.appendChild(textArea);
      textArea.focus(); textArea.select();
      try { document.execCommand('copy'); showToast(successMsg || "Copied"); } catch (err) { showToast("Copy Failed"); }
      document.body.removeChild(textArea);
  }

  window.setView = (v) => { 
      state.view = v; 
      if(v==='scripts') fetchScripts(); 
      if(v==='insights') fetchInsightData(); 
      if(v==='tracker') fetchTrackerData(); 
      render(); 
  };
  
  window.setAgentTab = (tab) => { state.agentTab = tab; render(); };
  window.setInsightMode = (m) => { state.insightMode = m; fetchInsightData(); render(); };
  window.handleDateChange = (val) => { state.selectedDate = val; fetchInsightData(); render(); };
  window.toggleTheme = () => { document.body.classList.toggle('dark'); try{ localStorage.setItem('rta_theme', document.body.classList.contains('dark') ? 'dark' : 'light'); }catch(e){} render(); };
  
  window.openImportModal = () => document.getElementById('import-modal').classList.add('open');
  window.closeImportModal = () => document.getElementById('import-modal').classList.remove('open');
  window.toggleNotifPanel = () => { const p=document.getElementById('notif-panel'); state.notifOpen=!state.notifOpen; p.classList.toggle('open'); if(state.notifOpen) renderNotifList(); };
  
  window.openMenu = (e, n) => { 
      state.selectedAgent=n; 
      const m=document.getElementById('agent-menu'), o=document.getElementById('overlay'); 
      o.style.display='block'; m.style.display='flex'; 
      const r=e.currentTarget.getBoundingClientRect(); 
      m.style.top=(r.bottom+10)+'px'; m.style.left=(r.left)+'px'; 
  };
  window.closeMenu = () => { document.getElementById('agent-menu').style.display='none'; document.getElementById('overlay').style.display='none'; };
  
  window.setAgentStatus = (type, val) => { 
      closeMenu(); 
      const name=state.selectedAgent; 
      state.pendingUpdates[name]={type,val,timestamp:Date.now()}; 
      moveAgentInMemory(name,type,val); 
      if(state.view==='agents') render(); 
      showToast("Status Updated"); 
      if(typeof google!=='undefined') google.script.run.updateAgentStatus(name,type,val); 
  };
  
  window.openPopout = (mode) => { 
      const baseUrl = state.appUrl || window.location.href.split('?')[0]; 
      const sep = baseUrl.includes('?') ? '&' : '?'; 
      window.open(`${baseUrl}${sep}popout=true&mode=${mode.toLowerCase()}`, '_blank', 'width=450,height=800,menubar=no,toolbar=no,location=no,status=no'); 
  };

  function showToast(m) { 
      const t=document.getElementById('toast'); 
      if(!t) return; 
      t.querySelector('#toast-msg').innerText=m; 
      t.style.opacity='1'; t.style.transform='translateY(0)'; 
      setTimeout(()=>{t.style.opacity='0'; t.style.transform='translateY(20px)';},3000); 
  }

  function updateClock() { const el=document.getElementById('clock'); if(el) el.innerText=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
  
  let searchTimeout;
  window.handleScriptSearch = (val) => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { state.searchTerm = val; render(); }, 200); };
  function handleSearch(v) { state.searchTerm = v; render(); }
  function setRegionFilter(v) { state.regionFilter=v; render(); }

  window.handleTrackerSearch = (val) => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { state.trackerSearch = val; render(); }, 300); };
  window.handleInsightSearch = (val) => { clearTimeout(searchTimeout); searchTimeout = setTimeout(() => { state.insightSearch = val; render(); }, 300); };

  window.handleRangeChange = (val) => {
      state.trackerRange = val; state.trackerCycleFilter = 'ALL'; 
      let [y, m, d] = state.trackerDate.split('-').map(Number);
      let selDate = new Date(y, m-1, d, 12, 0, 0); 
      
      if (val === 'month' || val === 'quarter') { selDate.setDate(1); state.trackerDate = selDate.toISOString().split('T')[0]; } 
      else if (val === 'week') {
          let day = selDate.getDay(); let offset = (day >= 4) ? (4 - day) : -(day + 3); 
          selDate.setDate(selDate.getDate() + offset);
          let ny = selDate.getFullYear(); let nm = selDate.getMonth() + 1; let nd = selDate.getDate();
          state.trackerDate = `${ny}-${nm < 10 ? '0'+nm : nm}-${nd < 10 ? '0'+nd : nd}`;
      }
      fetchTrackerData(); render();
  };

  window.toggleCycleFilter = (targetCycle) => {
      if (state.trackerRange === 'week') {
          if (targetCycle === 'ALL') return;
          let [y, m, d] = state.trackerDate.split('-').map(Number);
          let dObj = new Date(y, m-1, d, 12, 0, 0); 
          let day = dObj.getDay(); let offset = (day >= 4) ? (4 - day) : -(day + 3);
          dObj.setDate(dObj.getDate() + offset);
          
          const baseDate = new Date(2026, 0, 29, 12, 0, 0); 
          let diffWeeks = Math.floor(Math.round((dObj - baseDate) / 86400000) / 7);
          let isWeekB = (Math.abs(diffWeeks) % 2 === 1);
          let currentCycle = isWeekB ? 'WEEK B' : 'WEEK A';

          if (targetCycle === 'WEEK A' && currentCycle === 'WEEK B') dObj.setDate(dObj.getDate() - 7);
          else if (targetCycle === 'WEEK B' && currentCycle === 'WEEK A') dObj.setDate(dObj.getDate() - 7);
          
          let ny = dObj.getFullYear(); let nm = dObj.getMonth() + 1; let nd = dObj.getDate();
          state.trackerDate = `${ny}-${nm < 10 ? '0'+nm : nm}-${nd < 10 ? '0'+nd : nd}`;
          state.trackerCycleFilter = 'ALL';
      } 
      else if (state.trackerRange === 'month' || state.trackerRange === 'quarter') {
          if (state.trackerCycleFilter === targetCycle) state.trackerCycleFilter = 'ALL';
          else state.trackerCycleFilter = targetCycle;
      }
      fetchTrackerData(); render();
  };

  function fetchData() {
    if(typeof google==='undefined') return;
    google.script.run.withSuccessHandler(j=>{
        try{ 
            const d=JSON.parse(j); 
            if(d){ 
                state.agents={...state.agents,...d}; 
                applyPendingUpdates(); 
                if(!['scripts', 'calc', 'insights', 'tracker'].includes(state.view)) render(); 
            } 
        } catch(e){}
    }).getFloorStatus();

    if(state.view !== 'popout-view') {
      google.script.run.withSuccessHandler(r=>{ try{ const d=(typeof r==='object'&&r!==null)?r:JSON.parse(r); state.weather=d.weather||d; state.alerts=d.alerts||[]; if(state.view.match(/overview|weather/)) render(); }catch(e){} }).getLiveDashboardData();
    }
  }

  // --- NOTIFICATION ENGINE ---
  function fetchNotifications() { 
      if(typeof google==='undefined') return; 
      google.script.run.withSuccessHandler(j=>{
          try{
              const fetched = JSON.parse(j);
              const activeNotifs = fetched.filter(n => !state.dismissedNotifs.has(String(n.id)));
              
              activeNotifs.forEach(n => {
                  if(!state.knownNotifs.has(n.id)) {
                      state.knownNotifs.add(n.id);
                      showToast("🔔 " + n.text); 
                      
                      // LIVE AUTO-RELOAD
                      if (n.text.includes("Dashboards refreshed")) {
                          fetchData();
                          if (state.view === 'tracker') fetchTrackerData();
                          if (state.view === 'insights') fetchInsightData();
                      }
                  }
              });

              state.notifications = activeNotifs;
              const dot = document.getElementById('notif-dot'); 
              if(dot) dot.style.display = state.notifications.length ? 'block' : 'none'; 
              if(state.notifOpen) renderNotifList(); 
          } catch(e) {}
      }).getSystemNotifications(); 
  }

  window.renderNotifList = () => {
      const list = document.getElementById('notif-list');
      if(!list) return;
      list.innerHTML = state.notifications.map(n => `
          <div style="padding:16px; border-bottom:1px solid var(--glass-border); background:rgba(0,0,0,0.02); border-radius:8px; margin-bottom:8px;">
              <div style="font-size:0.75rem; color:var(--text-muted); margin-bottom:4px;">${n.time}</div>
              <div style="font-weight:700; font-size:0.9rem; margin-bottom:8px;">${n.text}</div>
              <div style="display:flex; justify-content:flex-end;">
                  <button class="btn-glass" style="font-size:0.75rem; padding:4px 12px;" onclick="dismissNotif('${n.id}')">Dismiss</button>
              </div>
          </div>
      `).join('') || '<div style="padding:20px; text-align:center; color:var(--text-muted);">No new notifications.</div>';
  };
            
  window.dismissNotif = (id) => {
      state.dismissedNotifs.add(String(id));
      renderNotifList();
      if(typeof google !== 'undefined') google.script.run.dismissSystemNotification(id);
      const dot = document.getElementById('notif-dot'); 
      const count = state.notifications.filter(n=>!state.dismissedNotifs.has(String(n.id))).length;
      if(dot) dot.style.display = count ? 'block' : 'none';
  };

  function fetchCalendar() { 
      if(typeof google==='undefined') return; 
      google.script.run.withSuccessHandler(j=>{
          try {
              state.calendarEvents = JSON.parse(j); 
              if(state.view === 'overview') render(); 
              
              // MAINTENANCE WARNING
              const now = new Date();
              state.calendarEvents.forEach(e => {
                  if(e.type === 'maintenance') {
                      let parts = e.startTime.match(/(\d{1,2}):(\d{2})/);
                      if(parts) {
                          let evTime = new Date();
                          evTime.setHours(parseInt(parts[1]), parseInt(parts[2]), 0, 0);
                          let diffMins = (evTime - now) / 60000;
                          if(diffMins > 0 && diffMins <= 15) {
                              showToast(`⚠️ Maintenance starts in ${Math.ceil(diffMins)} mins!`);
                          }
                      }
                  }
              });
          } catch(e) {}
      }).getDailyCalendarEvents(); 
  }

  function fetchStats() {
      if(typeof google === 'undefined') return;
      google.script.run.withSuccessHandler(j => {
          try {
              const h = JSON.parse(j);
              if(h && h.length){
                  state.slHistory = h;
                  const latest = h[h.length-1];
                  state.currentSL = latest.val + "%";
                  state.currentACK = latest.ack + "s";
                  
                  const slEl = document.getElementById('hdr-sl');
                  if(slEl) slEl.innerText = state.currentSL;
                  
                  const ackEl = document.getElementById('hdr-ack');
                  if(ackEl) ackEl.innerText = state.currentACK;

                  if(state.view === 'overview') updateOverviewDOM();
              }
          } catch(e) {}
      }).getStatsHistory();
  }

  function fetchArchiveList() {
      if(typeof google === 'undefined') return;
      google.script.run.withSuccessHandler(res => {
          try { state.archiveList = JSON.parse(res); if(state.view === 'insights') render(); } catch(e) {}
      }).getArchiveList();
  }
  
  function fetchScripts() { if(typeof google!=='undefined') google.script.run.withSuccessHandler(res => { state.scripts = JSON.parse(res); render(); }).fetchScripts(); }
  
  function fetchInsightData() {
      if(typeof google === 'undefined') return;
      state.unifiedReport = null; 
      if (state.view === 'insights') render();

      if (state.selectedArchive === 'LIVE') {
          google.script.run.withSuccessHandler(res => {
              try { state.unifiedReport = JSON.parse(res); } catch(e) {}
              if (state.view === 'insights') render();
          }).getUnifiedWeeklyReport(state.selectedDate);
      } else {
          google.script.run.withSuccessHandler(res => {
              try { state.unifiedReport = JSON.parse(res); } catch(e) {}
              if (state.view === 'insights') render();
          }).getArchivedReport(state.selectedArchive);
      }
  }

  function fetchTrackerData() {
      if (typeof google === 'undefined') return;
      state.trackerLoading = true;
      if (state.view === 'tracker') render(); 
      
      google.script.run.withSuccessHandler(res => {
          try { state.trackerData = JSON.parse(res); } catch(e) {}
          state.trackerLoading = false;
          if (state.view === 'tracker') render(); 
      }).withFailureHandler(err => {
          state.trackerLoading = false;
          if (state.view === 'tracker') render();
          showToast("Data error: " + err.message);
      }).getWorkforceAnalytics(state.trackerRange, state.trackerDate, state.trackerMode, state.trackerRegion, state.trackerCycleFilter);
  }

  function applyPendingUpdates() { const now=Date.now(); for(const n in state.pendingUpdates) { if(now-state.pendingUpdates[n].timestamp>120000) delete state.pendingUpdates[n]; else moveAgentInMemory(n, state.pendingUpdates[n].type, state.pendingUpdates[n].val); } }
  function moveAgentInMemory(name, type, val) {
     let o = null; 
     for (const k in state.agents) { if(!Array.isArray(state.agents[k])) continue; const i = state.agents[k].findIndex(a => a.name === name); if(i > -1) { o = state.agents[k][i]; break; } }
     if(o) { 
         if (type === 'role') { o.role = (val === 'Active') ? '' : val; if(val === 'Active') { o.subStatus = ""; } }
         else if (type === 'absent') { o.subStatus = val; } 
     }
  }

  function updateOverviewDOM() {
      const unplanCount = (state.agents.unplanned||[]).length;
      const planCount = (state.agents.vacation||[]).length + (state.agents.planned||[]).length;
      const totalActive = Math.max(1, (state.agents.active||[]).length + 10);
      const shrinkPct = Math.round(((unplanCount + planCount) / totalActive) * 100);
      
      const safeCount = (state.agents.safe||[]).length;
      const iclCount = (state.agents.icl||[]).length;
      const ulcCount = (state.agents.ulc||[]).length;

      const updateEl = (id, val) => { const el = document.getElementById(id); if(el) el.innerText = val; };
      updateEl('ov-sl-text', state.currentSL);
      updateEl('ov-ack-text', state.currentACK);
      updateEl('ov-unplanned', unplanCount);
      updateEl('ov-shrink', shrinkPct + '%');
      updateEl('ov-planned', planCount);
      updateEl('ov-safe', safeCount);
      updateEl('ov-icl', iclCount);
      updateEl('ov-ulc', ulcCount);

      if (charts.overview) {
          charts.overview.data.labels = state.slHistory.map(d => d.name);
          charts.overview.data.datasets[0].data = state.slHistory.map(d => d.val);
          charts.overview.data.datasets[1].data = state.slHistory.map(d => d.ack);
          charts.overview.update('none'); 
      }

      const agendaEl = document.getElementById('ov-agenda');
      if (agendaEl) {
          const eventsHtml = state.calendarEvents.map((e, i) => `
              <div onclick="openEventModal(${i})" style="padding:10px; border-bottom:1px solid var(--glass-border); display:flex; gap:10px; align-items:center; cursor:pointer; transition:0.2s;" class="hover-bg">
                 <div style="width:4px; height:30px; background:${e.type==='maintenance'?'var(--status-alert)':'var(--accent-primary)'}; border-radius:2px;"></div>
                 <div style="flex:1;">
                     <div style="font-weight:700; font-size:0.9rem;">${e.title}</div>
                     <div style="font-size:0.75rem; color:var(--text-muted);">
                         <span style="color:var(--text-main); font-weight:700;">${e.date}</span> • ${e.startTime} - ${e.endTime}
                     </div>
                 </div>
              </div>
          `).join('') || '<div style="padding:20px; text-align:center; color:var(--text-muted); font-size:0.8rem;">No meetings or maintenance scheduled.</div>';
          
          if (agendaEl.innerHTML !== eventsHtml) agendaEl.innerHTML = eventsHtml;
      }
  }

  function render() {
     if (state.view === 'popout-view') { renderPopout(state.regionFilter); refreshIcons(); return; }

     const sl = document.getElementById('hdr-sl');
     if(sl) sl.innerText = state.currentSL;
     const ackEl = document.getElementById('hdr-ack');
     if(ackEl) ackEl.innerText = state.currentACK;
     
     const c = document.getElementById('content');
     if(!c) return;

     document.querySelectorAll('.nav-btn, .action-btn').forEach(b => b.classList.remove('active'));
     const b = document.getElementById('btn-'+state.view); 
     if(b) b.classList.add('active');

     if (state.view === 'overview' && document.getElementById('chart-overview')) {
         updateOverviewDOM();
         refreshIcons();
         return;
     }

     let h = '';
     if (state.view === 'overview') h = renderOverview();
     else if (state.view === 'agents') h = renderAgents();
     else if (state.view === 'weather') h = renderWeather();
     else if (state.view === 'calc') h = renderCalc();
     else if (state.view === 'scripts') h = renderScripts();
     else if (state.view === 'insights') h = renderInsights();
     else if (state.view === 'tracker') h = renderTracker();
     
     c.innerHTML = h; refreshIcons();
     const search = document.getElementById('agent-search'); if(state.view === 'agents' && search && state.searchTerm && document.activeElement !== search) search.value = state.searchTerm;
     
     if(state.view === 'insights') initCharts();
     if(state.view === 'overview') initOverviewChart();
     if(state.view === 'tracker') initTrackerChart(); 
  }

  function renderPopout(mode) {
     const c = document.getElementById('content');
     if(!c) return; 
     const upMap = new Map(); (state.agents.upcomingBreak||[]).forEach(a=>upMap.set(a.id, a));
     
     let title = "All Units";
     if (mode === 'Onshore') title = "Onshore Unit";
     else if (mode === 'Offshore') title = "Offshore Unit";
     else if (mode === 'Breaks') title = "Break Room";
     
     const filterFn = (list) => (list||[]).filter(a => {
        if (mode === 'All') return true;
        if (mode === 'Breaks') return true; 
        return (a.region||"").includes(mode);
     });
     
     let h = `<div style="padding:20px;">
         <h2 style="margin-top:0; border-bottom:1px solid var(--glass-border); padding-bottom:10px;">${title}</h2>`;
     
     if (mode !== 'Breaks') {
         h += `
         <div style="font-weight:700; color:var(--text-muted); margin-bottom:10px;">Starting Soon</div>
         <div class="agent-list-view">${filterFn(state.agents.startingSoon).map(a => renderAgentRow(a, upMap.get(a.id))).join('')}</div>
         <div style="font-weight:700; color:var(--text-muted); margin:20px 0 10px;">Active Floor</div>
         <div class="agent-list-view">${filterFn(state.agents.active).map(a => renderAgentRow(a, upMap.get(a.id))).join('')}</div>`;
     }

     if (mode === 'Breaks' || mode === 'All' || mode === 'Onshore' || mode === 'Offshore') {
         const breakList = filterFn(state.agents.active).filter(a=>a.onBreakNow);
         h += `<div style="font-weight:700; color:var(--text-muted); margin:20px 0 10px;">Break Room</div>
         <div class="agent-list-view">${breakList.length ? breakList.map(a => renderAgentRow(a, upMap.get(a.id))).join('') : '<div style="opacity:0.5; font-size:0.8rem;">Empty</div>'}</div>`;
     }
     
     h += `</div>`;
     c.innerHTML = h;
     refreshIcons();
  }
  
  function renderAgents() {
      const upMap = new Map(); (state.agents.upcomingBreak||[]).forEach(a=>upMap.set(a.id, a));
      
      return `
      <div class="sticky-header">
         <div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap; width:100%;">
             <input id="agent-search" class="input-aether" style="width:240px; height:34px; font-size:0.85rem;" placeholder="Search agents..." oninput="handleSearch(this.value)" value="${state.searchTerm}">
             
             <button class="btn btn-glass" style="height:34px;" onclick="window.open('https://sharepoint.tsl.telus.com/sites/NSE/CAM/Lists/Queue_Manager/AllItems.aspx', '_blank')">
                 <i data-lucide="radio" width="16"></i> Tower Control
             </button>

             <div style="flex:1"></div>
             <div style="display:flex; gap:8px;">
                <button class="btn ${state.regionFilter==='All'?'btn-primary':'btn-glass'}" onclick="setRegionFilter('All')">All</button>
                <button class="btn ${state.regionFilter==='Onshore'?'btn-primary':'btn-glass'}" onclick="setRegionFilter('Onshore')">On</button>
                <button class="btn ${state.regionFilter==='Offshore'?'btn-primary':'btn-glass'}" onclick="setRegionFilter('Offshore')">Off</button>
             </div>
         </div>
      </div>
      ${renderFloorLayout(upMap)}`;
  }
  
  function renderFloorLayout(upMap) {
     let startingHtml = '';
     if (state.agents.startingSoon && state.agents.startingSoon.length > 0) {
         startingHtml = `
         <div class="aether-card" style="padding:20px; margin-bottom:24px; border-left:4px solid var(--accent-primary);">
             <div class="section-header" style="color:var(--accent-primary);">Starting Soon (Next 30m)</div>
             <div class="agent-list-view">${renderGroup(state.agents.startingSoon, upMap)}</div>
         </div>`;
     }

     return `
     ${startingHtml}

     <div class="group-header"><i data-lucide="shield" width="14"></i> Special Roles</div>
     <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:24px; margin-bottom:24px;">
        <div class="aether-card special-group" style="padding:20px;">
            <div class="section-header" style="color:var(--status-role);">ICL</div>
            <div class="agent-list-view">${renderGroup(state.agents.icl||[], upMap)}</div>
        </div>
        <div class="aether-card special-group" style="padding:20px;">

        </div>

            <div class="section-header" style="color:var(--status-ulc);">ULC FIRE</div>

         </div>

             <div class="aether-card" style="padding:24px;">

  function renderGroup(list, upMap) {
      if (!list) return '';
      const filtered = list.filter(a => {
         const mName = !state.searchTerm || a.name.toLowerCase().includes(state.searchTerm.toLowerCase());
         const mReg = state.regionFilter === 'All' || (a.region||"").includes(state.regionFilter);
         return mName && mReg;
      });
      if(!filtered.length) return '';
      return filtered.map(a => renderAgentRow(a, upMap.get(a.id))).join('');
  }

  function renderAgentRow(a, upInfo) {
     let start = "00:00", end = "00:00";
     if (a.shift && !a.shift.includes("?")) { const parts = a.shift.split(' - '); if(parts.length===2){ start=parts[0]; end=parts[1]; } }
     
     let stripClass = a.region.includes('Onshore') ? 'on' : 'off';
     if(a.subStatus.match(/SICK|NCNS|AWOL/)) stripClass = 'alert';
     if(a.onBreakNow) stripClass = 'break';

     let statusText = a.subStatus || "Active";
     let statusColor = "var(--text-secondary)";
     
     if (a.role && a.role.includes('SAFE')) { statusColor = "var(--status-active)"; }
     if (a.role && a.role.includes('ICL')) { statusColor = "var(--status-role)"; }
     if (a.role && (a.role.includes('ULC') || a.role.includes('FIRE'))) { statusColor = "var(--status-ulc)"; }
     
     if (a.onBreakNow) {
         statusColor = "var(--status-break)";
         statusText = a.subStatus; 
     }

     // INJECTED BREAK HTML
     let breakHtml = "";
     if (a.onBreakNow && a.currentBreakStr) {
         breakHtml = `<div style="font-size:0.75rem; opacity:0.8; margin-top:4px; color:var(--text-main); font-weight:500;">from ${a.currentBreakStr} • Remaining: <span style="font-weight:800; color:var(--status-break);">${a.timer}</span></div>`;
     } else if (upInfo && upInfo.nextBreakType && upInfo.startsIn) {
         breakHtml = `<div style="font-size:0.7rem; color:var(--text-muted); margin-top:4px; font-weight:500;"><span style="background:var(--card-bg); padding:2px 6px; border-radius:4px; border:1px solid var(--glass-border); font-size:0.65rem; margin-right:6px; font-weight:800; color:var(--text-main);">UPCOMING</span>${upInfo.nextBreakType} in <span style="font-weight:800; color:var(--text-main);">${upInfo.startsIn}</span></div>`;
     }

     // PREFIXED CLICKABLE ID
     let prefix = a.region.includes('Onshore') ? 'T' : 'x';
     let formattedId = prefix + a.id;

     return `
     <div class="agent-row" onclick="openMenu(event, '${a.name}')" style="align-items:center;">
        <div class="status-strip ${stripClass}"></div>
        <div class="row-name" data-full-name="${a.name}">${a.name}</div>
        
        <div style="display:flex; align-items:center; width:80px; cursor:pointer;" onclick="copyAgentInfo(event, '${formattedId}')" title="Click to Copy ID">
           <span class="row-id" style="text-decoration:underline dashed var(--glass-border); text-underline-offset:4px; font-weight:700; color:var(--text-muted); transition:0.2s;" onmouseover="this.style.color='var(--accent-primary)'" onmouseout="this.style.color='var(--text-muted)'">${formattedId}</span>
        </div>

        <div class="row-status" style="color:${statusColor}; display:flex; flex-direction:column; justify-content:center; line-height:1.2;">
           <div><span style="font-weight:700;">${statusText}</span> ${a.isOT ? '<span style="font-size:0.7em; border:1px solid currentColor; padding:0 3px; border-radius:3px; margin-left:4px;">OT</span>' : ''}</div>
           ${breakHtml}
        </div>
        <div class="row-time">${start}-${end}</div>
     </div>`;
  }
  
  function copyAgentInfo(e, idText) {
      e.stopPropagation(); 
      fallbackCopyTextToClipboard(idText, `Copied: ${idText}`);
  }

  window.openBreakModal = () => {
      closeMenu();
      const name = state.selectedAgent;
      let agent = null;
      for(let k in state.agents) {
          if(!Array.isArray(state.agents[k])) continue;
          const found = state.agents[k].find(a => a.name === name);
          if(found) { agent = found; break; }
      }
      
      if(!agent) { showToast("Agent data not found"); return; }
      
      const container = document.getElementById('break-editor');
      container.innerHTML = "";
      (agent.rawBreaks || []).forEach((b, i) => {
          container.innerHTML += `
          <div style="margin-bottom:12px; border-bottom:1px solid var(--glass-border); padding-bottom:8px;">
              <div style="font-weight:700; font-size:0.8rem; margin-bottom:4px;">${b.type}</div>
              <div style="display:flex; gap:8px;">
                  <input id="bs-${i}" class="input-aether" value="${b.start}" style="font-size:0.85rem;">
                  <input id="be-${i}" class="input-aether" value="${b.end}" style="font-size:0.85rem;">
              </div>
          </div>`;
      });
      document.getElementById('break-modal').classList.add('open');
  };

  window.openOtModal = () => {

      document.getElementById('ot-start').value = "";
      document.getElementById('ot-end').value = "";

  };

         <div class="aether-card" onclick="setView('agents')" style="cursor:pointer; transition:0.2s;">
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <span style="font-weight:700; color:var(--status-alert);">Unplanned</span>
                <i data-lucide="alert-circle" color="var(--status-alert)" width="20"></i>
            </div>
            <div id="ov-unplanned" style="font-size:2rem; font-weight:800; color:var(--status-alert);">${unplanCount}</div>
         </div>

         <div class="aether-card" style="display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
            <h4 style="margin:0; font-size:0.8rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Shrinkage</h4>
            <div id="ov-shrink" style="font-size:2.5rem; font-weight:800; color:var(--text-main);">${shrinkPct}%</div>
         </div>
         
         <div class="aether-card" onclick="setView('agents')" style="cursor:pointer; transition:0.2s;">
            <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <span style="font-weight:700;">Planned</span>
                <i data-lucide="calendar" class="text-muted" width="20"></i>
            </div>
            <div id="ov-planned" style="font-size:2rem; font-weight:800; color:var(--text-main);">${planCount}</div>
         </div>

         <div class="aether-card" onclick="setView('agents')" style="cursor:pointer; transition:0.2s; display:flex; flex-direction:column; justify-content:center;">
            <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                <span style="font-weight:700;">Special Roles</span>
                <i data-lucide="shield" class="text-muted" width="20"></i>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="text-align:center;">
                    <div style="font-size:0.65rem; font-weight:800; color:var(--status-active); margin-bottom:4px; letter-spacing:1px;">SAFE</div>
                    <div id="ov-safe" style="font-size:1.8rem; font-weight:800; line-height:1;">${safeCount}</div>
                </div>
                <div style="width:1px; height:30px; background:var(--glass-border);"></div>
                <div style="text-align:center;">
                    <div style="font-size:0.65rem; font-weight:800; color:var(--status-role); margin-bottom:4px; letter-spacing:1px;">ICL</div>
                    <div id="ov-icl" style="font-size:1.8rem; font-weight:800; line-height:1;">${iclCount}</div>
                </div>
                <div style="width:1px; height:30px; background:var(--glass-border);"></div>
                <div style="text-align:center;">
                    <div style="font-size:0.65rem; font-weight:800; color:var(--status-ulc); margin-bottom:4px; letter-spacing:1px;">ULC</div>
                    <div id="ov-ulc" style="font-size:1.8rem; font-weight:800; line-height:1;">${ulcCount}</div>
                </div>
            </div>
         </div>
         
         <div class="aether-card" style="grid-column: span 4; display:flex; flex-direction:column;">
            <div class="section-header">
                Agenda
                <i data-lucide="calendar" class="text-muted" width="16"></i>
            </div>
            <div id="ov-agenda" style="overflow-y:auto; max-height:200px;"></div>
         </div>
      </div>`;
  }
  
  function renderWeather() {
      if (!state.weather || Object.keys(state.weather).length === 0) {
         return `<div class="aether-card" style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px; text-align:center;"><i data-lucide="cloud-off" width="48" style="color:var(--text-muted); margin-bottom:16px;"></i><div style="font-weight:700; color:var(--text-muted);">Weather data unavailable</div></div>`;
      }
      let html = '<div class="grid-masonry"><div style="grid-column:1/-1; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><h2 style="margin:0;">National Overview</h2><div style="display:flex; gap:8px;"><button class="btn btn-primary" onclick="copyWindTemplate()"><i data-lucide="copy" width="16"></i> Copy Winds</button></div></div>';
      if (state.alerts && state.alerts.length > 0) {
         html += `<div class="aether-card" style="grid-column: 1 / -1; border-left: 4px solid var(--status-alert); background: linear-gradient(90deg, rgba(220, 38, 38, 0.05), transparent);"><div class="section-header" style="color:var(--status-alert); border-bottom-color:rgba(220,38,38,0.2);">⚠️ Active Alerts</div><div style="display:flex; flex-wrap:wrap; gap:12px;">`;
         state.alerts.forEach(a => html += `<div style="background:var(--bg-root); border:1px solid var(--status-alert); color:var(--status-alert); padding:6px 12px; border-radius:8px; font-size:0.8rem; font-weight:700; box-shadow:0 2px 10px rgba(220,38,38,0.1);">${a.province}: ${a.type} (${a.count})</div>`);
         html += `</div></div>`;
      } else {
         html += `<div class="aether-card" style="grid-column: 1 / -1; padding:20px; display:flex; align-items:center; gap:12px; opacity:0.8;"><i data-lucide="check-circle" style="color:var(--status-active);"></i><span style="font-weight:700; color:var(--text-muted);">No active warnings or watches in key regions.</span></div>`;
      }
      Object.keys(state.weather).forEach(prov => {
         const cities = state.weather[prov];
         cities.forEach(c => {
             const icon = getWeatherIcon(c.condition);
             const forecastHtml = (c.forecast || []).slice(0,3).map(f => {
                 const dayName = f.day ? f.day.substring(0,3) : "---";
                 return `<div class="weather-day"><span class="wd-name">${dayName}</span><div class="wd-icon">${getWeatherIcon(f.wind, true)}</div><span class="wd-temp">${f.temp}</span></div>`;
             }).join('');
             html += `
             <div class="aether-card" onclick="openWeatherModal('${c.id}')" style="cursor:pointer; transition:0.2s;">
                 <div class="flex-between" style="margin-bottom:16px;">
                     <span style="font-weight:800; font-size:1.1rem;">${c.name}</span>
                     <span class="region-tag" style="margin:0; background:rgba(0,0,0,0.05); color:var(--text-muted);">${prov}</span>
                 </div>
                 <div class="flex-between" style="align-items:flex-end;">
                     <div>
                         <div style="font-size:3rem; font-weight:800; line-height:1; letter-spacing:-2px; margin-bottom:4px;">${c.temp}°</div>
                         <div style="display:flex; align-items:center; gap:6px; color:var(--text-secondary); font-weight:600; font-size:0.9rem;">${icon} ${c.condition}</div>
                     </div>
                     <div style="text-align:right;">
                         <div style="font-size:1.4rem; font-weight:700;">${c.wind}</div>
                         <div class="kpi-label">KM/H</div>
                     </div>
                 </div>
                 <div class="weather-mini-row">
                     ${forecastHtml || '<div style="width:100%; text-align:center; font-size:0.8rem; color:var(--text-muted);">Forecast Unavailable</div>'}
                 </div>
             </div>`;
         });
      });
      html += '</div>';
      return html;
  }

  function getWeatherIcon(cond, isSmall) {
      const c = (cond || "").toLowerCase();
      let i = "cloud";
      if(c.includes("sun") || c.includes("clear")) i = "sun";
      else if(c.includes("rain") || c.includes("shower")) i = "cloud-rain";
      else if(c.includes("snow") || c.includes("flurr")) i = "snowflake";
      else if(c.includes("storm") || c.includes("thunder")) i = "cloud-lightning";
      else if(c.includes("cloud") || c.includes("overcast")) i = "cloud";
      if(isSmall) {
          if (i==="sun") return `<i data-lucide="sun" width="16"></i>`;
          if (i==="cloud-rain") return `<i data-lucide="cloud-rain" width="16"></i>`;
          if (i==="snowflake") return `<i data-lucide="snowflake" width="16"></i>`;
          return `<i data-lucide="cloud" width="16"></i>`;
      }
      return `<i data-lucide="${i}" width="20"></i>`;
  }

             <div style="font-size:0.95rem; color:var(--text-secondary); white-space:pre-wrap; line-height:1.6; max-height:150px; overflow-y:auto; background:var(--bg-root); padding:12px; border-radius:12px;">${s.body}</div>
             <div style="display:flex; gap:12px; margin-top:auto; padding-top:12px; border-top:1px solid var(--glass-border);">

     return `

             </div>
         </div>
         
         <div style="display:flex; flex-direction:column; gap:24px;">
             <input id="script-search" class="input-aether" placeholder="Search scripts..." oninput="handleScriptSearch(this.value)" value="${state.searchTerm || ''}">
             <div class="grid-masonry" style="grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));">
                ${listHTML || '<div style="text-align:center; color:var(--text-muted); padding:40px; grid-column:1/-1;">No scripts found in this category.</div>'}
             </div>
         </div>
     </div>`;
  }
  
  function renderTracker() {
      const isCoach = state.trackerMode === 'coaching';
      const d = state.trackerData;

      const headerHtml = `
      <style>
          @keyframes spin { to { transform: rotate(360deg); } }
          @keyframes slideUp { to { opacity:1; transform:translateY(0); } }

             <div style="display:flex; gap:8px; margin-right:12px;">

              const ctx = chart.ctx;
              ctx.save();
              ctx.shadowColor = isDark ? 'rgba(0,0,0,0.8)' : 'rgba(0,0,0,0.2)';
              ctx.shadowBlur = 15;
              ctx.shadowOffsetX = 0;
              ctx.shadowOffsetY = 10;
          },
          afterDraw: (chart) => { chart.ctx.restore(); }
      };

      const insideLabelsPlugin = {
          id: 'insideLabels',
          afterDatasetsDraw(chart) {
              const { ctx, data } = chart;
              chart.getDatasetMeta(0).data.forEach((datapoint, index) => {
                  const value = data.datasets[0].data[index];
                  if (value <= 0) return; 
                  
                  const label = data.labels[index];
                  const { x, y } = datapoint.tooltipPosition();
                  
                  ctx.save();
                  ctx.font = "bold 12px 'Outfit', sans-serif";
                  ctx.fillStyle = 'white';
                  ctx.textAlign = 'center';
                  ctx.textBaseline = 'middle';
                  ctx.shadowColor = 'rgba(0,0,0,0.5)';
                  ctx.shadowBlur = 4;
                  ctx.shadowOffsetX = 0;
                  ctx.shadowOffsetY = 1;
                  
                  ctx.fillText(label, x, y - 8);
                  ctx.font = "800 14px 'Outfit', sans-serif";
                  ctx.fillText(value.toFixed(1) + 'h', x, y + 8);
                  ctx.restore();
              });
          }
      };

      if (!isCoach) {
          const g1 = ctx.createLinearGradient(0,0,0,300); g1.addColorStop(0, '#fde68a'); g1.addColorStop(1, '#d97706'); 
          const g2 = ctx.createLinearGradient(0,0,0,300); g2.addColorStop(0, '#fdba74'); g2.addColorStop(1, '#c2410c'); 
          const g3 = ctx.createLinearGradient(0,0,0,300); g3.addColorStop(0, '#a5b4fc'); g3.addColorStop(1, '#4338ca'); 

          charts.tracker = new Chart(ctx, {
              type: 'pie',
              plugins: [shadowPlugin, insideLabelsPlugin],
              data: {
                  labels: ['Morning', 'Evening', 'Night'],
                  datasets: [{
                      data: [d.totals.morning, d.totals.evening, d.totals.night],
                      backgroundColor: [g1, g2, g3],
                      borderColor: isDark ? '#1e293b' : '#ffffff',
                      borderWidth: 2,
                      hoverOffset: 0 // REMOVED HOVER ANIMATION FOR SPEED
                  }]
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  layout: { padding: 25 },
                  events: [], // COMPLETELY DISABLES HOVER EVENTS (0% CPU LAG)
                  plugins: { 
                      legend: { display: false },
                      tooltip: { enabled: false } // DISABLED TOOLTIPS
                  },
                  animation: { animateScale: true, animateRotate: true, duration: 1200, easing: 'easeOutQuart' }
              }
          });
      } else {
          const gBar = ctx.createLinearGradient(0,0,300,0);
          gBar.addColorStop(0, '#818cf8');
          gBar.addColorStop(1, '#4f46e5');

          const activityCount = {};
          d.events.forEach(e => {
              let name = e.activityName || 'Unknown';
              activityCount[name] = (activityCount[name] || 0) + e.hours;
          });
          const sortedNames = Object.keys(activityCount).sort((a,b) => activityCount[b] - activityCount[a]).slice(0, 5);
          const sortedData = sortedNames.map(n => activityCount[n]);

          charts.tracker = new Chart(ctx, {
              type: 'bar',
              plugins: [shadowPlugin],
              data: {
                  labels: sortedNames.map(n => n.length > 15 ? n.substring(0,15)+'...' : n),
                  datasets: [{
                      data: sortedData,
                      backgroundColor: gBar,
                      borderRadius: 8,
                      borderWidth: 0,
                      barThickness: 'flex',
                      maxBarThickness: 30
                  }]
              },
              options: {
                  indexAxis: 'y',
                  responsive: true,
                  maintainAspectRatio: false,
                  layout: { padding: { right: 20 } },
                  plugins: { 
                      legend: { display: false },
                      tooltip: {
                          backgroundColor: isDark ? 'rgba(15, 23, 42, 0.95)' : 'rgba(255, 255, 255, 0.95)',
                          titleColor: isDark ? '#fff' : '#0f172a',
                          bodyColor: isDark ? '#cbd5e1' : '#475569',
                          borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)',
                          borderWidth: 1,
                          titleFont: { family: "'Outfit', sans-serif", size: 14, weight: '800' },
                          bodyFont: { family: "'Outfit', sans-serif", size: 13, weight: '600' },
                          padding: 12,
                          cornerRadius: 12
                      }
                  },
                  scales: { 
                      x: { display: false }, 
                      y: { grid: { display: false }, ticks: { font: { family: "'Outfit', sans-serif", weight: 'bold'}, color: textColor } } 
                  },
                  animation: { duration: 1200, easing: 'easeOutBounce' }
              }
          });
      }
  }

  function initCharts() {}

  function initOverviewChart() {
      if (typeof Chart === 'undefined') return;
      
      const canvas = document.getElementById('chart-overview');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      const labels = state.slHistory.map(d => d.name);
      const slData = state.slHistory.map(d => d.val);
      const ackData = state.slHistory.map(d => d.ack);

      if (charts.overview) {
          charts.overview.destroy();
          charts.overview = null;
      }

      const gradientSL = ctx.createLinearGradient(0, 0, 0, canvas.height || 200);
      gradientSL.addColorStop(0, 'rgba(99, 102, 241, 0.4)');
      gradientSL.addColorStop(1, 'rgba(99, 102, 241, 0.0)'); 
      
      const gradientACK = ctx.createLinearGradient(0, 0, 0, canvas.height || 200);
      gradientACK.addColorStop(0, 'rgba(244, 63, 94, 0.4)'); 
      gradientACK.addColorStop(1, 'rgba(244, 63, 94, 0.0)');

      const isDark = document.body.classList.contains('dark');
      const gridColor = isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)';
      const textColor = isDark ? '#94a3b8' : '#64748b';

      const shadowPlugin = {
          id: 'shadowPluginLine',
          beforeDatasetsDraw: (chart) => {
              const ctx = chart.ctx;
              ctx.save();
              ctx.shadowColor = isDark ? 'rgba(0,0,0,0.6)' : 'rgba(99, 102, 241, 0.3)';
              ctx.shadowBlur = 12;
              ctx.shadowOffsetX = 0;
              ctx.shadowOffsetY = 6;
          },
          afterDatasetsDraw: (chart) => {
              chart.ctx.restore();
          }
      };

      charts.overview = new Chart(ctx, {
          type: 'line',
          plugins: [shadowPlugin],
          data: {
              labels: labels,
              datasets: [
                  {
                      label: 'Service Level (%)',
                      data: slData,
                      borderColor: '#4f46e5',
                      backgroundColor: gradientSL,
                      borderWidth: 3,
                      fill: true,
                      tension: 0.4, 
                      pointRadius: 0, 
                      pointHoverRadius: 6,
                      pointBackgroundColor: '#4f46e5',
                      pointBorderColor: '#fff',
                      pointBorderWidth: 2,
                      yAxisID: 'y'
                  },
                  {
                      label: 'Response Time (s)',
                      data: ackData,
                      borderColor: '#f43f5e',
                      backgroundColor: gradientACK,
                      borderWidth: 3,
                      borderDash: [6, 4], 
                      fill: true,
                      tension: 0.4,
                      pointRadius: 0,
                      pointHoverRadius: 6,
                      pointBackgroundColor: '#f43f5e',
                      pointBorderColor: '#fff',
                      pointBorderWidth: 2,
                      yAxisID: 'y1'
                  }
              ]
          },
          options: { 
              responsive: true, 
              maintainAspectRatio: false,
              interaction: {
                  mode: 'index',
                  intersect: false,
              },
              plugins: { 
                  legend: { 
                      display: true, 
                      position: 'top', 
                      align: 'end',
                      labels: { 
                          usePointStyle: true, 
                          boxWidth: 8,
                          boxHeight: 8,
                          font: { family: "'Outfit', sans-serif", weight: '700', size: 11 },
                          color: textColor
                      } 
                  },
                  tooltip: {
                      backgroundColor: isDark ? 'rgba(15, 23, 42, 0.95)' : 'rgba(255, 255, 255, 0.95)',
                      titleColor: isDark ? '#fff' : '#0f172a',
                      bodyColor: isDark ? '#cbd5e1' : '#475569',
                      borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)',
                      borderWidth: 1,
                      titleFont: { family: "'Outfit', sans-serif", size: 14, weight: '800' },
                      bodyFont: { family: "'Outfit', sans-serif", size: 13, weight: '600' },
                      padding: 12,
                      cornerRadius: 12,
                      boxPadding: 6,
                      usePointStyle: true,
                      callbacks: {
                          label: function(context) {
                              let label = context.dataset.label || '';
                              if (label) { label = label.replace(' (%)', '').replace(' (s)', '') + ': '; }
                              if (context.datasetIndex === 0) label += context.parsed.y + '%';
                              else label += context.parsed.y + 's';
                              return label;
                          }
                      }
                  }
              },
              scales: {
                  x: {
                      grid: { display: false, drawBorder: false },
                      ticks: { font: { family: "'Outfit', sans-serif", weight: '600' }, color: textColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }
                  },
                  y: {
                      type: 'linear',
                      display: true,
                      position: 'left',
                      min: 0,
                      max: 100,
                      grid: { color: gridColor, drawBorder: false, borderDash: [5, 5] },
                      ticks: { callback: value => value + '%', font: { family: "'Outfit', sans-serif", weight: '600' }, color: textColor, padding: 10 }
                  },
                  y1: {
                      type: 'linear',
                      display: true,
                      position: 'right',
                      min: 0,
                      suggestedMax: Math.max(...ackData, 60) * 1.2, 
                      grid: { display: false, drawBorder: false },
                      ticks: { callback: value => value + 's', font: { family: "'Outfit', sans-serif", weight: '600' }, color: textColor, padding: 10 }
                  }
              },
              animation: { duration: 1500, easing: 'easeOutQuart' }
          }
      });
  }

</script>
